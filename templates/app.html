<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mayo — community partnerships</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --lime: #d2ff01;
  --yellow: #ffea12;
  --black: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --surface3: #222222;
  --white: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --cyan: #b1ecf0;
  --pink: #ff6ef2;
  --orange: #ffab40;
  --green: #b3ff9e;
  --blue: #7eb8ff;
  --red: #ff6b6b;
  --nav-w: 228px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow-y: auto;
}
.bb { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
.bc { font-family: 'Barlow Condensed', sans-serif; }
.display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
.content-feed::-webkit-scrollbar { height: 8px; }
.content-feed::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
.content-feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.content-feed::-webkit-scrollbar-thumb:hover { background: var(--surface3); }
.content-feed { scrollbar-width: thin; scrollbar-color: var(--border2) var(--surface2); }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.15s; white-space: nowrap;
}
.btn-lime { background: var(--lime); color: var(--black); }
.btn-lime:hover { background: #bfee00; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--white); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: rgba(255,255,255,0.3); background: var(--surface2); }
.btn-dark { background: var(--surface2); color: var(--white); border: 1px solid var(--border); }
.btn-dark:hover { background: var(--surface3); }
.btn-sm { padding: 6px 13px; font-size: 12px; }
.btn-lg { padding: 12px 28px; font-size: 15px; }

/* ─── PILLS / TAGS ─── */
.tag {
  display: inline-block; padding: 3px 9px; border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
}
.tag-outline { border: 1px solid var(--border2); color: var(--muted); }
.tag-lime { background: var(--lime); color: var(--black); }
.tag-cyan { background: var(--cyan); color: var(--black); }
.tag-pink { background: var(--pink); color: var(--black); }
.tag-orange { background: var(--orange); color: var(--black); }
.tag-green { background: var(--green); color: var(--black); }
.tag-yellow { background: var(--yellow); color: var(--black); }
.tag-blue { background: var(--blue); color: var(--black); }
.tag-ghost { border: 1px solid var(--border2); color: var(--white); }

/* ─── CARDS ─── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.metric-card {
  border-radius: 8px; padding: 16px 18px;
}
.metric-card.cyan { background: var(--cyan); color: var(--black); }
.metric-card.yellow { background: var(--yellow); color: var(--black); }
.metric-card.pink { background: var(--pink); color: var(--black); }
.metric-card.green { background: var(--green); color: var(--black); }
.metric-card.orange { background: var(--orange); color: var(--black); }
.metric-card.lime { background: var(--lime); color: var(--black); }
.metric-card.dark { background: var(--surface2); color: var(--white); border: 1px solid var(--border); }
.metric-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }
.metric-value { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; letter-spacing: 0.02em; }
.metric-value.sm { font-size: 28px; }
.metric-sub { font-size: 12px; font-weight: 500; opacity: 0.7; margin-top: 4px; }

/* ─── LAYOUT ─── */
.app { display: flex; min-height: 100vh; }

/* ─── SIDENAV ─── */
.sidenav {
  width: var(--nav-w); min-width: var(--nav-w);
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow-y: auto; position: sticky; top: 0;
  flex-shrink: 0;
}
.sidenav-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 0.05em; color: var(--white);
}
.logo-dot { color: var(--lime); }
.role-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 3px 7px; border-radius: 3px;
}
.role-brand { background: var(--lime); color: var(--black); }
.role-community { background: var(--cyan); color: var(--black); }

.sidenav-user {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px;
  flex-shrink: 0; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-weight: 600; font-size: 13px; }
.user-org { font-size: 11px; color: var(--muted); }

.nav-section { padding: 10px 10px 4px; }
.nav-section-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
  font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); padding: 0 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--muted);
  transition: all 0.12s; margin-bottom: 1px; border: none;
  background: transparent; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--white); }
.nav-item.active { background: var(--surface2); color: var(--white); }
.nav-item.active .nav-icon { color: var(--lime); }
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--lime); color: var(--black);
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif;
}

.sidenav-bottom {
  margin-top: auto; padding: 12px 10px;
  border-top: 1px solid var(--border);
}

/* ─── MAIN CONTENT ─── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar {
  padding: 0 28px; height: 56px; min-height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
}
.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.page { flex: 1; overflow-y: auto; padding: 24px 28px; min-height: 0; }
.page-inner { max-width: 1200px; }

/* ─── ROLE TOGGLE ─── */
.role-toggle {
  display: flex; background: var(--surface2); border-radius: 6px;
  padding: 3px; gap: 2px; border: 1px solid var(--border);
}
.role-toggle-btn {
  padding: 5px 14px; border-radius: 4px; border: none; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  transition: all 0.12s; color: var(--muted); background: transparent;
}
.role-toggle-btn.active { background: var(--lime); color: var(--black); }

/* ─── LOGIN ─── */
.login-screen {
  width: 100vw; height: 100vh;
  background: var(--black);
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  width: 420px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden;
}
.login-header {
  background: var(--black); padding: 36px 36px 28px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 0.05em; }
.login-tagline { color: var(--muted); font-size: 13px; margin-top: 4px; }
.login-body { padding: 28px 36px 36px; }
.login-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.role-card {
  border: 2px solid var(--border2); border-radius: 8px; padding: 16px 14px;
  cursor: pointer; transition: all 0.15s; background: var(--surface2);
}
.role-card:hover { border-color: rgba(255,255,255,0.25); }
.role-card.selected.brand { border-color: var(--lime); background: rgba(210,255,1,0.06); }
.role-card.selected.community { border-color: var(--cyan); background: rgba(177,236,240,0.06); }
.role-card-icon { font-size: 22px; margin-bottom: 8px; }
.role-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.role-card-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

/* ─── DISCOVER ─── */
.discover-header { margin-bottom: 24px; }
.discover-title { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 0.03em; }
.discover-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
.search-bar {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.search-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 10px 14px; color: var(--white);
  font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
}
.search-input:focus { border-color: rgba(255,255,255,0.25); }
.search-input::placeholder { color: var(--muted); }
.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
}
.filter-chip {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.12s;
}
.filter-chip:hover { border-color: rgba(255,255,255,0.25); color: var(--white); }
.filter-chip.active { background: var(--lime); color: var(--black); border-color: var(--lime); }

/* ─── COMMUNITY CARD ─── */
.community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.community-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: all 0.15s;
}
.community-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.community-card-cover { position: relative; overflow: hidden; width: 100%; }
.community-card-cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.community-card-3x4 { aspect-ratio: 3/4; position: relative; display: flex; flex-direction: column; overflow: hidden; }
.community-card-cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.025) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.85) 100%);
}
.community-card-cover-tags {
  position: absolute; bottom: 10px; left: 10px; display: flex; gap: 5px; flex-wrap: wrap;
}
.community-card-body { padding: 14px 16px; }
.community-card-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 17px;
  font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.community-card-tagline { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
.community-card-metrics {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
.community-card-metric { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
.community-card-metric-val {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800;
}
.community-card-metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.community-card-footer {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ─── PROFILE VIEW ─── */
.profile-cover { height: 220px; position: relative; border-radius: 10px; overflow: hidden; margin-bottom: -50px; }
.profile-cover img { width: 100%; height: 100%; object-fit: cover; }
.profile-cover-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7)); }
.profile-header { position: relative; padding: 0 28px; margin-bottom: 24px; }
.profile-avatar-row { display: flex; align-items: flex-end; justify-content: space-between; padding-top: 0; }
.profile-avatar-large {
  width: 80px; height: 80px; border-radius: 10px;
  border: 3px solid var(--surface); overflow: hidden;
  background: var(--surface3);
}
.profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }

/* ─── BRIEF CARD ─── */
.brief-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: all 0.15s;
}
.brief-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.brief-card-header { display: flex; gap: 14px; padding: 16px; border-bottom: 1px solid var(--border); }
.brief-brand-logo {
  width: 48px; height: 48px; border-radius: 8px;
  background: var(--surface2); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
}
.brief-brand-logo img { width: 100%; height: 100%; object-fit: cover; }
.brief-card-body { padding: 14px 16px; }
.brief-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.brief-card-goal { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.brief-offerings { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.brief-offering {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px;
  font-size: 12px; font-weight: 600;
}
.brief-offering-val { color: var(--lime); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; }
.brief-card-footer {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ─── PARTNERSHIP PIPELINE ─── */
.pipeline-steps {
  display: flex; align-items: center; gap: 0;
  background: var(--surface2); border-radius: 8px; padding: 4px;
  border: 1px solid var(--border); margin-bottom: 24px;
  overflow-x: auto;
}
.pipeline-step {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 5px; cursor: default;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap; transition: all 0.15s;
  flex-shrink: 0;
}
.pipeline-step.done { color: rgba(210,255,1,0.7); cursor: pointer; }
.pipeline-step.done:hover { color: var(--lime); }
.pipeline-step.active { background: var(--surface3); color: var(--white); }
.pipeline-step.active .step-num { background: var(--lime); color: var(--black); }
.pipeline-step.locked { opacity: 0.35; }
.step-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--surface3); color: var(--muted);
  font-size: 10px; font-weight: 800; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.step-done-icon { color: var(--lime); font-size: 13px; }
.pipeline-arrow { color: var(--surface3); font-size: 16px; flex-shrink: 0; padding: 0 2px; }

/* ─── PROJECT MANAGEMENT ─── */
.project-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
.gantt-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.gantt-label { width: 120px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
.gantt-track { flex: 1; height: 24px; background: var(--surface3); border-radius: 4px; position: relative; overflow: hidden; }
.gantt-bar {
  height: 100%; border-radius: 4px; position: absolute;
  display: flex; align-items: center; padding: 0 8px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  white-space: nowrap;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.status-complete { background: var(--green); }
.status-active { background: var(--lime); }
.status-pending { background: var(--surface3); border: 1px solid var(--muted); }
.status-shipped { background: var(--cyan); }

/* ─── ARCHETYPE BADGE ─── */
.archetype-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 6px; border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}
.archetype-evangelical { background: var(--pink); color: var(--black); }
.archetype-loyalists { background: var(--cyan); color: var(--black); }
.archetype-buyers { background: var(--orange); color: var(--black); }
.archetype-early { background: var(--green); color: var(--black); }
.archetype-cultural { background: var(--yellow); color: var(--black); }

/* ─── CHANNEL BAR ─── */
.channel-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.channel-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.channel-info { flex: 1; }
.channel-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.channel-stats { font-size: 11px; color: var(--muted); }
.channel-bar-track { width: 80px; height: 4px; background: var(--surface3); border-radius: 2px; flex-shrink: 0; }
.channel-bar-fill { height: 100%; border-radius: 2px; }

/* ─── MEASURE ─── */
.measure-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.mentions-bar { display: flex; gap: 2px; height: 80px; align-items: flex-end; margin-top: 8px; }
.mentions-col { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; }

/* ─── STAT ROW ─── */
.stat-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }

/* ─── INPUT ─── */
.input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 10px 14px; color: var(--white);
  font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.12s;
}
.input:focus { border-color: rgba(255,255,255,0.3); }
.input::placeholder { color: var(--muted); }
.label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px; display: block;
}
.form-group { margin-bottom: 18px; }
textarea.input { resize: none; }
select.input { appearance: none; cursor: pointer; }

/* ─── SECTION HEADER ─── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
}

/* ─── CHAT ─── */
.chat-messages { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; max-height: 200px; overflow-y: auto; }
.chat-msg { display: flex; gap: 8px; }

/* ─── RESPONSIVE GRIDS ─── */

.partnership-gallery-card {

.pgc-cover { height: 120px; position: relative; flex-shrink: 0; }

/* ─── NOTABLE MEMBERS ─── */

/* ─── CONFIDENCE TIERS ─── */
.tier-badge {

/* ─── ONBOARDING ─── */

}

/* ─── CHANNEL CONNECT CARDS ─── */

/* ─── TAG SELECT ─── */

/* ─── DUAL RANGE SLIDER ─── */
.dual-range-wrap { position: relative; height: 36px; }
.dual-range-wrap input[type=range] {

/* ─── BRIEF FULL SCREEN ─── */

  max-width: 960px; margin: 0 auto; width: 100%;

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
{% raw %}
const { useState, useEffect, useRef } = React;

// ─── AUTH UTILITIES ─────────────────────────────────────────────────────────
function getStoredUser() { try { return JSON.parse(sessionStorage.getItem('mayo_user')); } catch(e) { return null; } }
function getToken() { return sessionStorage.getItem('mayo_token'); }
function setAuth(token, user) { sessionStorage.setItem('mayo_token', token); sessionStorage.setItem('mayo_user', JSON.stringify(user)); }
function clearAuth() { sessionStorage.removeItem('mayo_token'); sessionStorage.removeItem('mayo_user'); }
async function apiFetch(path, opts = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}), ...(opts.headers || {}) };
  const res = await fetch(path, { ...opts, headers });
  if (!res.ok) { const err = await res.json().catch(() => ({ error: res.statusText })); throw new Error(err.error || res.statusText); }
  return res.json();
}

// ─── SHAPE MAPPERS ───────────────────────────────────────────────────────────
function mapCommunity(c) {
  // instagram_data is { profile: {...}, media: [...], engagement_rate: N }
  const igData = (c.instagram_data && typeof c.instagram_data === 'object' ? c.instagram_data : {});
  const igProfile = igData.profile || {};
  const followers = igProfile.followers_count || 0;
  const er = igData.engagement_rate || 0;
  const igUsername = igProfile.username || null;
  const hasIg = !!c.instagram_token;
  const tier = (hasIg && followers > 0) ? 'fully-verified' : (c.active_members ? 'verified' : 'starter');
  const tags = Array.isArray(c.tags) ? c.tags : [];
  const channels = [];
  if (hasIg) channels.push({
    name: 'Instagram', color: '#e1306c', reach: followers,
    engagement: er ? Math.round(er * 10) / 10 : null, vsAvg: null, engagementChannel: true,
    url: igUsername ? 'https://instagram.com/' + igUsername : null, username: igUsername,
  });
  const sub = c.substack_data && typeof c.substack_data === 'object' ? c.substack_data : null;
  const substackUrl = (sub && sub.url) || c.substack_url || null;
  if (substackUrl) channels.push({ name: 'Substack', color: '#ff6719', reach: null, engagement: null, vsAvg: null, engagementChannel: true, url: substackUrl });
  const igWebsite = igProfile.website || null;
  if (igWebsite) channels.push({ name: 'Website', color: '#7eb8ff', reach: null, engagement: null, vsAvg: null, engagementChannel: false, url: igWebsite });
  const csParsed = Array.isArray(c.case_studies) ? c.case_studies : [];
  // Derive coverGradient from cover_option using the COVER_OPTIONS constant
  const coverOpt = (typeof COVER_OPTIONS !== 'undefined' ? COVER_OPTIONS : []).find(o => o.id === (c.cover_option || 1));
  const ARCHETYPE_MAP = {
    evangelical: { label:'Evangelists', best:'Brand Awareness', color:'var(--pink)' },
    evangelists: { label:'Evangelists', best:'Brand Awareness', color:'var(--pink)' },
    loyalists:   { label:'Loyalists',   best:'Long-term Sponsorship', color:'var(--cyan)' },
    buyers:      { label:'Buyers',      best:'Direct Response', color:'var(--orange)' },
    early:       { label:'Early Adopters', best:'Product Launches', color:'var(--lime)' },
    early_adopters: { label:'Early Adopters', best:'Product Launches', color:'var(--lime)' },
    cultural:    { label:'Culturally Impactful', best:'Cultural Credibility', color:'var(--orange)' },
  };
  const archInfo = ARCHETYPE_MAP[c.archetype] || { label:'—', best:'', color:'var(--orange)' };
  return {
    id: c.id, name: c.name, tagline: c.tagline || '', description: c.description || '',
    bio: igProfile.biography || c.description || '', location: c.location || '',
    tier, archetype: c.archetype || null, archetypeLabel: archInfo.label,
    matchScore: '—', engagement: er ? Math.round(er * 10) / 10 : '—',
    activeMembers: c.active_members || 0, members: c.active_members || 0,
    networkMultiplier: c.network_multiplier != null ? c.network_multiplier : '—', reach: followers || null,
    cis: c.cis_stamped || c.cis_raw || null,
    tags, cover: c.cover_image_url || null,
    coverGradient: coverOpt ? coverOpt.gradient : 'linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%)',
    channels, notableMembers: Array.isArray(c.notable_members) ? c.notable_members : [],
    partnerships: csParsed.filter(cs => cs.mayo_verified || cs.verified),
    casestudies: csParsed,
    archetypeBest: archInfo.best,
    archetypeColor: archInfo.color,
    archetypeReasoning: c.archetype_reasoning || null,
    campaignType: 'Brand Awareness', primaryKPI: 'Post Rate',
    matchRationale: 'Match rationale is calculated relative to an active brief.',
    igUsername, igFollowers: followers, igBio: igProfile.biography || '',
    igPosts: (igData.media || []).filter(p => p.media_url || p.thumbnail_url),
    email: c.email || null, leaderName: c.leader_name || null,
    partnershipPreferences: typeof c.partnership_preferences === 'string' ? c.partnership_preferences : '',
    capabilities: Array.isArray(c.capabilities) ? c.capabilities : [],
    cisRaw: c.cis_raw != null ? c.cis_raw : null,
    cisStamped: c.cis_stamped != null ? c.cis_stamped : null,
    miqScore: c.miq_score != null ? c.miq_score : null,
    miqReasoning: c.miq_reasoning || null,
    pressMentions: Array.isArray(c.press_mentions) ? c.press_mentions : [],
    substackUrl: substackUrl,
    substackPosts: sub ? (sub.posts || []) : [],
    mediaItems: Array.isArray(c.media_items) ? c.media_items : [],
  };
}

function mapBrief(b) {
  const brandColor = b.brand_color || '#ff6b6b';
  const typeColorMap = { 'Sponsorship': 'orange', 'Product Partnership': 'cyan', 'Collaboration': 'pink', 'Content Partnership': 'blue', 'Event Partnership': 'green' };
  const heroImageMap = {
    'Sponsorship': 'https://images.unsplash.com/photo-1571008887538-b36bb32f4571?auto=format&fit=crop&w=1200&h=400',
    'Product Partnership': 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1200&h=400',
    'Event Partnership': 'https://images.unsplash.com/photo-1524646349956-1590eacfa324?auto=format&fit=crop&w=1200&h=400',
    'Content Partnership': 'https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?auto=format&fit=crop&w=1200&h=400',
    'Collaboration': 'https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=1200&h=400',
  };
  const tags = Array.isArray(b.tags) ? b.tags : [];
  const kpis = Array.isArray(b.kpis) ? b.kpis : [];
  const products = Array.isArray(b.products) ? b.products : [];
  const reqs = (b.requirements && typeof b.requirements === 'object') ? b.requirements : {};
  return {
    id: b.id, brandId: b.brand_id, brand: b.brand_name || 'Unknown Brand', brandColor,
    brandGradient: b.brand_gradient || ('linear-gradient(135deg, #1a0505 0%, #3d0a0a 40%, #7a1515 70%, ' + brandColor + ' 100%)'),
    brandInitial: b.brand_initial || (b.brand_name || 'B')[0], brandTagline: b.brand_tagline || '',
    brandBio: b.brand_bio || b.brand_desc || '',
    heroImage: b.cover_image_url || heroImageMap[b.partnership_type] || heroImageMap['Sponsorship'],
    partnershipType: b.partnership_type || 'Sponsorship',
    partnershipTypeColor: typeColorMap[b.partnership_type] || 'orange',
    title: b.title || '', goal: b.goal || b.goals || '',
    budget: (b.budget_amount || b.budget) ? ('$' + parseInt(b.budget_amount || b.budget).toLocaleString()) : '—',
    budgetPeriod: b.budget_period || 'Quarterly',
    products, tags, requirements: reqs, kpis,
    deliverables: Array.isArray(b.deliverables) ? b.deliverables : [],
    posted: b.created_at ? new Date(b.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' }) : '—',
    deadline: b.deadline || '—', window: b.activation_window || '—',
    lookingFor: b.looking_for || '', responseCount: b.response_count || 0,
    campaignGoal: b.campaign_goal || '',
  };
}

function fitBlurb(brief, matchResult) {
  // Returns { label, labelColor, lines, isFail } — all brief-relative, no community metrics
  if (!matchResult) return null;
  const { score, hardFail } = matchResult;
  const pType = brief.partnershipType || '';
  const reqs = brief.requirements || {};

  if (hardFail) {
    const n = parseInt(reqs.min_active_members);
    return {
      label: null,
      lines: [n ? `This brand needs at least ${n.toLocaleString()} active members.` : hardFail],
      isFail: true,
    };
  }

  const lines = [];

  // One line about what the brand actually wants — pulled from brief type
  if (pType === 'Sponsorship') {
    lines.push(reqs.events_per_month
      ? 'They want a community that runs regular events, not just online presence.'
      : 'Season-long sponsorship — they want consistent co-branding over time, not a one-off.');
  } else if (pType === 'Product Partnership') {
    lines.push('Trial partnership — they send product to members and ask for honest posts, no scripts.');
  } else if (pType === 'Event Partnership') {
    lines.push('They bring the setup and cover activation costs. You give them a slot at your event.');
  } else if (pType === 'Content Partnership') {
    lines.push('Ongoing content deal — monthly deliverables, quarterly check-ins.');
  } else {
    lines.push('Open partnership format — read the brief for specifics.');
  }

  // One line about a notable requirement if relevant
  if (reqs.instagram_connected) lines.push('Instagram connection required to apply.');
  else if (reqs.content_cadence) lines.push(`Content cadence: ${reqs.content_cadence}.`);
  else if (reqs.event_size) lines.push(`Events should have ${reqs.event_size}.`);

  const label = score >= 70 ? 'Strong Fit' : score >= 50 ? 'Good Match' : null;
  const labelColor = score >= 70 ? 'var(--lime)' : 'var(--cyan)';

  return { label, labelColor, lines, isFail: false };
}

function calcMatchScore(brief, community) {
  if (!community) return null;
  const reqs = brief.requirements || {};

  // Hard filter: minimum active members
  const minMembers = parseInt(reqs.min_active_members) || 0;
  if (minMembers > 0 && (community.activeMembers || 0) < minMembers) {
    return { score: null, hardFail: `Needs ${minMembers.toLocaleString()}+ active members` };
  }

  const combined = ((brief.campaignGoal || '') + ' ' + (brief.partnershipType || '')).toLowerCase();

  // Archetype fit (0–100)
  const archetypeFit = (() => {
    const arch = community.archetype || 'evangelical';
    const kw = {
      evangelical: ['awareness', 'brand', 'cultural', 'association', 'sponsorship'],
      early:       ['product launch', 'launch', 'seeding', 'new product'],
      loyalists:   ['long-term', 'ongoing', 'season', 'sponsorship', 'renewable'],
      buyers:      ['product', 'seeding', 'direct', 'purchase'],
      cultural:    ['content', 'ambassador', 'ugc', 'social'],
    }[arch] || [];
    const hits = kw.filter(k => combined.includes(k)).length;
    return hits >= 2 ? 95 : hits === 1 ? 68 : 30;
  })();

  // ER score (0–100), null if no data
  const erScore = (() => {
    const er = parseFloat(community.engagement);
    if (!er || isNaN(er)) return null;
    if (er >= 8) return 100;
    if (er >= 4) return Math.round(70 + ((er - 4) / 4) * 25);
    if (er >= 2) return Math.round(40 + ((er - 2) / 2) * 30);
    return Math.max(10, Math.round(er / 2 * 40));
  })();

  // CIS score (already 0–100), null if not set
  const cisScore = community.cis != null ? Math.min(100, Math.round(community.cis)) : null;

  // NM score (0–100), null if not available
  const nmScore = (() => {
    const nm = parseFloat(community.networkMultiplier);
    if (!nm || isNaN(nm)) return null;
    if (nm >= 5) return 100;
    if (nm >= 3) return Math.round(75 + ((nm - 3) / 2) * 20);
    if (nm >= 2) return Math.round(55 + ((nm - 2) / 1) * 20);
    if (nm >= 1) return Math.round(30 + ((nm - 1) / 1) * 25);
    return 15;
  })();

  // Weights by campaign objective
  let w = { archetype: 0.30, er: 0.25, cis: 0.25, nm: 0.20 };
  if (combined.includes('awareness') || combined.includes('sponsorship')) {
    w = { archetype: 0.35, er: 0.20, cis: 0.30, nm: 0.15 };
  } else if (combined.includes('product launch') || combined.includes('seeding')) {
    w = { archetype: 0.25, er: 0.35, cis: 0.20, nm: 0.20 };
  } else if (combined.includes('content') || combined.includes('ambassador')) {
    w = { archetype: 0.30, er: 0.30, cis: 0.25, nm: 0.15 };
  } else if (combined.includes('event')) {
    w = { archetype: 0.25, er: 0.20, cis: 0.20, nm: 0.35 };
  }

  const factors = [
    { val: archetypeFit, weight: w.archetype },
    { val: erScore,      weight: w.er },
    { val: cisScore,     weight: w.cis },
    { val: nmScore,      weight: w.nm },
  ].filter(f => f.val !== null);

  if (factors.length === 0) return { score: null, hardFail: null, breakdown: {} };

  const totalW = factors.reduce((s, f) => s + f.weight, 0);
  const score = Math.round(factors.reduce((s, f) => s + f.val * f.weight, 0) / totalW);

  return {
    score,
    hardFail: null,
    breakdown: { archetype: archetypeFit, er: erScore, cis: cisScore, nm: nmScore, factors: factors.length },
  };
}

function DualRangeSlider({ min, max, valueMin, valueMax, onChange }) {
  const rangeMin = 16, rangeMax = 65;
  const pctMin = ((valueMin - rangeMin) / (rangeMax - rangeMin)) * 100;
  const pctMax = ((valueMax - rangeMin) / (rangeMax - rangeMin)) * 100;
  return (
    <div>
      <div className="dual-range-wrap">
        <div className="dual-range-track">
          <div className="dual-range-fill" style={{ left: `${pctMin}%`, width: `${pctMax - pctMin}%` }} />
        </div>
        <input type="range" min={rangeMin} max={rangeMax} value={valueMin}
          onChange={e => { const v = Math.min(Number(e.target.value), valueMax - 1); onChange(v, valueMax); }} />
        <input type="range" min={rangeMin} max={rangeMax} value={valueMax}
          onChange={e => { const v = Math.max(Number(e.target.value), valueMin + 1); onChange(valueMin, v); }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
        <span style={{ fontSize: 11, color: 'var(--muted)' }}>{rangeMin}</span>
        <span style={{ fontSize: 11, color: 'var(--muted)' }}>{rangeMax}+</span>
      </div>
    </div>
  );
}

function DeliverableCounter({ label, icon, value, onChange }) {
  return (
    <div className="deliverable-row">
      <span style={{ fontSize: 18, width: 28, flexShrink: 0 }}>{icon}</span>
      <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{label}</span>
      <button className="counter-btn" onClick={() => onChange(Math.max(0, value - 1))}>−</button>
      <input
        type="number" min={0}
        value={value}
        onChange={e => onChange(Math.max(0, parseInt(e.target.value) || 0))}
        style={{
          width: 44, textAlign: 'center', background: 'transparent', border: 'none',
          color: 'var(--white)', fontFamily: 'Barlow Condensed', fontSize: 18,
          fontWeight: 700, outline: 'none', MozAppearance: 'textfield',
        }}
      />
      <button className="counter-btn" onClick={() => onChange(value + 1)}>+</button>
    </div>
  );
}

  const toggleArchetype = (a) => setSelectedArchetypes(prev => prev.includes(a) ? prev.filter(x => x !== a) : [...prev, a]);

  const toggleKpi = (k) => setSelectedKpis(prev => prev.includes(k) ? prev.filter(x => x !== k) : [...prev, k]);
  const toggleRegion = (r) => setSelectedRegions(prev => prev.includes(r) ? prev.filter(x => x !== r) : [...prev, r]);
  const toggleInterest = (t) => setSelectedInterests(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  const addCustomInterest = () => {
    if (customInterest.trim() && !customInterests.includes(customInterest.trim())) {
      setCustomInterests(prev => [...prev, customInterest.trim()]);
      setSelectedInterests(prev => [...prev, customInterest.trim()]);
      setCustomInterest('');
    }
  };
  const updateDeliverable = (i, val) => setDeliverables(prev => prev.map((d, idx) => idx === i ? val : d));
  const addDeliverable = () => setDeliverables(prev => [...prev, '']);
  const removeDeliverable = (i) => setDeliverables(prev => prev.filter((_, idx) => idx !== i));

  const goal = CAMPAIGN_GOALS.find(g => g.id === selectedGoal);

  const StepDots = () => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      {Array.from({ length: TOTAL_STEPS }).map((_, i) => (
        <div key={i} style={{
          height: 4, borderRadius: 2, transition: 'all 0.2s',
          width: i + 1 === step ? 28 : 8,
          background: i + 1 <= step ? 'var(--lime)' : 'var(--surface3)',
          opacity: i + 1 < step ? 0.5 : 1,
        }} />
      ))}
      <span style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 6, fontFamily: 'Barlow Condensed', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Step {step} of {TOTAL_STEPS}</span>
    </div>
  );

  const Topbar = ({ canContinue, onContinue, continueLabel = 'Continue →' }) => (
    <div className="brief-creation-topbar">
      <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
        <div style={{ fontFamily: 'Bebas Neue', fontSize: 22, letterSpacing: '0.05em' }}>mayo<span style={{ color: 'var(--lime)' }}>.</span></div>
        <div style={{ width: 1, height: 20, background: 'var(--border2)' }} />
        <StepDots />
      </div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>Save as Draft</button>
        {step > 1 && <button className="btn btn-ghost btn-sm" onClick={() => setStep(s => s - 1)}>← Back</button>}
        {onContinue && (
          <button className="btn btn-lime" style={{ opacity: canContinue ? 1 : 0.4, pointerEvents: canContinue ? 'all' : 'none' }} onClick={onContinue}>
            {continueLabel}
          </button>
        )}
      </div>
    </div>
  );

  // ── Step 1 — Campaign Goal ────────────────────────────────────────────────
  if (step === 1) return (
    <div className="brief-creation-screen">
      <Topbar canContinue={!!selectedGoal} onContinue={() => setStep(2)} />
      <div className="brief-creation-body">
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 42, letterSpacing: '0.03em', marginBottom: 8 }}>What's the goal?</div>
          <div style={{ fontSize: 14, color: 'var(--muted)', maxWidth: 520 }}>This shapes which communities get matched to your brief and how we weight their data. Choose the outcome that matters most.</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 32 }}>
          {CAMPAIGN_GOALS.map(g => (
            <div key={g.id} onClick={() => setSelectedGoal(g.id)} style={{
              border: `2px solid ${selectedGoal === g.id ? 'var(--lime)' : 'var(--border2)'}`,
              background: selectedGoal === g.id ? 'rgba(210,255,1,0.05)' : 'var(--surface2)',
              borderRadius: 10, padding: '20px 18px', cursor: 'pointer', transition: 'all 0.12s',
            }}>
              <div style={{ fontSize: 26, marginBottom: 12 }}>{g.icon}</div>
              <div style={{ fontFamily: 'Barlow Condensed', fontSize: 17, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 6 }}>{g.label}</div>
              <div style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.5, marginBottom: 12 }}>{g.desc}</div>
              <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                {g.archetypes.map(a => <span key={a} style={{ fontSize: 10, fontFamily: 'Barlow Condensed', fontWeight: 700, color: 'var(--muted)', letterSpacing: '0.06em', textTransform: 'uppercase', background: 'var(--surface3)', borderRadius: 3, padding: '2px 7px' }}>{a}</span>)}
              </div>
            </div>
          ))}
        </div>

        {/* Brand bio preview */}
        <div style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 10, padding: '18px 20px' }}>
          <div className="section-title mb-12">Your Brand Bio — visible to communities on every brief</div>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14, marginBottom: 12 }}>
            <div style={{ width: 44, height: 44, borderRadius: 8, background: brandData.color, color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Bebas Neue', fontSize: 22, flexShrink: 0 }}>{brandData.initial}</div>
            <div>
              <div style={{ fontFamily: 'Barlow Condensed', fontSize: 16, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{brandData.name}</div>
              <div style={{ fontSize: 12, color: 'var(--muted)' }}>{brandData.tagline} · {brandData.category}</div>
            </div>
          </div>
          <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.65 }}>{brandData.bio}</p>
          <button className="btn btn-ghost btn-sm" style={{ marginTop: 12 }}>Edit brand bio →</button>
        </div>
      </div>
    </div>
  );

  // ── Step 2 — Partnership Goals ───────────────────────────────────────────
  if (step === 2) return (
    <div className="brief-creation-screen">
      <Topbar canContinue={!!partnershipGoals.trim()} onContinue={() => setStep(3)} />
      <div className="brief-creation-body" style={{ maxWidth: 720 }}>
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 42, letterSpacing: '0.03em', marginBottom: 8 }}>What are you trying to achieve?</div>
          <div style={{ fontSize: 14, color: 'var(--muted)', maxWidth: 560 }}>
            This is the heart of your brief. Write directly to community leaders — tell them what you believe, what success looks like, and why this partnership matters. The best proposals come from communities who genuinely get your vision.
          </div>
        </div>

        {/* Goal label */}
        {goal && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 24, padding: '10px 14px', background: 'rgba(210,255,1,0.06)', border: '1px solid rgba(210,255,1,0.2)', borderRadius: 8 }}>
            <span style={{ fontSize: 20 }}>{goal.icon}</span>
            <div>
              <div style={{ fontFamily: 'Barlow Condensed', fontSize: 13, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--lime)' }}>Campaign Goal</div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>{goal.label}</div>
            </div>
          </div>
        )}

        <div className="form-group">
          <label className="label">Partnership Goals</label>
          <textarea
            className="input"
            rows={10}
            placeholder={`Write in your brand's voice. This is what communities read first.\n\ne.g. "We believe movement is for everyone — from elite athletes to everyday movers who refuse to let soreness slow them down. We're looking to partner with 5–10 select communities that embody this same belief: groups who show up, push their limits, and help each other move better every day.\n\nWe'll provide resources and recovery technology that become part of your routine. Our products prove their value in the moments that matter: before the game, after the race, when your body needs it most. If your community is built on dedication and performance, we want to help you keep moving."`}
            value={partnershipGoals}
            onChange={e => setPartnershipGoals(e.target.value)}
            style={{ resize: 'vertical', minHeight: 220 }}
          />
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
            <span style={{ fontSize: 11, color: 'var(--muted)' }}>Write as if you're speaking directly to a community leader.</span>
            <span style={{ fontSize: 11, color: partnershipGoals.length > 800 ? 'var(--orange)' : 'var(--muted)' }}>{partnershipGoals.length} chars</span>
          </div>
        </div>

        <div className="form-group" style={{ marginBottom: 0 }}>
          <label className="label">What you're looking for in a partner</label>
          <textarea className="input" rows={4}
            placeholder="Describe the kind of community you want to work with — their vibe, their members, what makes a great fit. The more specific the better."
            value={lookingFor} onChange={e => setLookingFor(e.target.value)} style={{ resize: 'none' }} />
          <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 5 }}>This won't be shown publicly — it informs matching behind the scenes.</div>
        </div>
      </div>
    </div>
  );

  // ── Step 3 — Brief Details ────────────────────────────────────────────────
  if (step === 3) return (
    <div className="brief-creation-screen">
      <Topbar canContinue={!!(partnershipType && budgetAmount)} onContinue={() => setStep(4)} />
      <div className="brief-creation-body">
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 42, letterSpacing: '0.03em', marginBottom: 8 }}>What are you offering?</div>
          <div style={{ fontSize: 14, color: 'var(--muted)' }}>Be specific — communities respond better to briefs with clear budgets, timelines, and expectations.</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
          {/* Left column */}
          <div>
            <div className="form-group">
              <label className="label">Partnership Type</label>
              <select className="input" value={partnershipType} onChange={e => setPartnershipType(e.target.value)}>
                <option value="">Select type</option>
                {PARTNERSHIP_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div className="form-group">
              <label className="label">Budget</label>
              <div style={{ display: 'flex', gap: 8 }}>
                <input className="input" placeholder="e.g. $15,000" value={budgetAmount} onChange={e => setBudgetAmount(e.target.value)} style={{ flex: 1 }} />
                <select className="input" style={{ width: 140 }} value={budgetPeriod} onChange={e => setBudgetPeriod(e.target.value)}>
                  <option>One-off</option>
                  <option>Monthly</option>
                  <option>Quarterly</option>
                  <option>Annual</option>
                </select>
              </div>
            </div>

            <div className="form-group">
              <label className="label">Product / Value Add <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional</span></label>
              <input className="input" placeholder="e.g. 100x Recovery Boots (~$120K value)" value={productOffer} onChange={e => setProductOffer(e.target.value)} />
            </div>

            <div className="form-group">
              <label className="label">Response Deadline</label>
              <input className="input" type="date" value={deadline} onChange={e => setDeadline(e.target.value)} style={{ colorScheme: 'dark' }} />
            </div>

            <div className="form-group">
              <label className="label">Activation Window</label>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <input className="input" type="date" value={activationStart} onChange={e => setActivationStart(e.target.value)} style={{ flex: 1, colorScheme: 'dark' }} />
                <span style={{ color: 'var(--muted)', fontSize: 12 }}>to</span>
                <input className="input" type="date" value={activationEnd} onChange={e => setActivationEnd(e.target.value)} style={{ flex: 1, colorScheme: 'dark' }} />
              </div>
            </div>

          </div>

          {/* Right column */}
          <div>
            <div className="form-group">
              <label className="label">Deliverables <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— be as specific as you need</span></label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 8 }}>
                {deliverables.map((d, i) => (
                  <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <div style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: 'var(--muted)', flexShrink: 0, fontFamily: 'Barlow Condensed', fontWeight: 700 }}>{i + 1}</div>
                    <input className="input" style={{ flex: 1 }}
                      placeholder={i === 0 ? 'e.g. 2x 60-second hero films shot during the event' : i === 1 ? 'e.g. 10x lifestyle stills featuring the product in use' : 'Add a deliverable...'}
                      value={d} onChange={e => updateDeliverable(i, e.target.value)} />
                    {deliverables.length > 1 && (
                      <button onClick={() => removeDeliverable(i)} style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid var(--border2)', background: 'transparent', color: 'var(--muted)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0 }}>×</button>
                    )}
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{ alignSelf: 'flex-start', marginTop: 4 }} onClick={addDeliverable}>+ Add deliverable</button>
              </div>
            </div>

            <div className="form-group" style={{ marginBottom: 0 }}>
              <label className="label">KPIs <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— select all that apply</span></label>
              <div className="tag-select-grid mt-8">
                {KPI_OPTIONS.map(k => (
                  <button key={k} className={`tag-select-item ${selectedKpis.includes(k) ? 'selected' : ''}`} onClick={() => toggleKpi(k)}>{k}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  // ── Step 4 — Community Requirements ──────────────────────────────────────
  if (step === 4) return (
    <div className="brief-creation-screen">
      <Topbar canContinue={true} onContinue={() => setStep(5)} />
      <div className="brief-creation-body">
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 42, letterSpacing: '0.03em', marginBottom: 8 }}>Who are you looking for?</div>
          <div style={{ fontSize: 14, color: 'var(--muted)', maxWidth: 520 }}>Set minimum requirements. These inform matching behind the scenes — communities won't see the specific numbers, only whether they've been matched.</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, marginBottom: 32 }}>
          {/* Left */}
          <div>
            <div className="form-group">
              <label className="label">Minimum Community Size</label>
              <select className="input" value={minMembers} onChange={e => setMinMembers(e.target.value)}>
                <option value="">No minimum</option>
                {[10, 50, 100, 250, 500, 1000].map(n => <option key={n} value={n}>{n.toLocaleString()}+ members</option>)}
              </select>
            </div>

            <div className="form-group">
              <label className="label">Age Range <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textTransform: 'none' }}>— not shown to communities</span></label>
              <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <label className="label" style={{ fontSize: 10, marginBottom: 4 }}>Min Age</label>
                  <input className="input" type="number" min={16} max={ageMax - 1} value={ageMin}
                    onChange={e => { const v = Math.min(Number(e.target.value), ageMax - 1); setAgeMin(v); }}
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <label className="label" style={{ fontSize: 10, marginBottom: 4 }}>Max Age</label>
                  <input className="input" type="number" min={ageMin + 1} max={65} value={ageMax}
                    onChange={e => { const v = Math.max(Number(e.target.value), ageMin + 1); setAgeMax(v); }}
                  />
                </div>
              </div>
              <DualRangeSlider valueMin={ageMin} valueMax={ageMax} onChange={(mn, mx) => { setAgeMin(mn); setAgeMax(mx); }} />
              <div style={{ textAlign: 'center', marginTop: 8, fontSize: 12, color: 'var(--lime)', fontFamily: 'Barlow Condensed', fontWeight: 700 }}>
                {ageMin} – {ageMax === 65 ? '65+' : ageMax}
              </div>
            </div>

            <div className="form-group">
              <label className="label">Minimum Engagement <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textTransform: 'none' }}>— not shown to communities</span></label>
              <select className="input" value={minEngagement} onChange={e => setMinEngagement(e.target.value)}>
                <option value="">No minimum</option>
                <option value="1">1%+</option>
                <option value="2">2%+</option>
                <option value="3">3%+</option>
                <option value="5">5%+</option>
              </select>
            </div>

            <div className="form-group">
              <label className="label">Minimum Instagram Followers <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textTransform: 'none' }}>— not shown to communities</span></label>
              <select className="input" value={minIgFollowers} onChange={e => setMinIgFollowers(e.target.value)}>
                <option value="">No minimum</option>
                <option value="500">500+</option>
                <option value="1000">1,000+</option>
                <option value="2500">2,500+</option>
                <option value="5000">5,000+</option>
                <option value="10000">10,000+</option>
              </select>
            </div>

            <div className="form-group" style={{ marginBottom: 0 }}>
              <label className="label">Instagram Connected</label>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8 }}>
                <button
                  onClick={() => setInstagramRequired(v => !v)}
                  style={{ width: 40, height: 22, borderRadius: 11, border: 'none', background: instagramRequired ? 'var(--lime)' : 'var(--surface3)', cursor: 'pointer', position: 'relative', transition: 'background 0.15s', flexShrink: 0 }}>
                  <div style={{ position: 'absolute', top: 3, left: instagramRequired ? 20 : 3, width: 16, height: 16, borderRadius: '50%', background: instagramRequired ? '#000' : '#555', transition: 'left 0.15s' }} />
                </button>
                <span style={{ fontSize: 13, color: instagramRequired ? 'var(--white)' : 'var(--muted)' }}>
                  {instagramRequired ? 'Required — community must have Instagram connected' : 'Not required'}
                </span>
              </div>
            </div>
          </div>

          {/* Right */}
          <div>
            <div className="form-group">
              <label className="label">Location <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— select all that apply</span></label>
              <div className="tag-select-grid mt-8">
                {REGION_OPTIONS.map(r => (
                  <button key={r} className={`tag-select-item ${selectedRegions.includes(r) ? 'selected' : ''}`} onClick={() => toggleRegion(r)}>{r}</button>
                ))}
              </div>
            </div>

            <div className="form-group">
              <label className="label">Events per Month</label>
              <select className="input" value={eventsPerMonth} onChange={e => setEventsPerMonth(e.target.value)}>
                <option value="">No requirement</option>
                <option value="At least 1 group event per month">At least 1 event/month</option>
                <option value="At least 2 group events per month">At least 2 events/month</option>
                <option value="Weekly events or meetups">Weekly events or meetups</option>
              </select>
            </div>

            <div className="form-group">
              <label className="label">Minimum Event Size <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textTransform: 'none' }}>— attendees per event</span></label>
              <select className="input" value={minEventSize} onChange={e => setMinEventSize(e.target.value)}>
                <option value="">No minimum</option>
                <option value="20+ attendees per event">20+ per event</option>
                <option value="50+ attendees per event">50+ per event</option>
                <option value="100+ attendees per event">100+ per event</option>
                <option value="250+ attendees per event">250+ per event</option>
              </select>
            </div>

            <div className="form-group" style={{ marginBottom: 0 }}>
              <label className="label">Content Cadence</label>
              <select className="input" value={contentCadence} onChange={e => setContentCadence(e.target.value)}>
                <option value="">No requirement</option>
                <option value="Able to produce 1–2 pieces of content per month">1–2 pieces/month</option>
                <option value="Able to produce 4+ pieces of content per month">4+ pieces/month</option>
                <option value="Able to produce 8+ pieces of content per month">8+ pieces/month</option>
                <option value="Weekly content output">Weekly content</option>
              </select>
            </div>
          </div>
        </div>

        {/* Community type preference — full width */}
        <div className="form-group" style={{ marginBottom: 16 }}>
          <label className="label">Preferred Community Type <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional, select all that apply</span></label>
          <div className="tag-select-grid mt-8">
            {[
              { id: 'evangelists', label: 'Evangelists', desc: 'Brand awareness, organic advocacy' },
              { id: 'early_adopters', label: 'Early Adopters', desc: 'Product launches, first-movers' },
              { id: 'loyalists', label: 'Loyalists', desc: 'Long-term sponsorship, retention' },
              { id: 'buyers', label: 'Buyers', desc: 'Direct response, product seeding' },
            ].map(a => (
              <button key={a.id} className={`tag-select-item ${selectedArchetypes.includes(a.id) ? 'selected' : ''}`} onClick={() => toggleArchetype(a.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', textAlign: 'left', height: 'auto', padding: '8px 12px' }}>
                <span style={{ fontWeight: 800 }}>{a.label}</span>
                <span style={{ fontWeight: 400, fontSize: 10, color: selectedArchetypes.includes(a.id) ? 'rgba(0,0,0,0.6)' : 'var(--muted)', textTransform: 'none', letterSpacing: 0 }}>{a.desc}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Interests — full width */}
        <div className="form-group" style={{ marginBottom: 0 }}>
          <label className="label">Community Interests <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— select all that apply</span></label>
          <div className="tag-select-grid mt-8" style={{ marginBottom: 12 }}>
            {[...INTEREST_TAGS, ...customInterests].map(t => (
              <button key={t} className={`tag-select-item ${selectedInterests.includes(t) ? 'selected' : ''}`} onClick={() => toggleInterest(t)}>{t}</button>
            ))}
          </div>
          {/* Custom interest input */}
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              className="input" style={{ flex: 1 }}
              placeholder="Add a custom interest category..."
              value={customInterest}
              onChange={e => setCustomInterest(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addCustomInterest()}
            />
            <button className="btn btn-ghost btn-sm" onClick={addCustomInterest} style={{ opacity: customInterest.trim() ? 1 : 0.4 }}>+ Add</button>
          </div>
        </div>
      </div>
    </div>
  );

  // ── Step 5 — Preview + Publish ────────────────────────────────────────────
  const activeDeliverables = deliverables.filter(d => d.trim().length > 0);

  const builtRequirements = {
    ...(minMembers ? { min_active_members: parseInt(minMembers) } : {}),
    ...(selectedRegions.length ? { location: selectedRegions.join(', ') } : {}),
    ...(ageMin !== 18 || ageMax !== 45 ? { age_range: `${ageMin}–${ageMax === 65 ? '65+' : ageMax}` } : {}),
    ...(minEngagement ? { min_engagement_rate: minEngagement + '%+' } : {}),
    ...(instagramRequired ? { instagram_connected: true } : {}),
    ...(minIgFollowers ? { instagram_followers: minIgFollowers + '+ followers' } : {}),
    ...(eventsPerMonth ? { events_per_month: eventsPerMonth } : {}),
    ...(minEventSize ? { event_size: minEventSize } : {}),
    ...(contentCadence ? { content_cadence: contentCadence } : {}),
    ...(selectedArchetypes.length ? { preferred_archetypes: selectedArchetypes.join(', ') } : {}),
  };

  const previewBrief = {
    brand: brandData.name,
    brandColor: brandData.color,
    brandGradient: brandData.gradient,
    brandInitial: brandData.initial,
    brandTagline: brandData.tagline,
    brandDesc: brandData.bio,

function LoginScreen({ onLogin }) {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSignIn = async () => {
    if (!email || !password) { setError('Please enter your email and password.'); return; }
    setLoading(true); setError('');
    try {
      const data = await apiFetch('/api/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      setAuth(data.token, data.user);
      onLogin(data.user.role, data.user);
    } catch(e) {
      setError(e.message || 'Login failed. Please check your credentials.');
    } finally { setLoading(false); }
  };

  return (
    <div className="login-screen">
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 0%, rgba(210,255,1,0.06) 0%, transparent 70%)' }} />
      <div className="login-box" style={{ position: 'relative', zIndex: 1 }}>
        <div className="login-header">
          <div className="login-logo" style={{ color: 'var(--white)' }}>mayo<span style={{ color: 'var(--lime)' }}>.</span></div>
          <div className="login-tagline">The community partnerships platform</div>
        </div>
        <div className="login-body">
          <div className="form-group">
            <label className="label">Email</label>
            <input className="input" placeholder="you@mayo.fyi" type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSignIn()} />
          </div>
          <div className="form-group" style={{ marginBottom: error ? 8 : 20 }}>
            <label className="label">Password</label>
            <input className="input" placeholder="••••••••" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSignIn()} />
          </div>
          {error && <div style={{ color: 'var(--red)', fontSize: 12, marginBottom: 12 }}>{error}</div>}
          <button className="btn btn-lime btn-lg" style={{ width: '100%', marginBottom: 8, opacity: loading ? 0.6 : 1 }} onClick={handleSignIn} disabled={loading}>
            {loading ? 'Signing in...' : 'Sign In →'}
          </button>
          <div style={{ textAlign: 'right', marginBottom: 20 }}>
            <span style={{ fontSize: 12, color: 'var(--muted)', cursor: 'pointer' }}>Forgot password?</span>
          </div>

          <div style={{ borderTop: '1px solid var(--border)', paddingTop: 20 }}>
            <div className="login-label" style={{ marginBottom: 12 }}>New to mayo?</div>
            <div className="role-cards">
              <div className="role-card brand" onClick={() => window.location.href = '/onboard/brand'} style={{ cursor: 'pointer', borderColor: 'rgba(177,236,240,0.2)' }}>
                <div className="role-card-icon">🏷</div>
                <div className="role-card-title">Join as a Brand</div>
                <div className="role-card-desc">Post briefs, discover communities, run real partnerships</div>
              </div>
              <div className="role-card community" onClick={() => window.location.href = '/onboard'} style={{ cursor: 'pointer', borderColor: 'rgba(210,255,1,0.2)' }}>
                <div className="role-card-icon">🤝</div>
                <div className="role-card-title">Join as a Community</div>
                <div className="role-card-desc">Discover briefs, pitch brands, grow your community</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


function DiscoverPage({ role, communities: COMMUNITIES = [], briefs: BRIEFS = [], onViewCommunity, onViewBrief, activeBriefFilter, onClearBriefFilter, onSetBriefFilter, myProfile }) {
  const [filter, setFilter] = useState("All");
  const [search, setSearch] = useState("");
  const filters = ["All", "Running", "Fitness", "Wellness", "Culture", "Lifestyle"];
  const isBrand = role === 'brand';

  // Scored + sorted briefs for community users
  const scoredBriefs = React.useMemo(() => {
    if (isBrand || !myProfile) return BRIEFS.map(b => ({ ...b, _matchScore: null }));
    return BRIEFS.map(b => {
      const result = calcMatchScore(b, myProfile);
      return { ...b, _matchScore: result?.score ?? null, _hardFail: result?.hardFail ?? null };
    }).sort((a, b) => (b._matchScore || 0) - (a._matchScore || 0));
  }, [BRIEFS, myProfile, isBrand]);

  const filtered = COMMUNITIES.filter(c => {
    const matchSearch = c.name.toLowerCase().includes(search.toLowerCase()) || c.tagline.toLowerCase().includes(search.toLowerCase());
    const matchFilter = filter === "All" || c.tags.includes(filter);
    return matchSearch && matchFilter;
  });

  // Sort by match score descending when a brief is active
  const sorted = activeBriefFilter
    ? [...filtered].sort((a, b) => b.matchScore - a.matchScore)
    : filtered;

  return (
    <div>
      <div className="discover-header">
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 38 }}>
            {isBrand ? (activeBriefFilter ? 'Matched Communities' : 'Discover Communities') : 'Find Partnerships'}
          </div>
          <div className="text-muted" style={{ fontSize: 13 }}>
            {isBrand
              ? activeBriefFilter
                ? `Sorted by match score · ${activeBriefFilter.partnershipType || 'Brief'}`
                : (COMMUNITIES.length > 0 ? `${COMMUNITIES.length} communities on Mayo` : 'No communities yet')
              : (scoredBriefs.length > 0 ? `${scoredBriefs.length} open brief${scoredBriefs.length === 1 ? '' : 's'} · sorted by match` : 'No open briefs yet')}
          </div>
        </div>
      </div>

      <div className="search-bar">
        <input
          className="search-input"
          placeholder={isBrand ? "Search communities, interests, locations..." : "Search briefs, brands, categories..."}
          value={search}
          onChange={e => setSearch(e.target.value)}
        />

        {/* Brief filter — always visible for brand users */}
        {isBrand && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 0, background: 'var(--surface2)', border: `1px solid ${activeBriefFilter ? 'rgba(210,255,1,0.4)' : 'var(--border2)'}`, borderRadius: 7, overflow: 'hidden', flexShrink: 0 }}>
            <div style={{ padding: '0 10px', fontSize: 11, fontFamily: 'Barlow Condensed', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: activeBriefFilter ? 'var(--lime)' : 'var(--muted)', whiteSpace: 'nowrap', borderRight: '1px solid var(--border2)' }}>
              Match to brief
            </div>
            <select
              style={{ background: 'transparent', border: 'none', color: activeBriefFilter ? 'var(--white)' : 'var(--muted)', fontFamily: 'Barlow', fontSize: 13, padding: '9px 10px', outline: 'none', cursor: 'pointer', minWidth: 160 }}
              value={activeBriefFilter?.id || ''}
              onChange={e => {
                if (!e.target.value) { onClearBriefFilter(); return; }
                const brief = BRIEFS.find(b => String(b.id) === e.target.value);
                if (brief) onSetBriefFilter(brief);
              }}
            >
              <option value="">No brief selected</option>
              {BRIEFS.map(b => (
                <option key={b.id} value={b.id}>{b.brand} — {b.partnershipType}</option>
              ))}
            </select>
            {activeBriefFilter && (
              <button onClick={onClearBriefFilter} style={{ padding: '0 10px', background: 'transparent', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 14, borderLeft: '1px solid var(--border2)' }}>×</button>
            )}
          </div>
        )}

        <button className="btn btn-ghost">⚙ Filters</button>
      </div>

      <div className="filter-row">
        {filters.map(f => (
          <button key={f} className={`filter-chip ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>{f}</button>
        ))}
      </div>

      {isBrand ? (
        sorted.length > 0
          ? <div className="community-grid">{sorted.map(c => <CommunityCard key={c.id} c={c} onClick={onViewCommunity} />)}</div>
          : <div style={{ padding: '60px 0', textAlign: 'center', color: 'var(--muted)' }}>
              <div style={{ fontSize: 42, marginBottom: 12 }}>◎</div>
              <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No communities yet</div>
              <div style={{ fontSize: 13 }}>Communities are joining — check back soon.</div>
            </div>
      ) : (
        scoredBriefs.length > 0
          ? <div className="community-grid">{scoredBriefs.map(b => <BriefCard key={b.id} b={b} onClick={onViewBrief} showMatch={true} matchScore={b._matchScore} />)}</div>
          : <div style={{ padding: '60px 0', textAlign: 'center', color: 'var(--muted)' }}>
              <div style={{ fontSize: 42, marginBottom: 12 }}>◫</div>
              <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No open briefs yet</div>
              <div style={{ fontSize: 13 }}>When brands post partnership opportunities, they'll appear here. We'll notify you when something matches your community.</div>
            </div>
      )}
    </div>
  );
}

function PostCarousel({ igPosts, substackPosts }) {
  const scrollRef = React.useRef(null);
  const drag = React.useRef({ down: false, startX: 0, scrollLeft: 0, moved: false });

  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const onDown = e => {
      drag.current = { down: true, startX: e.pageX - el.offsetLeft, scrollLeft: el.scrollLeft, moved: false };
      el.style.cursor = 'grabbing';
    };
    const onMove = e => {
      if (!drag.current.down) return;
      e.preventDefault();
      const dist = (e.pageX - el.offsetLeft) - drag.current.startX;
      if (Math.abs(dist) > 4) drag.current.moved = true;
      el.scrollLeft = drag.current.scrollLeft - dist;
    };
    const onUp = () => { drag.current.down = false; el.style.cursor = 'grab'; };
    el.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    return () => {
      el.removeEventListener('mousedown', onDown);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }, []);

  const onClickCapture = e => { if (drag.current.moved) { e.preventDefault(); e.stopPropagation(); drag.current.moved = false; } };

  const ig = (igPosts||[]).filter(p => p.media_url||p.thumbnail_url).map(p => ({ ...p, _type:'ig' }));
  const sub = (substackPosts||[]).map(p => ({ ...p, _type:'sub' }));
  const all = [...ig, ...sub].sort((a,b) => {
    const da = new Date(a.timestamp||a.date||0), db = new Date(b.timestamp||b.date||0);
    return db - da;
  });
  if (!all.length) return null;

  const cardStyle = { flexShrink:0, width:130, height:190, borderRadius:8, overflow:'hidden', display:'block', position:'relative', scrollSnapAlign:'start', textDecoration:'none', background:'var(--surface2)', userSelect:'none' };

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
        <div className="section-title" style={{ fontSize:10, letterSpacing:'0.1em', marginBottom:0 }}>Latest Content</div>
        <div style={{ display:'flex', gap:6, alignItems:'center' }}>
          {ig.length > 0 && <span style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, color:'#e1306c' }}>IG</span>}
          {sub.length > 0 && <span style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, color:'#ff6719' }}>Substack</span>}
        </div>
      </div>
      <div ref={scrollRef} onClickCapture={onClickCapture}
        style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:10, scrollSnapType:'x mandatory', WebkitOverflowScrolling:'touch', cursor:'grab',
          scrollbarWidth:'thick', scrollbarColor:'rgba(255,255,255,0.25) transparent' }}>
        {all.map((post, i) => {
          if (post._type === 'ig') {
            const inner = (
              <>
                <img src={post.media_url||post.thumbnail_url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} />
                <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'22px 8px 6px', background:'linear-gradient(to top,rgba(0,0,0,0.375),transparent)' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:3, color:'#fff' }}>
                    <span style={{ fontSize:9, fontFamily:'Barlow Condensed', fontWeight:700, color:'#e1306c' }}>IG</span>
                    {post.like_count > 0 && <span style={{ fontSize:10, fontFamily:'Barlow Condensed', fontWeight:700, color:'#fff' }}>{post.like_count.toLocaleString()}</span>}
                  </div>
                </div>
              </>
            );
            return post.permalink
              ? <a key={i} href={post.permalink} target="_blank" rel="noopener noreferrer" style={cardStyle}>{inner}</a>
              : <div key={i} style={cardStyle}>{inner}</div>;
          } else {
            const inner = (
              <>
                {post.image_url ? <img src={post.image_url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} /> : null}
                <div style={{ position:'absolute', inset:0, padding:'10px 10px 8px', display:'flex', flexDirection:'column', justifyContent:post.image_url?'flex-end':'space-between', background:post.image_url?'linear-gradient(to top,rgba(0,0,0,0.425) 0%,rgba(0,0,0,0.2) 50%,transparent 100%)':'none' }}>
                  {!post.image_url && <div style={{ fontSize:11, fontWeight:600, color:'var(--white)', lineHeight:1.4 }}>{post.title}</div>}
                  {post.image_url && <div style={{ fontSize:11, fontWeight:600, color:'#fff', lineHeight:1.35 }}>{(post.title||'').slice(0,50)}</div>}
                  <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                    <span style={{ fontSize:9, color:'#ff6719', fontFamily:'Barlow Condensed', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em' }}>Substack</span>
                  </div>
                </div>
              </>
            );
            return post.link
              ? <a key={i} href={post.link} target="_blank" rel="noopener noreferrer" style={{ ...cardStyle, border:'1px solid var(--border)' }}>{inner}</a>
              : <div key={i} style={{ ...cardStyle, border:'1px solid var(--border)' }}>{inner}</div>;
          }
        })}
      </div>
    </div>
  );
}
