                <div style={{ fontWeight: 600, fontSize: 13 }}>
                  Instagram
                  {igCh.username && igCh.url
                    ? <a href={igCh.url} target="_blank" rel="noopener noreferrer" style={{ color: 'var(--muted)', fontWeight: 400, textDecoration: 'none', marginLeft: 4 }}>· @{igCh.username}</a>
                    : igCh.username ? <span style={{ color: 'var(--muted)', fontWeight: 400 }}> · @{igCh.username}</span> : ''}
                </div>
                <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>{[igCh.reach ? igCh.reach.toLocaleString() + ' followers' : null, igCh.engagement ? igCh.engagement + '% ER' : null].filter(Boolean).join(' · ') || 'Connected'}</div>
              </div>
              <span style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--lime)' }}>✓ Live</span>
            </div>
          )}
          {(substackCh || c.substackUrl) && (() => {
            const sUrl = substackCh ? substackCh.url : c.substackUrl;
            return (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 0', borderBottom: websiteCh ? '1px solid var(--border)' : 'none' }}>
                <div style={{ width: 30, height: 30, borderRadius: '50%', background: '#ff6719', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Bebas Neue', fontSize: 14, color: '#fff', flexShrink: 0 }}>S</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>Substack</div>
                  {sUrl && <div style={{ fontSize: 11, marginTop: 2 }}><a href={sUrl} target="_blank" rel="noopener noreferrer" style={{ color: 'var(--cyan)', textDecoration: 'none' }}>{sUrl.replace(/^https?:\/\//,'')}</a></div>}
                </div>
                <span style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', color: 'var(--muted)' }}>URL saved</span>
              </div>
            );
          })()}
          {websiteCh && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 0' }}>
              <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted)', flexShrink: 0, fontSize: 13 }}>W</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>Website <span style={{ fontWeight: 400, color: 'var(--muted)', fontSize: 11 }}>— reference only</span></div>
                {websiteCh.url && <div style={{ fontSize: 11, marginTop: 2 }}><a href={websiteCh.url} target="_blank" rel="noopener noreferrer" style={{ color: 'var(--cyan)', textDecoration: 'none' }}>{websiteCh.url.replace(/^https?:\/\//,'')}</a></div>}
              </div>
            </div>
          )}
          {!igCh && !substackCh && !websiteCh && <div className="text-muted text-xs">No channels connected</div>}
        </div>

        {/* About + Location + Looking For stacked */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {c.description && (
            <div className="card p-16">
              <div className="section-title mb-8" style={{ fontSize: 10, letterSpacing: '0.1em' }}>About</div>
              <p style={{ fontSize: 13, color: 'rgba(240,240,240,0.75)', lineHeight: 1.65, margin: 0 }}>{c.description}</p>
            </div>
          )}
          {c.location && (
            <div className="card p-16">
              <div className="section-title mb-6" style={{ fontSize: 10, letterSpacing: '0.1em' }}>Location</div>
              <p style={{ fontSize: 13, color: 'rgba(240,240,240,0.75)', margin: 0 }}>{c.location}</p>
            </div>
          )}
          {c.partnershipPreferences && (
            <div className="card p-16">
              <div className="section-title mb-8" style={{ fontSize: 10, letterSpacing: '0.1em' }}>Looking For</div>
              <p style={{ fontSize: 13, color: 'rgba(240,240,240,0.75)', lineHeight: 1.65, margin: 0 }}>{c.partnershipPreferences}</p>
            </div>
          )}
          {!c.description && !c.location && !c.partnershipPreferences && (
            <div className="card p-16 text-muted" style={{ fontSize: 13 }}>No profile text set</div>
          )}
        </div>
      </div>

      {/* ── Content feed carousel ────────────────────────────────────────────── */}
      {(c.igPosts && c.igPosts.length > 0 || c.substackPosts && c.substackPosts.length > 0) && (
        <div className="card p-16" style={{ marginBottom: 12 }}>
          <PostCarousel igPosts={c.igPosts || []} substackPosts={c.substackPosts || []} />
        </div>
      )}

      {/* ── Photos & Events ──────────────────────────────────────────────────── */}
      {c.mediaItems && c.mediaItems.length > 0 && (
        <div className="card p-16" style={{ marginBottom: 12 }}>
          <div className="section-title mb-10" style={{ fontSize: 10, letterSpacing: '0.1em' }}>Photos &amp; Events</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 6 }}>
            {c.mediaItems.map((item, i) => (
              <div key={i} style={{ aspectRatio: '1', borderRadius: 8, overflow: 'hidden', background: 'var(--surface2)', border: '1px solid var(--border)' }}>
                <img src={item.url} alt={item.caption || ''} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Archetype ─────────────────────────────────────────────────────────── */}
      <div className="card p-16" style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
          <div className="section-title" style={{ fontSize: 10, letterSpacing: '0.1em', marginBottom: 0 }}>Community Archetype</div>
          {c.archetype && <span style={{ fontFamily: 'Barlow Condensed', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--lime)' }}>★ Mayo assigned</span>}
        </div>
        <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 12 }}>Platform-assigned — never self-selected.</div>
        {c.archetype ? (
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: c.archetypeReasoning ? 14 : 0 }}>
            <span style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: archetypeColor }}>{c.archetypeLabel}</span>
            {c.archetypeBest && <span style={{ background: archetypeColor + '22', border: '1px solid ' + archetypeColor + '44', color: archetypeColor, fontFamily: 'Barlow Condensed', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', padding: '2px 8px', borderRadius: 3 }}>{c.archetypeBest}</span>}
          </div>
        ) : (
          <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 14 }}>Not yet assigned</div>
        )}
        {c.archetypeReasoning && (
          <div style={{ background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 8, padding: '12px 14px' }}>
            <div style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', marginBottom: 6 }}>Why this archetype</div>
            <div style={{ fontSize: 12, color: 'rgba(240,240,240,0.65)', lineHeight: 1.6 }}>{c.archetypeReasoning}</div>
          </div>
        )}
      </div>

      {/* ── Notable Members ──────────────────────────────────────────────────── */}
      {c.notableMembers.length > 0 && (
        <div className="card p-16" style={{ marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div className="section-title" style={{ fontSize: 10, letterSpacing: '0.1em', marginBottom: 0 }}>Notable Members</div>
            <span className="text-muted text-xs">{c.notableMembers.filter(m=>m.verified).length}/{c.notableMembers.length} verified</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {c.notableMembers.map((m, i) => {
              const nm = m.name || '?';
              const hasData = m.ig_followers || m.follower_tier;
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', background: 'var(--surface2)', border: `1px solid ${m.verified ? 'rgba(210,255,1,0.2)' : 'var(--border)'}`, borderRadius: 8 }}>
                  <div style={{ width: 36, height: 36, borderRadius: '50%', background: m.verified ? 'rgba(210,255,1,0.15)' : 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Bebas Neue', fontSize: 16, color: m.verified ? 'var(--lime)' : 'var(--muted)', flexShrink: 0 }}>{nm[0].toUpperCase()}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{nm}</div>
                    {m.ig_handle && <a href={`https://instagram.com/${m.ig_handle}`} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: 'var(--muted)', textDecoration: 'none', display: 'block', marginTop: 1 }}>@{m.ig_handle}</a>}
                    {m.role && <div style={{ fontSize: 11, color: 'var(--muted)' }}>{m.role}</div>}
                    {m.verified && hasData && (
                      <div style={{ fontSize: 10, color: 'var(--lime)', fontFamily: 'Barlow Condensed', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: 2 }}>
                        ✓ {m.ig_followers ? m.ig_followers.toLocaleString() + ' followers' : m.follower_tier + ' tier'}
                        {m.ig_er ? ' · ' + m.ig_er + '% ER' : ''}
                      </div>
                    )}
                    {!m.verified && <div style={{ fontSize: 10, color: '#555', fontFamily: 'Barlow Condensed', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: 2 }}>Pending verification</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Past Partnerships ────────────────────────────────────────────────── */}
      {(verifiedCS.length > 0 || selfCS.length > 0 || isOwnProfile) && (
        <div className="card p-16" style={{ marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div className="section-title" style={{ fontSize: 10, letterSpacing: '0.1em', marginBottom: 0 }}>Past Partnerships</div>
            <span className="text-muted text-xs">{isOwnProfile ? 'Click to view · Add yours below' : 'Click to view case study'}</span>
          </div>
          <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 4 }}>
            {verifiedCS.map((p, idx) => (
              <div key={idx} style={{ background: 'var(--surface2)', border: '1px solid rgba(210,255,1,0.25)', borderRadius: 8, overflow: 'hidden', minWidth: 200, maxWidth: 220, flexShrink: 0, cursor: 'pointer' }} onClick={() => setActiveCaseStudy(p)}>
                <div style={{ height: 110, position: 'relative', background: p.gradient || 'linear-gradient(135deg,#1a1a2e,#2d1b69)' }}>
                  {(() => { const imgs = p.images?.length ? p.images : p.image_url ? [p.image_url] : []; return imgs[0] ? <img src={imgs[0]} alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.7 }} /> : null; })()}
                  <div style={{ position: 'absolute', top: 6, right: 6 }}><span style={{ background: 'var(--lime)', color: '#000', fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', padding: '2px 6px', borderRadius: 3 }}>★ Mayo Verified</span></div>
                  {p.brandColor && <div style={{ position: 'absolute', top: 6, left: 8, width: 28, height: 28, borderRadius: 5, background: p.brandColor, color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Bebas Neue', fontSize: 14 }}>{p.brandInitial || (p.brand||'?')[0]}</div>}
                </div>
                <div style={{ padding: '10px 12px' }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{p.brand || '—'}</div>
                  {p.year && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 1 }}>{p.year}</div>}
                  {p.result && <div style={{ fontSize: 11, color: 'var(--lime)', marginTop: 5, fontFamily: 'Barlow Condensed', fontWeight: 700 }}>{p.result}</div>}
                </div>
              </div>
            ))}
            {selfCS.map((p, idx) => (
              <div key={'self-'+idx} style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden', minWidth: 200, maxWidth: 220, flexShrink: 0, cursor: 'pointer' }} onClick={() => setActiveCaseStudy(p)}>
                <div style={{ height: 110, position: 'relative', background: 'linear-gradient(135deg,#1a1a2e,#2d1b69)' }}>
                  {(() => { const imgs = p.images?.length ? p.images : p.image_url ? [p.image_url] : []; return imgs[0] ? <img src={imgs[0]} alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.6 }} /> : null; })()}
                  <div style={{ position: 'absolute', top: 6, right: 6 }}><span style={{ background: 'rgba(136,136,136,0.85)', color: '#fff', fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', padding: '2px 6px', borderRadius: 3 }}>Self-reported</span></div>
                </div>
                <div style={{ padding: '10px 12px' }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{p.brand || '—'}</div>
                  {p.year && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 1 }}>{p.year}</div>}
                  {p.description && <div style={{ fontSize: 11, color: 'rgba(240,240,240,0.5)', marginTop: 5, lineHeight: 1.4 }}>{p.description.slice(0,70)}{p.description.length > 70 ? '…' : ''}</div>}
                </div>
              </div>
            ))}
            {isOwnProfile && pendingCaseStudies.map((p, idx) => (
              <div key={'pending-'+idx} style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden', minWidth: 200, maxWidth: 220, flexShrink: 0, opacity: 0.5 }}>
                <div style={{ height: 110, background: 'linear-gradient(135deg,#1a1a1a,#2a2a2a)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                  <div style={{ fontSize: 20 }}>⏳</div>
                  <div style={{ fontFamily: 'Barlow Condensed', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)' }}>Pending Review</div>
                </div>
                <div style={{ padding: '10px 12px' }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{p.brand}</div>
                  {p.year && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 1 }}>{p.year}</div>}
                </div>
              </div>
            ))}
            {isOwnProfile && (
              <div onClick={() => setShowAddCaseStudy(true)}
                style={{ minWidth: 140, borderRadius: 8, border: '1px dashed var(--border2)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, padding: 16, cursor: 'pointer', color: 'var(--muted)', transition: 'all 0.12s', flexShrink: 0 }}
                onMouseEnter={e => { e.currentTarget.style.borderColor='var(--lime)'; e.currentTarget.style.color='var(--lime)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border2)'; e.currentTarget.style.color='var(--muted)'; }}>
                <div style={{ fontSize: 24 }}>+</div>
                <div style={{ fontFamily: 'Barlow Condensed', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', textAlign: 'center' }}>Add Case Study</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Cultural Impact Score — admin only ───────────────────────────────── */}
      {role === 'admin' && <div className="card p-16" style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
          <div className="section-title" style={{ fontSize: 10, letterSpacing: '0.1em', marginBottom: 0 }}>Cultural Impact Score</div>
          {c.cisStamped != null && <span style={{ fontFamily: 'Barlow Condensed', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--orange)' }}>★ Stamped</span>}
        </div>
        <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 14, lineHeight: 1.5 }}>Part algorithmic, part editorial. Raw score calculated from MIQ, Growth Velocity, Brand History, and Press Mentions.</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8, marginBottom: 16 }}>
          {[
            { label: 'MIQ', val: c.miqScore, sub: c.miqScore != null ? 'member influence' : 'run analysis' },
            { label: 'GV',  val: null, sub: 'needs 90-day data' },
            { label: 'BAH', val: cisBAH, sub: cisBAH != null ? verifiedCS.length + ' verified case' + (verifiedCS.length !== 1 ? 's' : '') : 'no verified cases' },
            { label: 'PMM', val: cisPMM, sub: confirmedPress.length ? confirmedPress.length + ' confirmed mention' + (confirmedPress.length !== 1 ? 's' : '') : 'no confirmed mentions' },
          ].map(s => (
            <div key={s.label} style={{ background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 6, padding: '10px', textAlign: 'center' }}>
              <div style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', marginBottom: 4 }}>{s.label}</div>
              <div style={{ fontFamily: 'Bebas Neue', fontSize: 24, color: s.val != null ? 'var(--orange)' : '#444', lineHeight: 1 }}>{s.val != null ? s.val : '—'}</div>
              <div style={{ fontSize: 9, color: '#444', marginTop: 3 }}>{s.sub}</div>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
          <div style={{ flex: 1, background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 6, padding: 12, textAlign: 'center' }}>
            <div style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', marginBottom: 4 }}>Raw CIS</div>
            <div style={{ fontFamily: 'Bebas Neue', fontSize: 32, lineHeight: 1, color: c.cisRaw != null ? 'var(--orange)' : '#444' }}>{c.cisRaw != null ? c.cisRaw : '—'}</div>
          </div>
          <div style={{ color: 'var(--muted)', fontSize: 18, paddingTop: 18 }}>→</div>
          <div style={{ flex: 1, background: c.cisStamped != null ? 'rgba(255,171,64,0.08)' : 'var(--surface2)', border: `1px solid ${c.cisStamped != null ? 'rgba(255,171,64,0.3)' : 'var(--border2)'}`, borderRadius: 6, padding: 12, textAlign: 'center' }}>
            <div style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', marginBottom: 4 }}>Stamped CIS</div>
            <div style={{ fontFamily: 'Bebas Neue', fontSize: 32, lineHeight: 1, color: c.cisStamped != null ? 'var(--orange)' : '#444' }}>{c.cisStamped != null ? c.cisStamped : '—'}</div>
          </div>
        </div>
        {c.miqReasoning && (
          <div style={{ marginTop: 14, background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 6, padding: 12 }}>
            <div style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', marginBottom: 6 }}>MIQ Analysis</div>
            <div style={{ fontSize: 12, color: 'rgba(240,240,240,0.7)', lineHeight: 1.6 }}>{c.miqReasoning}</div>
          </div>
        )}
      </div>}

      {/* ── Press & Media Mentions — admin only ─────────────────────────────── */}
      {role === 'admin' && (c.pressMentions || []).filter(m => m.confirmed !== false).length > 0 && (
        <div className="card p-16">
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <div className="section-title" style={{ fontSize: 10, letterSpacing: '0.1em', marginBottom: 0 }}>Press & Media Mentions</div>
            <span className="text-muted text-xs">{confirmedPress.length} confirmed</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {(c.pressMentions || []).filter(m => m.confirmed !== false).map((m, i) => (
              <div key={i} style={{ background: 'var(--surface2)', border: `1px solid ${m.confirmed ? 'rgba(210,255,1,0.2)' : 'rgba(255,171,64,0.15)'}`, borderRadius: 6, padding: '10px 12px', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3, flexWrap: 'wrap' }}>
                    <span style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', background: m.outlet_tier === 'national' ? 'rgba(210,255,1,0.15)' : m.outlet_tier === 'regional' ? 'rgba(177,236,240,0.15)' : m.outlet_tier === 'niche' ? 'rgba(255,106,242,0.1)' : 'rgba(255,255,255,0.05)', color: m.outlet_tier === 'national' ? 'var(--lime)' : m.outlet_tier === 'regional' ? 'var(--cyan)' : m.outlet_tier === 'niche' ? 'var(--pink)' : 'var(--muted)', padding: '1px 6px', borderRadius: 3 }}>{m.outlet_tier || 'mention'}</span>
                    {m.confirmed && <span style={{ fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--lime)' }}>✓ Confirmed</span>}
                  </div>
                  <a href={m.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, fontWeight: 600, color: 'var(--white)', textDecoration: 'none', display: 'block', marginBottom: 2 }}>{m.title}</a>
                  <div style={{ fontSize: 11, color: 'var(--muted)' }}>{m.outlet}{m.date ? ' · ' + new Date(m.date).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : ''}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Tier strip + CTA ──────────────────────────────────────────────────── */}
      {(role === 'brand' && !isOwnProfile) && (
        <div style={{ background: 'var(--surface2)', borderRadius: 8, padding: '12px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 12, border: '1px solid var(--border)' }}>
          <TierBadge tier={c.tier || 'starter'} />
          <button className="btn btn-lime" onClick={onRequestPartnership}>Request Partnership →</button>
        </div>
      )}
    </div>
  );
}


function BriefDetailPage({ brief: b, onBack, role, myProfile }) {
  const matchResult = myProfile ? calcMatchScore(b, myProfile) : null;
  const fit = matchResult ? fitBlurb(b, matchResult) : null;
  return (
    <div>
      <button className="btn btn-ghost btn-sm" style={{ marginBottom: 16 }} onClick={onBack}>← Back to Discover</button>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 20, alignItems: 'start' }}>
        {/* Left col */}
        <div>
          {/* Hero facecard — image + brand info overlaid at bottom */}
          <div style={{ borderRadius: 12, overflow: 'hidden', position: 'relative', marginBottom: 14, background: '#000', aspectRatio: '16/9' }}>
            {/* Photo */}
            <img src={b.heroImage} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.85 }} onError={e => e.target.style.display='none'} />
            {/* Bottom gradient */}
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,0.0) 35%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.92) 100%)' }} />
            {/* Brand info overlay */}
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 20px 20px' }}>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 14, marginBottom: 12 }}>
                {/* Avatar */}
                <div style={{
                  width: 52, height: 52, borderRadius: 10, flexShrink: 0,
                  background: b.brandColor, color: '#000',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontFamily: 'Bebas Neue', fontSize: 24, border: '2px solid rgba(255,255,255,0.15)',
                }}>{b.brandInitial}</div>
                {/* Name + tagline */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'Bebas Neue', fontSize: 34, letterSpacing: '0.03em', color: '#fff', lineHeight: 1, textShadow: '0 1px 6px rgba(0,0,0,0.5)' }}>{b.brand}</div>
                  {b.brandTagline && <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.65)', marginTop: 2 }}>{b.brandTagline}</div>}
                </div>
                {/* Partnership type badge */}
                <span className={`tag tag-${b.partnershipTypeColor}`} style={{ fontSize: 12, padding: '5px 12px', flexShrink: 0, fontFamily: 'Barlow Condensed', fontWeight: 800, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{b.partnershipType}</span>
              </div>
            </div>
          </div>

          {/* Brand bio */}
          {b.brandBio && (
            <div className="card p-20 mb-14">
              <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.7 }}>{b.brandBio}</p>
            </div>
          )}

          {/* Partnership goals */}
          <div className="card p-20 mb-14" style={{ borderColor: 'rgba(255,235,100,0.2)', background: 'rgba(255,234,18,0.04)' }}>
            <div className="section-title mb-8">Partnership Goals</div>
            <p style={{ fontSize: 13, lineHeight: 1.7 }}>{b.goal}</p>
          </div>

          {/* What we're looking for */}
          <div className="card p-20 mb-14">
            <div className="section-title mb-8">What We're Looking For</div>
            <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.7 }}>{b.lookingFor}</p>
          </div>

          {role === 'community' && (
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-lime btn-lg" style={{ flex: 1, fontFamily: 'Barlow Condensed', fontWeight: 800, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Respond to Brief →</button>
              <button className="btn btn-ghost" style={{ fontFamily: 'Barlow Condensed', fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Save for Later</button>
            </div>
          )}
        </div>

        {/* Right col */}
        <div>
          {/* Fit summary — community view only, no metrics */}
          {role === 'community' && fit && (
            <div className="card p-16 mb-14" style={{ borderColor: fit.isFail ? 'rgba(255,80,80,0.25)' : fit.label ? (fit.label === 'Strong Fit' ? 'rgba(210,255,1,0.25)' : 'rgba(177,236,240,0.25)') : 'var(--border)' }}>
              {fit.label && (
                <div style={{ fontFamily: 'Barlow Condensed', fontSize: 12, fontWeight: 800, letterSpacing: '0.08em', textTransform: 'uppercase', color: fit.labelColor, marginBottom: 8 }}>★ {fit.label}</div>
              )}
              {fit.lines.map((line, i) => (
                <div key={i} style={{ fontSize: 13, color: fit.isFail ? 'rgba(255,100,100,0.9)' : 'var(--muted)', lineHeight: 1.6, marginBottom: i < fit.lines.length - 1 ? 6 : 0 }}>{line}</div>
              ))}
            </div>
          )}

          {/* Deliverables — top of right col */}
          {b.deliverables && b.deliverables.length > 0 && (
            <div className="card p-16 mb-14" style={{ borderColor: 'rgba(210,255,1,0.35)', background: 'rgba(210,255,1,0.04)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
                <div style={{ fontFamily: 'Bebas Neue', fontSize: 18, letterSpacing: '0.04em', color: 'var(--lime)' }}>What We Need From You</div>
              </div>
              {b.deliverables.map((d, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 0', borderBottom: i < b.deliverables.length - 1 ? '1px solid rgba(210,255,1,0.1)' : 'none' }}>
                  <div style={{ width: 22, height: 22, borderRadius: '50%', background: 'var(--lime)', color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontFamily: 'Barlow Condensed', fontWeight: 800, flexShrink: 0, marginTop: 1 }}>{i + 1}</div>
                  <div style={{ fontSize: 13, lineHeight: 1.55 }}>{d}</div>
                </div>
              ))}
            </div>
          )}

          {/* Budget */}
          <div className="metric-card lime mb-14">
            <div className="metric-label">Activation Budget</div>
            <div className="metric-value">{b.budget}</div>
            <div className="metric-sub">{b.budgetPeriod}</div>
          </div>

          {/* Support on Offer */}
          {b.products && b.products.length > 0 && (
            <div className="card p-16 mb-14">
              <div className="section-title mb-10">Support on Offer</div>
              {b.products.map((p, i) => (
                <div key={i} style={{ padding: '10px 0', borderBottom: i < b.products.length - 1 ? '1px solid var(--border)' : 'none' }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{typeof p === 'object' ? p.name : p}</div>
                  {typeof p === 'object' && p.description && <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 3, lineHeight: 1.5 }}>{p.description}</div>}
                </div>
              ))}
            </div>
          )}

          {/* Timeline */}
          <div className="card p-16 mb-14">
            <div className="section-title mb-10">Timeline</div>
            <div className="stat-row"><span className="text-muted text-xs">Posted</span><span style={{ fontSize: 13 }}>{b.posted}</span></div>
            <div className="stat-row"><span className="text-muted text-xs">Deadline</span><span style={{ fontSize: 13, color: 'var(--orange)' }}>{b.deadline}</span></div>
            <div className="stat-row"><span className="text-muted text-xs">Activation</span><span style={{ fontSize: 13 }}>{b.window}</span></div>
          </div>

          {/* Requirements */}
          <div className="card p-16 mb-14">
            <div className="section-title mb-10">Requirements</div>
            {Object.keys(b.requirements).length > 0
              ? Object.entries(b.requirements).map(([k, v]) => (
                  <div key={k} className="stat-row">
                    <span className="text-muted text-xs">{k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</span>
                    <span style={{ fontSize: 13, textAlign: 'right', maxWidth: '60%' }}>{String(v)}</span>
                  </div>
                ))
              : <span className="text-muted text-xs">No specific requirements listed.</span>
            }
          </div>

          {/* KPIs */}
          <div className="card p-16">
            <div className="section-title mb-10">KPIs</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {b.kpis.map(k => <span key={k} className="tag tag-cyan" style={{ display: 'block', textAlign: 'center', padding: '6px 10px' }}>{k}</span>)}
            </div>
          </div>

          {/* Interest tags */}
          {b.tags.length > 0 && (
            <div className="card p-16 mt-14">
              <div className="section-title mb-10">Community Interests</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {b.tags.map(t => <span key={t} className="tag tag-ghost">{t}</span>)}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ProjectPage({ project: p }) {
  const [chatInput, setChatInput] = useState('');
  const [messages, setMessages] = useState(p.chat);
  const [showPublisher, setShowPublisher] = useState(false);
  const [published, setPublished] = useState(false);

  // Admin: case study fields
  const [attendance, setAttendance] = useState('');
  const [postRate, setPostRate] = useState('');
  const [impressions, setImpressions] = useState('');
  const [emvCpm, setEmvCpm] = useState('8.50');
  const [adminQuotes, setAdminQuotes] = useState([{ text: '', name: '', handle: '' }]);
  const [adminContent, setAdminContent] = useState([{ caption: '', type: 'still', handle: '' }]);
  const [hashtag, setHashtag] = useState('');
  const [auditorNotes, setAuditorNotes] = useState('');

  const addAdminQuote = () => setAdminQuotes(q => [...q, { text: '', name: '', handle: '' }]);
  const updateAdminQuote = (i, f, v) => setAdminQuotes(q => q.map((item, idx) => idx === i ? { ...item, [f]: v } : item));
  const addAdminContent = () => setAdminContent(c => [...c, { caption: '', type: 'still', handle: '' }]);
  const updateAdminContent = (i, f, v) => setAdminContent(c => c.map((item, idx) => idx === i ? { ...item, [f]: v } : item));

  const emv = attendance && impressions ? (parseInt(impressions.replace(/,/g,'')) * parseFloat(emvCpm)).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }) : '—';

  const sendMsg = () => {
    if (!chatInput.trim()) return;
    setMessages([...messages, { from: 'me', text: chatInput, time: 'now' }]);
    setChatInput('');
  };

  const isReportingStage = p.milestones.find(m => m.name === 'Reporting');
  const reportingDone = isReportingStage?.status === 'complete';

  return (
    <div>
      <div className="flex items-center justify-between mb-20">
        <div>
          <div className="display" style={{ fontSize: 32 }}>{p.brand} × {p.community}</div>
          <div className="flex items-center gap-8 mt-8">
            <span className="tag tag-orange">{p.type}</span>
            <span className="text-muted text-xs">{p.startDate} — {p.endDate}</span>
          </div>
        </div>
        <div style={{ background: 'var(--green)', color: 'var(--black)', borderRadius: 6, padding: '6px 14px' }}>
          <span className="bc" style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' }}>On Schedule</span>
        </div>
      </div>

      <PipelineStepper stages={p.stages} />

      {/* Timeline */}
      <div className="card p-20 mb-16">
        <div className="section-header mb-16">
          <span className="section-title">Project Timeline</span>
          <span className="text-muted text-xs">Dec 2025 — Apr 2026</span>
        </div>
        <div style={{ marginBottom: 10 }}>
          {p.timeline.map((t, i) => (
            <div key={i} className="gantt-row">
              <div className="gantt-label">{t.label}</div>
              <div className="gantt-track">
                <div className="gantt-bar" style={{
                  left: `${t.start}%`, width: `${t.width}%`,
                  background: t.color || 'var(--surface3)',
                  color: t.color ? 'var(--black)' : 'var(--muted)',
                  opacity: t.status === 'pending' ? 0.4 : 1,
                }}>
                  {t.label}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="project-layout">
        {/* Left */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {/* Milestones */}
          <div className="card p-16">
            <div className="section-title mb-12">Milestones</div>
            {p.milestones.map((m, i) => (
              <div key={i} className="stat-row">
                <div className="flex items-center gap-10">
                  <div className={`status-dot ${statusDot[m.status]}`} />
                  <span style={{ fontSize: 13 }}>{m.name}</span>
                </div>
                <div className="flex items-center gap-10">
                  <span style={{
                    fontSize: 11, fontFamily: 'Barlow Condensed', fontWeight: 700,
                    textTransform: 'uppercase', letterSpacing: '0.06em',
                    color: m.status === 'complete' ? 'var(--green)' : m.status === 'shipped' ? 'var(--cyan)' : 'var(--muted)'
                  }}>
                    {m.status === 'pending' ? '—' : m.status.charAt(0).toUpperCase() + m.status.slice(1)}
                  </span>
                  <span className="text-muted text-xs">{m.date}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Logistics */}
          <div className="card p-16">
            <div className="section-title mb-12">Logistics</div>
            <div className="stat-row"><span className="text-muted text-xs">Inventory</span><span style={{ fontSize: 13 }}>100x Hyperice Boots (S:20 M:40 L:60)</span></div>
            <div className="stat-row"><span className="text-muted text-xs">Ship Date</span><span style={{ fontSize: 13 }}>{p.logistics.shipDate}</span></div>
            <div className="stat-row"><span className="text-muted text-xs">To</span><span style={{ fontSize: 13 }}>{p.logistics.address}</span></div>
            <div className="stat-row"><span className="text-muted text-xs">Tracking</span><span style={{ fontSize: 13, color: 'var(--cyan)' }}>{p.logistics.tracking}</span></div>
            <div className="stat-row"><span className="text-muted text-xs">Status</span><span style={{ fontSize: 13, color: 'var(--green)' }}>{p.logistics.trackStatus}</span></div>

        </div>

        {/* Right */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {/* Payments */}
          <div className="metric-card pink">

            <div style={{ marginTop: 10, fontSize: 12, opacity: 0.8 }}>{p.payments.terms}</div>
            <div className="flex gap-8 mt-8">
              <span style={{ background: 'rgba(0,0,0,0.2)', borderRadius: 4, padding: '3px 10px', fontSize: 12, fontWeight: 700, fontFamily: 'Barlow Condensed' }}>
                1st 75% · <span style={{ color: 'var(--black)' }}>Paid</span>
              </span>

                Final 25% · Not Due
              </span>
            </div>
          </div>

          {/* Team */}
          <div className="card p-16">
            <div className="section-title mb-10">Team</div>
            {p.team.map(m => (
              <div key={m.name} className="flex items-center gap-10 mb-8">
                <div className="avatar" style={{ background: 'var(--surface3)' }}>{m.name[0]}</div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{m.name}</div>
                  <div className="text-muted text-xs">{m.role}</div>
                </div>
                <button className="btn btn-ghost btn-sm" style={{ marginLeft: 'auto', fontSize: 11 }}>Contact</button>
              </div>
            ))}
          </div>

          {/* Chat */}
          <div className="card p-16">

              {messages.map((msg, i) => (

                  <div className="chat-bubble">{msg.text}</div>
                  <div className="chat-time">{msg.time}</div>
                </div>
              ))}
            </div>
            <div className="flex gap-8">
              <input
                className="input" style={{ flex: 1, padding: '7px 12px' }}
                placeholder="Send a message..."
                value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && sendMsg()}
              />
              <button className="btn btn-lime btn-sm" onClick={sendMsg}>Send</button>
            </div>
          </div>
        </div>
      </div>

      {/* ── Publish Case Study (Admin) ─────────────────────────── */}
      <div style={{ marginTop: 24, border: '1px solid var(--border2)', borderRadius: 10, overflow: 'hidden' }}>
        <div
          style={{ background: published ? 'rgba(179,255,158,0.06)' : 'var(--surface2)', padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', borderBottom: showPublisher ? '1px solid var(--border)' : 'none' }}
          onClick={() => !published && setShowPublisher(s => !s)}
        >
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: published ? 'var(--green)' : 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: published ? '#000' : 'var(--muted)', fontWeight: 700 }}>{published ? '✓' : '★'}</div>
            <div>
              <div style={{ fontFamily: 'Barlow Condensed', fontSize: 14, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: published ? 'var(--green)' : 'var(--white)' }}>
                {published ? 'Case Study Published' : 'Publish Case Study'}
              </div>
              <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 1 }}>
                {published ? 'Visible on Southbound 400\'s profile with Mayo Verified stamp' : 'Admin only — add verified data and publish to community profile'}
              </div>

          </div>
          {!published && <span style={{ color: 'var(--muted)', fontSize: 13 }}>{showPublisher ? '▲' : '▼'}</span>}
        </div>

        {showPublisher && !published && (
          <div style={{ padding: '20px 20px 24px' }}>

            {/* Platform-confirmed data — read only */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: 'Barlow Condensed', fontSize: 11, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--lime)', marginBottom: 10 }}>Platform-confirmed data</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10 }}>
                {[
                  { label: 'Brand', val: p.brand },
                  { label: 'Partnership Type', val: p.type },
                  { label: 'Budget', val: `$${p.payments.total.toLocaleString()}` },
                  { label: 'Period', val: `${p.startDate} — ${p.endDate}` },
                ].map(item => (
                  <div key={item.label} style={{ background: 'var(--surface2)', borderRadius: 7, padding: '10px 12px', border: '1px solid var(--border)' }}>
                    <div style={{ fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'Barlow Condensed', fontWeight: 700, marginBottom: 3 }}>{item.label}</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--white)' }}>{item.val}</div>
                  </div>
                ))}
              </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 16 }}>
              <div className="form-group" style={{ marginBottom: 0 }}>
                <label className="label">Verified Attendance</label>
                <input className="input" placeholder="e.g. 212" value={attendance} onChange={e => setAttendance(e.target.value)} />

              <div className="form-group" style={{ marginBottom: 0 }}>
                <label className="label">Post Rate %</label>

              </div>
              <div className="form-group" style={{ marginBottom: 0 }}>
                <label className="label">Total Impressions</label>

                <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 3 }}>From hashtag search + connected accounts</div>
              </div>
            </div>

            {/* EMV calculation */}
            <div style={{ background: 'rgba(255,171,64,0.06)', border: '1px solid rgba(255,171,64,0.2)', borderRadius: 8, padding: '14px 16px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 200 }}>

                <div style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.5 }}>EMV = Impressions × CPM benchmark. Formula disclosed to brands on the case study.</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 12, color: 'var(--muted)' }}>CPM $</span>
                <input className="input" style={{ width: 70 }} value={emvCpm} onChange={e => setEmvCpm(e.target.value)} />
                <span style={{ fontSize: 12, color: 'var(--muted)' }}>= </span>
                <span style={{ fontFamily: 'Bebas Neue', fontSize: 24, color: 'var(--orange)', letterSpacing: '0.03em' }}>{emv}</span>
              </div>
            </div>

            {/* Campaign hashtag */}
            <div className="form-group">
              <label className="label">Campaign Hashtag <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— used to track post rate and impressions</span></label>

            <div className="form-group">
              <label className="label">Auditor Notes <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— internal only, not published</span></label>

            <div style={{ height: 1, background: 'var(--border)', marginBottom: 16 }} />

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                <label className="label" style={{ marginBottom: 0 }}>Quotes <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— gathered on the ground</span></label>

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>

];

const AVATAR_COLORS_P = [
  { bg:'#d2ff01', text:'#000' }, { bg:'#b1ecf0', text:'#000' },
  { bg:'#ff6ef2', text:'#000' }, { bg:'#ffab40', text:'#000' },
  { bg:'#b3ff9e', text:'#000' }, { bg:'#ffea12', text:'#000' },
  { bg:'#ff6b6b', text:'#000' },
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = ((h << 5) - h + (name||'').charCodeAt(i)) | 0;
  return AVATAR_COLORS_P[Math.abs(h) % AVATAR_COLORS_P.length];
}

function Lightbox({ items, startIndex, onClose }) {
  const norm = (items||[]).map(i => typeof i === 'string' ? {url:i} : i);
  const [idx, setIdx] = React.useState(startIndex || 0);
  React.useEffect(() => {
    const h = e => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setIdx(i => Math.min(i+1, norm.length-1));
      if (e.key === 'ArrowLeft') setIdx(i => Math.max(i-1, 0));
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [norm.length]);
  const cur = norm[idx] || {};
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.93)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={e=>e.stopPropagation()} style={{ display:'flex', flexDirection:'column', alignItems:'center', maxWidth:'90vw', position:'relative' }}>
        <button onClick={onClose} style={{ position:'absolute', top:-14, right:-14, background:'rgba(255,255,255,0.15)', border:'none', borderRadius:'50%', width:30, height:30, color:'#fff', fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1 }}>✕</button>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          {norm.length > 1 && <button onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0} style={{ background:'rgba(255,255,255,0.12)', border:'none', borderRadius:'50%', width:40, height:40, color:'#fff', fontSize:20, cursor:'pointer', opacity:idx===0?0.3:1, flexShrink:0 }}>‹</button>}
          <img src={cur.url} alt="" style={{ maxWidth:'75vw', maxHeight:'70vh', objectFit:'contain', borderRadius:8, display:'block' }} />
          {norm.length > 1 && <button onClick={()=>setIdx(i=>Math.min(i+1,norm.length-1))} disabled={idx===norm.length-1} style={{ background:'rgba(255,255,255,0.12)', border:'none', borderRadius:'50%', width:40, height:40, color:'#fff', fontSize:20, cursor:'pointer', opacity:idx===norm.length-1?0.3:1, flexShrink:0 }}>›</button>}
        </div>
        {cur.caption && <div style={{ textAlign:'center', marginTop:12, fontSize:13, color:'rgba(255,255,255,0.65)', maxWidth:500 }}>{cur.caption}</div>}
        {norm.length > 1 && <div style={{ marginTop:10, color:'rgba(255,255,255,0.4)', fontSize:11, fontFamily:'Barlow Condensed', fontWeight:600 }}>{idx+1} / {norm.length}</div>}
      </div>
    </div>
  );
}

function MyProfileModule({ userId, onEdit }) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [copied, setCopied] = React.useState(false);
  const [lightbox, setLightbox] = React.useState(null);
  const [syncing, setSyncing] = React.useState(false);
  const [syncMsg, setSyncMsg] = React.useState('');

  function loadData() {
    if (!userId) { setLoading(false); return; }
    fetch(`/api/community/${userId}`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }

  React.useEffect(() => { loadData(); }, [userId]);

  async function handleIgSync() {
    setSyncing(true); setSyncMsg('');
    try {
      const token = getToken();
      const res = await fetch(`/api/community/${userId}/refresh-instagram`, {
        method: 'POST',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
      });
      const result = await res.json();
      setSyncMsg(result.message || 'Sync started — reloading in a few seconds.');
      setTimeout(() => { setLoading(true); setSyncMsg(''); loadData(); }, 6000);
    } catch(e) {
      setSyncMsg('Sync failed. Please try again.');
    } finally {
      setSyncing(false);
    }
  }

  if (loading) return <div style={{ padding: 60, textAlign: 'center', color: 'var(--muted)', fontFamily: 'Barlow Condensed', fontSize: 13, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Loading profile…</div>;
