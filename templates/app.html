          {data.substack_url && (
            <div>
              <div className="text-muted text-xs mb-4">Substack</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                <div style={{ width: 22, height: 22, borderRadius: 5, background: '#ff671922', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontFamily: 'Barlow Condensed', fontWeight: 800, fontSize: 11, color: '#ff6719' }}>S</div>
                <a href={data.substack_url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 13, color: '#ff6719', textDecoration: 'none' }}>{data.substack_url.replace(/^https?:\/\//, '').replace(/\/$/, '')}</a>
              </div>
            </div>
          )}
        </div>
        {data.description && (
          <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--border)' }}>
            <div className="text-muted text-xs mb-6" style={{ marginBottom: 6 }}>Description</div>
            <div style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.7 }}>{data.description}</div>
          </div>
        )}
      </div>


      {/* Capabilities */}
      {capabilities.length > 0 && (
        <div className="card p-20 mb-14">
          <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase', marginBottom: 12 }}>What We Offer</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
            {capabilities.map(cap => <span key={cap} className="tag tag-ghost">{cap}</span>)}
          </div>
        </div>
      )}

      {/* Partnership prefs */}
      {partnershipPrefs && (
        <div className="card p-20 mb-14">
          <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase', marginBottom: 10 }}>What We Look For</div>
          <div style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.75, fontStyle: 'italic', borderLeft: '2px solid var(--lime)', paddingLeft: 14 }}>"{partnershipPrefs}"</div>
        </div>
      )}

      {/* Archetype — admin/brand only, not shown in community's own dash view */}
      {false && archetype && (
        <div className="card p-20 mb-14">
          <div style={{ fontFamily: 'Barlow Condensed', fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 10 }}>Community Type</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: data.archetype_reasoning ? 12 : 0 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: archetype.color, flexShrink: 0 }} />
            <div style={{ fontFamily: 'Barlow Condensed', fontSize: 17, fontWeight: 800, textTransform: 'uppercase', color: archetype.color }}>{archetype.label}</div>
            <div style={{ fontFamily: 'Barlow Condensed', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', color: 'var(--muted)', marginLeft: 4 }}>Best for {archetype.best}</div>
          </div>
          {data.archetype_reasoning
            ? <div style={{ fontSize: 12, color: 'var(--muted)', lineHeight: 1.6, borderLeft: '2px solid ' + archetype.color, paddingLeft: 12 }}>{data.archetype_reasoning}</div>
            : <div style={{ fontSize: 12, color: 'var(--muted)', lineHeight: 1.55 }}>{archetype.desc}</div>
          }
        </div>
      )}

      {/* Unified content feed — IG + Substack merged, chronological */}
      {(igConnected || substackPosts.length > 0) && (() => {
        const igItems = igPosts.slice(0, 12).map(p => ({
          type: 'ig',
          url: p.permalink || (igProfile.username ? `https://instagram.com/${igProfile.username}` : '#'),
          thumb: p.media_url || p.thumbnail_url,
          date: p.timestamp ? new Date(p.timestamp) : null,
        }));
        const subItems = substackPosts.slice(0, 8).map(p => ({
          type: 'substack',
          url: p.link,
          thumb: p.image_url || null,
          title: p.title,
          date: p.date ? new Date(p.date) : null,
        }));
        const merged = [...igItems, ...subItems]
          .sort((a, b) => (b.date || 0) - (a.date || 0));
        const hasContent = merged.length > 0;

        return (
          <div className="card p-20 mb-14">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase' }}>Latest Content</div>
              <button onClick={handleIgSync} disabled={syncing} className="btn btn-ghost btn-sm">{syncing ? 'Syncing…' : '↺ Sync'}</button>
            </div>
            {hasContent ? (
              <div className="content-feed" style={{ display: 'flex', gap: 10, overflowX: 'auto', paddingBottom: 12 }}>
                {merged.map((item, i) => item.type === 'ig' ? (
                  <a key={i} href={item.url} target="_blank" rel="noopener noreferrer"
                    style={{ flexShrink: 0, width: 220, height: 220, borderRadius: 8, overflow: 'hidden', display: 'block', textDecoration: 'none', background: 'var(--surface2)', position: 'relative' }}>
                    <img src={item.thumb} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} onError={e => e.target.style.display='none'} />
                    <div style={{ position: 'absolute', bottom: 8, left: 8, width: 20, height: 20, borderRadius: 5, background: '#e1306c', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </div>
                  </a>
                ) : (
                  <a key={i} href={item.url} target="_blank" rel="noopener noreferrer"
                    style={{ flexShrink: 0, width: 200, height: 220, borderRadius: 8, overflow: 'hidden', display: 'flex', flexDirection: 'column', textDecoration: 'none', background: 'var(--surface2)', border: '1px solid var(--border)', position: 'relative' }}>
                    {item.thumb
                      ? <img src={item.thumb} alt="" style={{ width: '100%', height: 150, objectFit: 'cover', display: 'block', flexShrink: 0 }} onError={e => e.target.style.display='none'} />
                      : <div style={{ height: 150, background: 'linear-gradient(135deg, #1a0800, #7a3500)', flexShrink: 0 }} />
                    }
                    <div style={{ padding: '8px 10px', flex: 1 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: '#fff', lineHeight: 1.4, overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical' }}>{item.title}</div>
                    </div>
                    <div style={{ position: 'absolute', bottom: 8, left: 8, width: 20, height: 20, borderRadius: 5, background: '#ff6719', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 800, color: '#fff', fontFamily: 'Barlow Condensed' }}>S</div>
                  </a>
                ))}
              </div>
            ) : (
              <div style={{ fontSize: 13, color: 'var(--muted)', padding: '12px 0' }}>
                No posts loaded yet.{' '}
                <button onClick={handleIgSync} disabled={syncing} style={{ background: 'none', border: 'none', padding: 0, cursor: 'pointer', fontSize: 13, color: 'var(--cyan)', textDecoration: 'underline', fontFamily: 'inherit' }}>{syncing ? 'Syncing…' : 'Sync now'}</button>
              </div>
            )}
            {syncMsg && <div style={{ fontSize: 12, color: 'var(--cyan)', marginTop: 8 }}>{syncMsg}</div>}
          </div>
        );
      })()}

      {/* Photos & Events */}
      {mediaItems.length > 0 && (
        <div className="card p-20 mb-14">
          <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase', marginBottom: 12 }}>Photos &amp; Events</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
            {mediaItems.map((item, i) => (
              <div key={i} onClick={() => setLightbox({ items: mediaItems.map(m => ({ url: m.url, caption: m.caption || undefined })), index: i })} style={{ cursor: 'pointer', aspectRatio: '1', borderRadius: 8, overflow: 'hidden', background: 'var(--surface2)', border: '1px solid var(--border)', position: 'relative' }}>
                <img src={item.url} alt={item.caption || ''} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                {item.caption && <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '12px 8px 6px', background: 'linear-gradient(to top, rgba(0,0,0,0.35), transparent)', fontSize: 10, color: '#fff', lineHeight: 1.35 }}>{item.caption}</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Notable Members */}
      {notableMembers.length > 0 && (
        <div className="card p-20 mb-14">
          <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase', marginBottom: 12 }}>Notable Members</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
            {notableMembers.map((m, i) => {
              const ac = avatarColor(m.name);
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8 }}>
                  <div style={{ width: 36, height: 36, borderRadius: '50%', background: ac.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Barlow Condensed', fontSize: 15, fontWeight: 700, color: ac.text, flexShrink: 0 }}>{(m.name || '?')[0].toUpperCase()}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.name}</div>
                    {m.ig_handle && (
                      <a href={`https://instagram.com/${m.ig_handle}`} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: 'var(--muted)', textDecoration: 'none', display: 'block', marginTop: 1 }}>@{m.ig_handle}</a>
                    )}
                    {m.role && <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'Barlow Condensed', fontWeight: 600, textTransform: 'uppercase', marginTop: 2 }}>{m.role}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Past Partnerships */}
      {caseStudies.length > 0 && (
        <div className="card p-20 mb-14">
          <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase', marginBottom: 12 }}>Past Partnerships</div>
          {caseStudies.map((cs, i) => {
            const imgs = cs.images?.length ? cs.images : cs.image_url ? [cs.image_url] : [];
            return (
              <div key={i} style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden', marginBottom: 8 }}>
                {imgs.length > 0 && (
                  <div onClick={() => setLightbox({ items: imgs.map(url => ({ url, title: cs.brand })), index: 0 })} style={{ cursor: 'pointer', position: 'relative', height: 180, overflow: 'hidden' }}>
                    <img src={imgs[0]} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                    {imgs.length > 1 && <div style={{ position: 'absolute', bottom: 8, right: 8, background: 'rgba(0,0,0,0.65)', borderRadius: 4, padding: '3px 8px', fontFamily: 'Barlow Condensed', fontSize: 11, fontWeight: 700, color: '#fff' }}>+{imgs.length - 1} more</div>}
                  </div>
                )}
                <div style={{ padding: '12px 14px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: cs.description ? 4 : 0 }}>
                    <div className="bc" style={{ fontSize: 14, fontWeight: 800, textTransform: 'uppercase' }}>{cs.brand}</div>
                    {cs.year && <div style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'Barlow Condensed', fontWeight: 600 }}>{cs.year}</div>}
                  </div>
                  {cs.description && <div style={{ fontSize: 12, color: 'var(--muted)', lineHeight: 1.5 }}>{cs.description}</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {lightbox && <Lightbox items={lightbox.items} startIndex={lightbox.index} onClose={() => setLightbox(null)} />}
    </div>
  );
}

// ─── EDIT PROFILE MODULE ─────────────────────────────────────────────────────

function EditProfileModule({ userId, onDone }) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [uploadingPhoto, setUploadingPhoto] = React.useState(false);
  const [photoCaption, setPhotoCaption] = React.useState('');
  const photoInputRef = React.useRef(null);
  const coverInputRef = React.useRef(null);

  // Editable fields
  const [name, setName] = React.useState('');
  const [tagline, setTagline] = React.useState('');
  const [location, setLocation] = React.useState('');
  const [description, setDescription] = React.useState('');
  const [activeMembers, setActiveMembers] = React.useState('');
  const [website, setWebsite] = React.useState('');
  const [substackUrl, setSubstackUrl] = React.useState('');
  const [partnershipPrefs, setPartnershipPrefs] = React.useState('');
  const [tagsStr, setTagsStr] = React.useState('');
  const [capabilitiesStr, setCapabilitiesStr] = React.useState('');
  const [selectedCover, setSelectedCover] = React.useState(1);
  const [mediaItems, setMediaItems] = React.useState([]);

  React.useEffect(() => {
    if (!userId) { setLoading(false); return; }
    fetch(`/api/community/${userId}`)
      .then(r => r.json())
      .then(d => {
        setData(d);
        setName(d.name || '');
        setTagline(d.tagline || '');
        setLocation(d.location || '');
        setDescription(d.description || '');
        setActiveMembers(d.active_members ? String(d.active_members) : '');
        setWebsite(d.website || '');
        setSubstackUrl(d.substack_url || '');
        setPartnershipPrefs(d.partnership_preferences || '');
        setTagsStr((d.tags || []).join(', '));
        setCapabilitiesStr((d.capabilities || []).join(', '));
        setSelectedCover(d.cover_option || 1);
        setMediaItems(d.media_items || []);
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, [userId]);

  async function handleSave() {
    setSaving(true);
    try {
      const token = getToken();
      await fetch(`/api/community/${userId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) },
        body: JSON.stringify({
          name, tagline, location, description,
          active_members: activeMembers ? parseInt(activeMembers) : null,
          website, substack_url: substackUrl,
          partnership_preferences: partnershipPrefs,
          tags: tagsStr ? tagsStr.split(',').map(s => s.trim()).filter(Boolean) : [],
          capabilities: capabilitiesStr ? capabilitiesStr.split(',').map(s => s.trim()).filter(Boolean) : [],
          cover_option: selectedCover,
        }),
      });
      setSaved(true);
      setTimeout(() => { setSaved(false); onDone(); }, 1200);
    } catch(e) {
      alert('Failed to save. Please try again.');
    } finally {
      setSaving(false);
    }
  }

  async function handlePhotoUpload(file) {
    if (!file) return;
    setUploadingPhoto(true);
    try {
      const token = getToken();
      const fd = new FormData();
      fd.append('file', file);
      fd.append('caption', photoCaption);
      const res = await fetch(`/api/community/${userId}/media`, {
        method: 'POST',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        body: fd,
      });
      const result = await res.json();
      setMediaItems(prev => [...prev, { url: result.url, caption: result.caption }]);
      setPhotoCaption('');
    } catch(e) {
      alert('Failed to upload photo.');
    } finally {
      setUploadingPhoto(false);
    }
  }

  async function handleCoverUpload(file) {
    if (!file) return;
    try {
      const token = getToken();
      const fd = new FormData();
      fd.append('file', file);
      await fetch(`/api/community/${userId}/cover`, {
        method: 'POST',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        body: fd,
      });
      alert('Cover photo updated! Reload to see changes.');
    } catch(e) {
      alert('Failed to upload cover photo.');
    }
  }

  if (loading) return <div style={{ padding: 60, textAlign: 'center', color: 'var(--muted)' }}>Loading…</div>;

  const labelStyle = { fontFamily: 'Barlow Condensed', fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 6, display: 'block' };
  const inputStyle = { width: '100%', background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 6, padding: '9px 12px', fontSize: 13, color: 'var(--white)', fontFamily: 'Barlow, sans-serif', outline: 'none' };
  const textareaStyle = { ...inputStyle, resize: 'vertical', minHeight: 80 };

  return (
    <div style={{ maxWidth: 680 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
        <div>
          <div className="bb" style={{ fontSize: 28, marginBottom: 4 }}>Edit Your Profile</div>
          <div style={{ fontSize: 13, color: 'var(--muted)' }}>Changes save immediately and appear on your public profile.</div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-ghost" onClick={onDone}>Cancel</button>
          <button className="btn btn-lime" onClick={handleSave} disabled={saving || saved}>
            {saved ? '✓ Saved!' : saving ? 'Saving…' : 'Save Changes'}
          </button>
        </div>
      </div>

      {/* Basic info */}
      <div className="card p-20 mb-14">
        <div className="bc" style={{ fontSize: 14, fontWeight: 800, textTransform: 'uppercase', marginBottom: 16 }}>Basic Info</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <div>
            <label style={labelStyle}>Community Name</label>
            <input style={inputStyle} value={name} onChange={e => setName(e.target.value)} placeholder="Your community name" />
          </div>
          <div>
            <label style={labelStyle}>Location</label>
            <input style={inputStyle} value={location} onChange={e => setLocation(e.target.value)} placeholder="e.g. Los Angeles, CA" />
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <label style={labelStyle}>Tagline</label>
            <input style={inputStyle} value={tagline} onChange={e => setTagline(e.target.value)} placeholder="One-line description of your community" />
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <label style={labelStyle}>Description</label>
            <textarea style={textareaStyle} value={description} onChange={e => setDescription(e.target.value)} placeholder="Tell brands about your community…" />
          </div>
          <div>
            <label style={labelStyle}>Active Members</label>
            <input style={inputStyle} type="number" value={activeMembers} onChange={e => setActiveMembers(e.target.value)} placeholder="e.g. 500" />
          </div>
          <div>
            <label style={labelStyle}>Website</label>
            <input style={inputStyle} value={website} onChange={e => setWebsite(e.target.value)} placeholder="https://yoursite.com" />
          </div>
          <div>
            <label style={labelStyle}>Substack URL</label>
            <input style={inputStyle} value={substackUrl} onChange={e => setSubstackUrl(e.target.value)} placeholder="https://yourname.substack.com" />
          </div>
        </div>
      </div>

      {/* Tags & capabilities */}
      <div className="card p-20 mb-14">
        <div className="bc" style={{ fontSize: 14, fontWeight: 800, textTransform: 'uppercase', marginBottom: 16 }}>Tags &amp; Capabilities</div>
        <div style={{ marginBottom: 14 }}>
          <label style={labelStyle}>Interest Tags <span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>(comma-separated)</span></label>
          <input style={inputStyle} value={tagsStr} onChange={e => setTagsStr(e.target.value)} placeholder="Running, Fitness, Community, LA" />
        </div>
        <div>
          <label style={labelStyle}>Capabilities <span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>(comma-separated)</span></label>
          <input style={inputStyle} value={capabilitiesStr} onChange={e => setCapabilitiesStr(e.target.value)} placeholder="Event Activation, Social Content, Email Blast" />
        </div>
      </div>

      {/* Partnership prefs */}
      <div className="card p-20 mb-14">
        <div className="bc" style={{ fontSize: 14, fontWeight: 800, textTransform: 'uppercase', marginBottom: 12 }}>Partnership Preferences</div>
        <textarea style={textareaStyle} value={partnershipPrefs} onChange={e => setPartnershipPrefs(e.target.value)} placeholder="What kinds of brands and partnerships are you looking for?" />
      </div>

      {/* Cover */}
      <div className="card p-20 mb-14">
        <div className="bc" style={{ fontSize: 14, fontWeight: 800, textTransform: 'uppercase', marginBottom: 14 }}>Profile Cover</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginBottom: 14 }}>
          {COVER_OPTIONS.map(opt => (
            <div key={opt.id} onClick={() => setSelectedCover(opt.id)}
              style={{ aspectRatio: '3/4', borderRadius: 8, background: opt.gradient, cursor: 'pointer', border: selectedCover === opt.id ? '2px solid var(--lime)' : '2px solid transparent', position: 'relative', overflow: 'hidden' }}>
              {selectedCover === opt.id && <div style={{ position: 'absolute', top: 6, right: 6, width: 16, height: 16, borderRadius: '50%', background: 'var(--lime)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: '#000', fontWeight: 700 }}>✓</div>}
              <div style={{ position: 'absolute', bottom: 4, left: 0, right: 0, textAlign: 'center', fontFamily: 'Barlow Condensed', fontSize: 9, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)' }}>{opt.label}</div>
            </div>
          ))}
        </div>
        <div>
          <label style={labelStyle}>Or upload a photo</label>
          <input ref={coverInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => handleCoverUpload(e.target.files[0])} />
          <button className="btn btn-ghost btn-sm" onClick={() => coverInputRef.current.click()}>Upload Cover Photo</button>
        </div>
      </div>

      {/* Photos & Events */}
      <div className="card p-20 mb-14">
        <div className="bc" style={{ fontSize: 14, fontWeight: 800, textTransform: 'uppercase', marginBottom: 14 }}>Photos &amp; Events</div>
        {mediaItems.length > 0 && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 14 }}>
            {mediaItems.map((item, i) => (
              <div key={i} style={{ aspectRatio: '1', borderRadius: 8, overflow: 'hidden', position: 'relative', background: 'var(--surface2)' }}>
                <img src={item.url} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                {item.caption && <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '10px 6px 5px', background: 'linear-gradient(to top, rgba(0,0,0,0.35), transparent)', fontSize: 9, color: '#fff', lineHeight: 1.3 }}>{item.caption}</div>}
              </div>
            ))}
          </div>
        )}
        <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Caption (optional)</label>
            <input style={inputStyle} value={photoCaption} onChange={e => setPhotoCaption(e.target.value)} placeholder="Add a caption for this photo" />
          </div>
          <div>
            <input ref={photoInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => handlePhotoUpload(e.target.files[0])} />
            <button className="btn btn-ghost btn-sm" onClick={() => photoInputRef.current.click()} disabled={uploadingPhoto}>
              {uploadingPhoto ? 'Uploading…' : '+ Add Photo'}
            </button>
          </div>
        </div>
      </div>

      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 8 }}>
        <button className="btn btn-ghost" onClick={onDone}>Cancel</button>
        <button className="btn btn-lime" onClick={handleSave} disabled={saving || saved}>
          {saved ? '✓ Saved!' : saving ? 'Saving…' : 'Save Changes'}
        </button>
      </div>
    </div>
  );
}

function DashboardHome({ role, user, communities: COMMUNITIES = [], briefs: BRIEFS = [], onNavigate, myProfile, onCreateBrief }) {
  const isBrand = role === 'brand';
  const firstName = user ? user.name.split(' ')[0] : 'there';
  const myCommunity = myProfile || (!isBrand && user ? COMMUNITIES.find(c => c.id === user.id) : null);

  const myBriefCount = isBrand ? BRIEFS.filter(b => b.brandId === user?.id).length : 0;
  const summaryCards = isBrand ? [
    { label: 'Communities on Mayo', val: String(COMMUNITIES.length), color: COMMUNITIES.length ? 'lime' : 'dark' },
    { label: 'Open Briefs', val: String(myBriefCount), color: myBriefCount ? 'cyan' : 'dark' },
    { label: 'Active Partnerships', val: '0', color: 'dark' },
    { label: 'Total Spend', val: '$0', color: 'dark' },
  ] : [
    { label: 'Open Briefs', val: String(BRIEFS.length), color: BRIEFS.length ? 'cyan' : 'dark' },
    { label: 'Active Projects', val: '0', color: 'dark' },
    { label: 'My Proposals', val: '0', color: 'dark' },
  ];

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 20 }}>
        <div className="display" style={{ fontSize: 36 }}>{"Good morning, " + firstName + "."}</div>
        {isBrand && onCreateBrief && (
          <button className="btn btn-lime" style={{ fontSize: 14, padding: '12px 24px' }} onClick={onCreateBrief}>
            + Create a Brief
          </button>
        )}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${summaryCards.length}, 1fr)`, gap: 14, marginBottom: 28 }}>
        {summaryCards.map(c => (
          <div key={c.label} className={"metric-card " + c.color}>
            <div className="metric-label">{c.label}</div>
            <div className="metric-value sm">{c.val}</div>
          </div>
        ))}
      </div>

      {/* Discover CTA for community users */}
      {!isBrand && (
        <div style={{ marginBottom: 20, padding: '20px 24px', background: 'rgba(210,255,1,0.05)', border: '1px solid rgba(210,255,1,0.2)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
          <div>
            <div className="bc" style={{ fontSize: 15, fontWeight: 800, textTransform: 'uppercase', marginBottom: 3 }}>
              {BRIEFS.length > 0 ? `${BRIEFS.length} Open Brief${BRIEFS.length !== 1 ? 's' : ''} Available` : 'Discover Brand Partnerships'}
            </div>
            <div style={{ fontSize: 13, color: 'var(--muted)' }}>
              {BRIEFS.length > 0 ? 'Brands are looking for community partners like yours.' : 'Browse open briefs and pitch your community to brands.'}
            </div>
          </div>
          <button className="btn btn-lime" onClick={() => onNavigate('discover')}>Browse Briefs →</button>
        </div>
      )}

      {/* Community profile snapshot */}
      {!isBrand && myCommunity && (
        <div className="card mb-20" style={{ overflow: 'hidden' }}>
          <div style={{ height: 80, position: 'relative', background: myCommunity.coverGradient || 'var(--surface3)' }}>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to right, rgba(8,8,8,0.425), rgba(8,8,8,0.2))' }} />
            <div style={{ position: 'absolute', inset: 0, padding: '0 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div className="bc" style={{ fontSize: 20, fontWeight: 800, textTransform: 'uppercase' }}>{myCommunity.name}</div>
                <div className="flex items-center gap-8 mt-4">
                  <TierBadge tier={myCommunity.tier} />
                  {myCommunity.tags.slice(0, 2).map(t => <span key={t} className="tag tag-ghost" style={{ fontSize: 10 }}>{t}</span>)}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={() => onNavigate('profile')}>View My Profile →</button>
            </div>
          </div>
          <div style={{ padding: '14px 20px' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
              <div>
                <div className="text-muted text-xs mb-4">Active Members</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{(myCommunity.activeMembers || 0).toLocaleString()}</div>
              </div>
              <div>
                <div className="text-muted text-xs mb-4">Instagram Followers</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: myCommunity.reach ? 'var(--white)' : 'var(--muted)' }}>
                  {myCommunity.reach ? myCommunity.reach.toLocaleString() : '—'}
                </div>
              </div>
              <div>
                <div className="text-muted text-xs mb-4">Engagement Rate</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: myCommunity.engagement !== '—' ? 'var(--lime)' : 'var(--muted)' }}>
                  {myCommunity.engagement !== '—' ? myCommunity.engagement + '%' : '—'}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Welcome card for new users whose community hasn't loaded yet */}
      {!isBrand && !myCommunity && (
        <div className="card mb-20 p-20" style={{ borderColor: 'rgba(210,255,1,0.15)', background: 'rgba(210,255,1,0.03)' }}>
          <div className="bc" style={{ fontSize: 16, fontWeight: 800, textTransform: 'uppercase', marginBottom: 6 }}>Welcome to Mayo.</div>
          <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.6, marginBottom: 16 }}>Your profile is live. Brands will be able to discover your community and send partnership proposals here.</p>
          <button className="btn btn-lime btn-sm" onClick={() => onNavigate('profile')}>View My Profile →</button>
        </div>
      )}

      <div>
        <div className="section-header mb-14">
          <span className="section-title">{isBrand ? "Recommended Communities" : "Open Briefs"}</span>
          <button className="btn btn-ghost btn-sm" onClick={() => onNavigate('discover')}>See All →</button>
        </div>
        {isBrand ? (
          COMMUNITIES.length > 0
            ? <div className="community-grid">{COMMUNITIES.slice(0, 5).map(c => <CommunityCard key={c.id} c={c} onClick={() => onNavigate('discover')} />)}</div>
            : <div style={{ padding: '28px 0', textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>Communities joining Mayo will appear here.</div>
        ) : (
          BRIEFS.length > 0
            ? <div className="community-grid">{BRIEFS.slice(0, 2).map(b => { const ms = myProfile ? (calcMatchScore(b, myProfile)?.score ?? null) : null; return <BriefCard key={b.id} b={b} onClick={() => onNavigate('discover')} showMatch={true} matchScore={ms} />; })}</div>
            : <div style={{ padding: '28px 0', textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>No open briefs yet. We'll notify you when brands post opportunities that match your community.</div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('loading');
  const [role, setRole] = useState(null);
  const [user, setUser] = useState(null);
  const [communities, setCommunities] = useState([]);
  const [briefs, setBriefs] = useState([]);
  const [activePage, setActivePage] = useState('home');
  const [selectedCommunity, setSelectedCommunity] = useState(null);
  const [selectedBrief, setSelectedBrief] = useState(null);
  const [creatingBrief, setCreatingBrief] = useState(false);
  const [activeBriefFilter, setActiveBriefFilter] = useState(null);

  useEffect(() => {
    // Check stored auth
    const stored = getStoredUser();
    const token = getToken();
    if (stored && token) {
      setUser(stored);
      setRole(stored.role);
      setScreen('app');
    } else {
      setScreen('login');
    }
    // Fetch public data — retry once after 4s to handle Render cold-start 502s
    const fetchWithRetry = (path, onSuccess, delay = 0) => {
      const attempt = () => apiFetch(path).then(onSuccess).catch(() => {
        if (delay === 0) setTimeout(() => fetchWithRetry(path, onSuccess, 4000), 4000);
      });
      if (delay) setTimeout(attempt, delay); else attempt();
    };
    fetchWithRetry('/api/communities', data => {
      const mapped = data.map(mapCommunity);
      setCommunities(mapped);
      COMMUNITIES = mapped;
    });
    fetchWithRetry('/api/briefs', data => {
      const mapped = data.map(mapBrief);
      if (mapped.length > 0) setBriefs(mapped);
    });
  }, []);

  const handleLogin = (r, userData) => {
    setRole(r);
    setUser(userData);
    setScreen('app');
  };

  const handleLogout = () => {
    clearAuth();
    setUser(null);
    setRole(null);
    setScreen('login');
  };

  const navigate = (page) => {
    setActivePage(page);
    setSelectedCommunity(null);
    setSelectedBrief(null);
    setCreatingBrief(false);
  };

  const handlePublishBrief = async (brief) => {
    // Try to save to API, fallback gracefully
    try {
      const saved = await apiFetch('/api/briefs', { method: 'POST', body: JSON.stringify({
        title: brief.title || brief.goal,
        goal: brief.goal,
        campaign_goal: brief.campaignGoal,
        partnership_type: brief.partnershipType,
        budget: (brief.budget || '').replace(/[$,]/g, ''),
        budget_period: brief.budgetPeriod,
        products: brief.products,
        deliverables: brief.deliverables || [],
        tags: brief.tags,
        requirements: brief.requirements || {},
        kpis: brief.kpis || [],
        deadline: brief.deadline,
        activation_window: brief.window,
        looking_for: brief.lookingFor,
      }) });
      // Upload cover image if provided
      if (brief.coverImageFile) {
        try {
          const fd = new FormData();
          fd.append('file', brief.coverImageFile);
          const imgResp = await fetch(`/api/briefs/${saved.id}/cover`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${getToken()}` },
            body: fd,
          });
          if (imgResp.ok) {
            const imgData = await imgResp.json();
            saved.cover_image_url = imgData.url;
          }
        } catch(imgErr) { /* non-fatal */ }
      }
      const mappedBrief = mapBrief({ ...saved, brand_name: user ? user.name : 'Unknown' });
      setBriefs(prev => [mappedBrief, ...prev]);
      setCreatingBrief(false);
      setActiveBriefFilter(mappedBrief);
      setActivePage('discover');
      setSelectedCommunity(null);
      setSelectedBrief(null);
    } catch(e) {
      // Fallback: just navigate with local brief data
      setCreatingBrief(false);
      setActiveBriefFilter({ ...brief, id: Date.now() });
      setActivePage('discover');
      setSelectedCommunity(null);
      setSelectedBrief(null);
    }
  };

  const handleSetBriefFilter = (brief) => setActiveBriefFilter(brief);

  if (screen === 'loading') return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--black)' }}>
      <div style={{ fontFamily: 'Bebas Neue', fontSize: 36, color: 'var(--lime)' }}>mayo.</div>
    </div>
  );

  if (screen === 'login') return <LoginScreen onLogin={handleLogin} />;
  if (creatingBrief) return <BriefCreation onPublish={handlePublishBrief} onCancel={() => setCreatingBrief(false)} user={user} />;

  const isBrand = role === 'brand';

  const navBrand = [
    { id: 'home', label: 'Home', icon: '⊞' },
    { id: 'discover', label: 'Discover', icon: '◎', badge: !isBrand && briefs.length > 0 ? briefs.length : null },
    { id: 'briefs', label: isBrand ? 'My Briefs' : 'My Proposals', icon: '◫' },
    { id: 'project', label: 'Projects', icon: '◷' },
    { id: 'measure', label: 'Reporting', icon: '◈' },
  ];
  const navBottom = [
    { id: 'profile', label: 'My Profile', icon: '◯' },
    { id: 'settings', label: 'Settings', icon: '⊙' },
  ];

  const renderPage = () => {
    if (selectedCommunity) {
      return <CommunityProfilePage community={selectedCommunity} onBack={() => setSelectedCommunity(null)} role={role} onRequestPartnership={() => navigate('project')} />;
    }
    const myProfile = role === 'community' && user ? communities.find(c => c.id === user.id) || null : null;
    if (selectedBrief) {
      return <BriefDetailPage brief={selectedBrief} onBack={() => setSelectedBrief(null)} role={role} myProfile={myProfile} />;
    }
    switch (activePage) {
      case 'home': return <DashboardHome role={role} user={user} communities={communities} briefs={briefs} onNavigate={navigate} myProfile={myProfile} onCreateBrief={() => setCreatingBrief(true)} />;
      case 'discover': return <DiscoverPage role={role} communities={communities} briefs={briefs} onViewCommunity={setSelectedCommunity} onViewBrief={setSelectedBrief} activeBriefFilter={activeBriefFilter} onClearBriefFilter={() => setActiveBriefFilter(null)} onSetBriefFilter={handleSetBriefFilter} myProfile={myProfile} />;
      case 'project': return (
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>◷</div>
          <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No active projects</div>
          <div style={{ fontSize: 13, marginBottom: 20 }}>Once you partner with a brand, your project will appear here.</div>
          <button className="btn btn-lime" onClick={() => navigate('discover')}>Browse Opportunities →</button>
        </div>
      );
      case 'measure': return (
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>◈</div>
          <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No reports yet</div>
          <div style={{ fontSize: 13 }}>Campaign reports will appear here once a project is complete.</div>
        </div>
      );
      case 'profile': {
        if (!isBrand && user) {
          return <MyProfileModule userId={user.id} onEdit={() => navigate('edit-profile')} />;
        }
        return (
          <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🏷</div>
            <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>Brand Profile</div>
            <div style={{ fontSize: 13 }}>Brand profile management coming soon.</div>
          </div>
        );
      }
      case 'edit-profile': {
        if (!isBrand && user) {
          return <EditProfileModule userId={user.id} onDone={() => navigate('profile')} />;
        }
        return null;
      }
      case 'briefs': return (
        <div>
          <div className="display mb-20" style={{ fontSize: 36 }}>{isBrand ? 'My Briefs' : 'My Proposals'}</div>
          {isBrand
            ? <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div className="community-grid">
                  {briefs.filter(b => b.brandId === user?.id).map(b => <BriefCard key={b.id} b={b} onClick={setSelectedBrief} isBrandOwner={true} />)}
                </div>
                <button className="btn btn-lime" style={{ alignSelf: 'flex-start' }} onClick={() => setCreatingBrief(true)}>+ Create New Brief</button>
              </div>
            : <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>◫</div>
                <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No proposals yet</div>
                <div style={{ fontSize: 13, marginBottom: 20 }}>Browse open briefs and respond to get started.</div>
                <button className="btn btn-lime" onClick={() => navigate('discover')}>Browse Briefs →</button>
              </div>
          }
        </div>
      );
      default: return (
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🚧</div>
          <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase' }}>Coming soon</div>
          <div style={{ fontSize: 13, marginTop: 8 }}>This section is in development.</div>
        </div>
      );
    }
  };

  const pageTitle = {
    home: 'Dashboard',
    discover: isBrand ? 'Discover Communities' : 'Find Partnerships',
    briefs: isBrand ? 'My Briefs' : 'My Proposals',
    project: 'Active Projects',
    measure: 'Reporting',
    profile: 'My Profile',
    'edit-profile': 'Edit Profile',
    settings: 'Settings',
  };

  const userInitial = user ? (user.initial || (user.leader_name || user.name)[0]) : (isBrand ? 'K' : 'P');
  // For community: top line = community name, bottom line = leader's name
  // For brand: top line = brand name, bottom line = blank
  const userName = user ? (isBrand ? user.name : user.name) : (isBrand ? 'Hyperice' : 'Southbound 400');
  const userSub = user ? (isBrand ? '' : (user.leader_name || '')) : (isBrand ? '' : 'Paul Crew');

  return (
    <div className="app">
      {/* Sidenav */}
      <div className="sidenav">
        <div className="sidenav-logo">
          <div className="logo-text">mayo<span className="logo-dot">.</span></div>
          <span className={"role-badge " + (isBrand ? 'role-brand' : 'role-community')}>
            {isBrand ? 'Brand' : 'Community'}
          </span>
        </div>

        <div className="sidenav-user" onClick={() => navigate('profile')} style={{ cursor: 'pointer' }} title="View my profile">
          <div className="avatar">{userInitial}</div>
          <div>
            <div className="user-name">{userName}</div>
            {userSub && <div className="user-org">{userSub}</div>}
          </div>
        </div>

        <div className="nav-section" style={{ flex: 1 }}>
          {navBrand.map(n => (
            <button key={n.id} className={"nav-item " + (activePage === n.id && !selectedCommunity && !selectedBrief ? 'active' : '')} onClick={() => navigate(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
              {n.badge && <span className="nav-badge">{n.badge}</span>}
            </button>
          ))}
        </div>

        <div className="sidenav-bottom">
          {navBottom.map(n => (
            <button key={n.id} className={"nav-item " + (activePage === n.id ? 'active' : '')} onClick={() => navigate(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
          <button className="nav-item" onClick={handleLogout} style={{ color: 'var(--muted)' }}>
            <span className="nav-icon">⇥</span> Sign Out
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">
            {creatingBrief ? 'New Brief' : selectedCommunity ? selectedCommunity.name : selectedBrief ? selectedBrief.brand + ' — ' + selectedBrief.title : pageTitle[activePage] || activePage}
          </div>
          <div className="topbar-actions">
            {activePage === 'discover' && isBrand && (
              <button className="btn btn-lime btn-sm" onClick={() => setCreatingBrief(true)}>+ New Brief</button>
            )}
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--surface2)', border: '1px solid var(--border2)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 13 }} title="Notifications">
              🔔
            </div>
          </div>
        </div>
        <div className="page">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
{% endraw %}
