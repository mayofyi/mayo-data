<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mayo — community partnerships</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --lime: #d2ff01;
  --yellow: #ffea12;
  --black: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --surface3: #222222;
  --white: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --cyan: #b1ecf0;
  --pink: #ff6ef2;
  --orange: #ffab40;
  --green: #b3ff9e;
  --blue: #7eb8ff;
  --red: #ff6b6b;
  --nav-w: 228px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow-y: auto;
}
.bb { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
.bc { font-family: 'Barlow Condensed', sans-serif; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.15s; white-space: nowrap;
}
.btn-lime { background: var(--lime); color: var(--black); }
.btn-lime:hover { background: #bfee00; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--white); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: rgba(255,255,255,0.3); background: var(--surface2); }
.btn-dark { background: var(--surface2); color: var(--white); border: 1px solid var(--border); }
.btn-dark:hover { background: var(--surface3); }
.btn-sm { padding: 6px 13px; font-size: 12px; }
.btn-lg { padding: 12px 28px; font-size: 15px; }

/* ─── PILLS / TAGS ─── */
.tag {
  display: inline-block; padding: 3px 9px; border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
}
.tag-outline { border: 1px solid var(--border2); color: var(--muted); }
.tag-lime { background: var(--lime); color: var(--black); }
.tag-cyan { background: var(--cyan); color: var(--black); }
.tag-pink { background: var(--pink); color: var(--black); }
.tag-orange { background: var(--orange); color: var(--black); }
.tag-green { background: var(--green); color: var(--black); }
.tag-yellow { background: var(--yellow); color: var(--black); }
.tag-blue { background: var(--blue); color: var(--black); }
.tag-ghost { border: 1px solid var(--border2); color: var(--white); }

/* ─── CARDS ─── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.metric-card {
  border-radius: 8px; padding: 16px 18px;
}
.metric-card.cyan { background: var(--cyan); color: var(--black); }
.metric-card.yellow { background: var(--yellow); color: var(--black); }
.metric-card.pink { background: var(--pink); color: var(--black); }
.metric-card.green { background: var(--green); color: var(--black); }
.metric-card.orange { background: var(--orange); color: var(--black); }
.metric-card.lime { background: var(--lime); color: var(--black); }
.metric-card.dark { background: var(--surface2); color: var(--white); border: 1px solid var(--border); }
.metric-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }
.metric-value { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; letter-spacing: 0.02em; }
.metric-value.sm { font-size: 28px; }
.metric-sub { font-size: 12px; font-weight: 500; opacity: 0.7; margin-top: 4px; }

/* ─── LAYOUT ─── */
.app { display: flex; min-height: 100vh; }

/* ─── SIDENAV ─── */
.sidenav {
  width: var(--nav-w); min-width: var(--nav-w);
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow-y: auto; position: sticky; top: 0;
  flex-shrink: 0;
}
.sidenav-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 0.05em; color: var(--white);
}
.logo-dot { color: var(--lime); }
.role-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 3px 7px; border-radius: 3px;
}
.role-brand { background: var(--lime); color: var(--black); }
.role-community { background: var(--cyan); color: var(--black); }

.sidenav-user {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px;
  flex-shrink: 0; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-weight: 600; font-size: 13px; }
.user-org { font-size: 11px; color: var(--muted); }

.nav-section { padding: 10px 10px 4px; }
.nav-section-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
  font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); padding: 0 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--muted);
  transition: all 0.12s; margin-bottom: 1px; border: none;
  background: transparent; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--white); }
.nav-item.active { background: var(--surface2); color: var(--white); }
.nav-item.active .nav-icon { color: var(--lime); }
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--lime); color: var(--black);
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif;
}

.sidenav-bottom {
  margin-top: auto; padding: 12px 10px;
  border-top: 1px solid var(--border);
}

/* ─── MAIN CONTENT ─── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar {
  padding: 0 28px; height: 56px; min-height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
}
.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.page { flex: 1; overflow-y: auto; padding: 24px 28px; min-height: 0; }
.page-inner { max-width: 1200px; }

/* ─── ROLE TOGGLE ─── */
.role-toggle {
  display: flex; background: var(--surface2); border-radius: 6px;
  padding: 3px; gap: 2px; border: 1px solid var(--border);
}
.role-toggle-btn {
  padding: 5px 14px; border-radius: 4px; border: none; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  transition: all 0.12s; color: var(--muted); background: transparent;
}
.role-toggle-btn.active { background: var(--lime); color: var(--black); }

/* ─── LOGIN ─── */
.login-screen {
  width: 100vw; height: 100vh;
  background: var(--black);
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  width: 420px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden;
}
.login-header {
  background: var(--black); padding: 36px 36px 28px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 0.05em; }
.login-tagline { color: var(--muted); font-size: 13px; margin-top: 4px; }
.login-body { padding: 28px 36px 36px; }
.login-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.role-card {
  border: 2px solid var(--border2); border-radius: 8px; padding: 16px 14px;
  cursor: pointer; transition: all 0.15s; background: var(--surface2);
}
.role-card:hover { border-color: rgba(255,255,255,0.25); }
.role-card.selected.brand { border-color: var(--lime); background: rgba(210,255,1,0.06); }
.role-card.selected.community { border-color: var(--cyan); background: rgba(177,236,240,0.06); }
.role-card-icon { font-size: 22px; margin-bottom: 8px; }
.role-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.role-card-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

/* ─── DISCOVER ─── */
.discover-header { margin-bottom: 24px; }
.discover-title { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 0.03em; }
.discover-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
.search-bar {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.search-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 10px 14px; color: var(--white);
  font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
}
.search-input:focus { border-color: rgba(255,255,255,0.25); }
.search-input::placeholder { color: var(--muted); }
.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
}
.filter-chip {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.12s;
}
.filter-chip:hover { border-color: rgba(255,255,255,0.25); color: var(--white); }
.filter-chip.active { background: var(--lime); color: var(--black); border-color: var(--lime); }

/* ─── COMMUNITY CARD ─── */
.community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.community-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: all 0.15s;
}
.community-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.community-card-cover { position: relative; overflow: hidden; width: 100%; }
.community-card-cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.community-card-3x4 { aspect-ratio: 3/4; position: relative; display: flex; flex-direction: column; overflow: hidden; }
.community-card-cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.85) 100%);
}
.community-card-cover-tags {
  position: absolute; bottom: 10px; left: 10px; display: flex; gap: 5px; flex-wrap: wrap;
}
.community-card-body { padding: 14px 16px; }
.community-card-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 17px;
  font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.community-card-tagline { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
.community-card-metrics {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
.community-card-metric { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
.community-card-metric-val {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800;
}
.community-card-metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.community-card-footer {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ─── PROFILE VIEW ─── */
.profile-cover { height: 220px; position: relative; border-radius: 10px; overflow: hidden; margin-bottom: -50px; }
.profile-cover img { width: 100%; height: 100%; object-fit: cover; }
.profile-cover-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7)); }
.profile-header { position: relative; padding: 0 28px; margin-bottom: 24px; }
.profile-avatar-row { display: flex; align-items: flex-end; justify-content: space-between; padding-top: 0; }
.profile-avatar-large {
  width: 80px; height: 80px; border-radius: 10px;
  border: 3px solid var(--surface); overflow: hidden;
  background: var(--surface3);
}
.profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }

/* ─── BRIEF CARD ─── */
.brief-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: all 0.15s;
}
.brief-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.brief-card-header { display: flex; gap: 14px; padding: 16px; border-bottom: 1px solid var(--border); }
.brief-brand-logo {
  width: 48px; height: 48px; border-radius: 8px;
  background: var(--surface2); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
}
.brief-brand-logo img { width: 100%; height: 100%; object-fit: cover; }
.brief-card-body { padding: 14px 16px; }
.brief-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.brief-card-goal { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.brief-offerings { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.brief-offering {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px;
  font-size: 12px; font-weight: 600;
}
.brief-offering-val { color: var(--lime); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; }
.brief-card-footer {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ─── PARTNERSHIP PIPELINE ─── */
.pipeline-steps {
  display: flex; align-items: center; gap: 0;
  background: var(--surface2); border-radius: 8px; padding: 4px;
  border: 1px solid var(--border); margin-bottom: 24px;
  overflow-x: auto;
}
.pipeline-step {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 5px; cursor: default;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap; transition: all 0.15s;
  flex-shrink: 0;
}
.pipeline-step.done { color: rgba(210,255,1,0.7); cursor: pointer; }
.pipeline-step.done:hover { color: var(--lime); }
.pipeline-step.active { background: var(--surface3); color: var(--white); }
.pipeline-step.active .step-num { background: var(--lime); color: var(--black); }
.pipeline-step.locked { opacity: 0.35; }
.step-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--surface3); color: var(--muted);
  font-size: 10px; font-weight: 800; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.step-done-icon { color: var(--lime); font-size: 13px; }
.pipeline-arrow { color: var(--surface3); font-size: 16px; flex-shrink: 0; padding: 0 2px; }

/* ─── PROJECT MANAGEMENT ─── */
.project-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
.gantt-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.gantt-label { width: 120px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
.gantt-track { flex: 1; height: 24px; background: var(--surface3); border-radius: 4px; position: relative; overflow: hidden; }
.gantt-bar {
  height: 100%; border-radius: 4px; position: absolute;
  display: flex; align-items: center; padding: 0 8px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  white-space: nowrap;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.status-complete { background: var(--green); }
.status-active { background: var(--lime); }
.status-pending { background: var(--surface3); border: 1px solid var(--muted); }
.status-shipped { background: var(--cyan); }

/* ─── ARCHETYPE BADGE ─── */
.archetype-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 6px; border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}
.archetype-evangelical { background: var(--pink); color: var(--black); }
.archetype-loyalists { background: var(--cyan); color: var(--black); }
.archetype-buyers { background: var(--orange); color: var(--black); }
.archetype-early { background: var(--green); color: var(--black); }
.archetype-cultural { background: var(--yellow); color: var(--black); }

/* ─── CHANNEL BAR ─── */
.channel-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.channel-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.channel-info { flex: 1; }
.channel-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.channel-stats { font-size: 11px; color: var(--muted); }
.channel-bar-track { width: 80px; height: 4px; background: var(--surface3); border-radius: 2px; flex-shrink: 0; }
.channel-bar-fill { height: 100%; border-radius: 2px; }

/* ─── MEASURE ─── */
.measure-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.mentions-bar { display: flex; gap: 2px; height: 80px; align-items: flex-end; margin-top: 8px; }
.mentions-col { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; }

/* ─── STAT ROW ─── */
.stat-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }

/* ─── INPUT ─── */
.input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 10px 14px; color: var(--white);
  font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.12s;
}
.input:focus { border-color: rgba(255,255,255,0.3); }
.input::placeholder { color: var(--muted); }
.label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px; display: block;
}
.form-group { margin-bottom: 18px; }
textarea.input { resize: none; }
select.input { appearance: none; cursor: pointer; }

/* ─── SECTION HEADER ─── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
}

/* ─── CHAT ─── */
.chat-messages { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; max-height: 200px; overflow-y: auto; }
.chat-msg { display: flex; gap: 8px; }
.chat-msg.mine { flex-direction: row-reverse; }
.chat-bubble {
  max-width: 75%; padding: 8px 12px; border-radius: 10px;
  font-size: 13px; line-height: 1.4;
}
.chat-msg.theirs .chat-bubble { background: var(--surface3); }
.chat-msg.mine .chat-bubble { background: var(--lime); color: var(--black); }
.chat-time { font-size: 10px; color: var(--muted); align-self: flex-end; }

/* ─── SCROLLABLE SECTIONS ─── */

function getStoredUser() { try { return JSON.parse(sessionStorage.getItem('mayo_user')); } catch(e) { return null; } }
function getToken() { return sessionStorage.getItem('mayo_token'); }
function setAuth(token, user) { sessionStorage.setItem('mayo_token', token); sessionStorage.setItem('mayo_user', JSON.stringify(user)); }
function clearAuth() { sessionStorage.removeItem('mayo_token'); sessionStorage.removeItem('mayo_user'); }
async function apiFetch(path, opts = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}), ...(opts.headers || {}) };
  const res = await fetch(path, { ...opts, headers });
  if (!res.ok) { const err = await res.json().catch(() => ({ error: res.statusText })); throw new Error(err.error || res.statusText); }
  return res.json();
}

// ─── SHAPE MAPPERS ───────────────────────────────────────────────────────────
function mapCommunity(c) {
  // instagram_data is { profile: {...}, media: [...], engagement_rate: N }
  const igData = (c.instagram_data && typeof c.instagram_data === 'object' ? c.instagram_data : {});
  const igProfile = igData.profile || {};
  const followers = igProfile.followers_count || 0;
  const er = igData.engagement_rate || 0;
  const igUsername = igProfile.username || null;
  const hasIg = !!c.instagram_token;
  const tier = (hasIg && followers > 0) ? 'fully-verified' : (c.active_members ? 'verified' : 'starter');
  const tags = Array.isArray(c.tags) ? c.tags : [];
  const channels = [];
  if (hasIg) channels.push({
    name: 'Instagram', color: '#e1306c', reach: followers,
    engagement: er ? Math.round(er * 10) / 10 : null, vsAvg: null, engagementChannel: true,
    url: igUsername ? 'https://instagram.com/' + igUsername : null, username: igUsername,
  });
  const sub = c.substack_data && typeof c.substack_data === 'object' ? c.substack_data : null;
  if (sub && sub.url) channels.push({ name: 'Substack', color: '#ff6719', reach: null, engagement: null, vsAvg: null, engagementChannel: true, url: sub.url });
  const igWebsite = igProfile.website || null;
  if (igWebsite) channels.push({ name: 'Website', color: '#7eb8ff', reach: null, engagement: null, vsAvg: null, engagementChannel: false, url: igWebsite });
  const csParsed = Array.isArray(c.case_studies) ? c.case_studies : [];
  // Derive coverGradient from cover_option using the COVER_OPTIONS constant
  const coverOpt = (typeof COVER_OPTIONS !== 'undefined' ? COVER_OPTIONS : []).find(o => o.id === (c.cover_option || 1));
  return {
    id: c.id, name: c.name, tagline: c.tagline || '', description: c.description || '',
    bio: igProfile.biography || c.description || '', location: c.location || '',
    tier, archetype: c.archetype || 'evangelical', archetypeLabel: ({ evangelical: 'Evangelists', loyalists: 'Loyalists', buyers: 'Buyers', early: 'Early Adopters', cultural: 'Culturally Impactful' }[c.archetype] || 'Evangelists'),

    networkMultiplier: '—', reach: followers || null,
    cis: c.cis_stamped || c.cis_raw || null,
    tags, cover: c.cover_image_url || null,
    coverGradient: coverOpt ? coverOpt.gradient : 'linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%)',
    channels, notableMembers: Array.isArray(c.notable_members) ? c.notable_members : [],
    partnerships: csParsed.filter(cs => cs.mayo_verified || cs.verified),
    casestudies: csParsed,
    campaignType: 'Brand Awareness', primaryKPI: 'Post Rate',
    matchRationale: 'Match rationale is calculated relative to an active brief.',
    igUsername, igFollowers: followers, igBio: igProfile.biography || '',
    partnershipPreferences: c.partnership_preferences || {},
  };
}

function PipelineStepper({ stages, currentStage, onStageClick }) {
  return (
    <div className="pipeline-steps">
      {stages.map((s, i) => (
        <React.Fragment key={s.name}>
          <div
            className={`pipeline-step ${s.status === 'done' ? 'done' : s.status === 'active' ? 'active' : 'locked'}`}
            onClick={() => s.status === 'done' && onStageClick && onStageClick(i)}
          >
            {s.status === 'done'
              ? <span className="step-done-icon">✓</span>
              : <span className="step-num">{i + 1}</span>
            }
            {s.name}
          </div>
          {i < stages.length - 1 && <span className="pipeline-arrow">›</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

function TierBadge({ tier }) {
  const config = {
    starter: { label: 'Starter', cls: 'tier-starter', icon: '○' },

  return <span className={`tier-badge ${c.cls}`}>{c.icon} {c.label}</span>;
}

function CommunityOnboarding({ onComplete }) {
  const [step, setStep] = useState(1);
  const TOTAL_STEPS = 5;
  const [name, setName] = useState('');
  const [tagline, setTagline] = useState('');
  const [location, setLocation] = useState('');
  const [description, setDescription] = useState('');
  const [selectedTags, setSelectedTags] = useState([]);
  const [website, setWebsite] = useState('');
  const [selectedCover, setSelectedCover] = useState(1);
  const [channelStates, setChannelStates] = useState({});
  const [previewView, setPreviewView] = useState('facecard');

  const toggleTag = (tag) => setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
  const connectChannel = (id) => setChannelStates(prev => ({ ...prev, [id]: 'connected' }));
  const selfReportChannel = (id) => setChannelStates(prev => ({ ...prev, [id]: 'self-reported' }));

  const connectedCount = Object.values(channelStates).filter(s => s === 'connected').length;
  const tier = connectedCount >= 2 ? 'fully-verified' : connectedCount >= 1 ? 'verified' : 'starter';

  const tierMsg = {
    starter: { text: 'Connect at least one channel to unlock Verified status and get better matches.', color: 'var(--muted)' },
    verified: { text: 'Connect one more channel to unlock Fully Verified status.', color: 'var(--cyan)' },
    'fully-verified': { text: "You're Fully Verified — brands can see the full picture.", color: 'var(--lime)' },
  }[tier];

  const StepDots = () => (
    <div className="onboarding-step-indicator">
      {Array.from({ length: TOTAL_STEPS }).map((_, i) => (
        <div key={i} className={`onboarding-step-dot ${i + 1 === step ? 'active' : i + 1 < step ? 'done' : ''}`} />
      ))}
    </div>
  );

  // Step 1 — Welcome
  if (step === 1) return (
    <div className="onboarding-screen">
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 0%, rgba(210,255,1,0.05) 0%, transparent 65%)' }} />
      <div className="onboarding-box" style={{ position: 'relative', zIndex: 1 }}>
        <div style={{ padding: '44px 36px', textAlign: 'center', background: 'var(--black)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 52, letterSpacing: '0.05em', marginBottom: 8 }}>mayo<span style={{ color: 'var(--lime)' }}>.</span></div>
          <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 28 }}>The community partnerships platform</div>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 28, letterSpacing: '0.03em', marginBottom: 10 }}>Your community.<br />Your terms.</div>
          <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.7, maxWidth: 360, margin: '0 auto' }}>
            Mayo connects communities like yours with brands that want to add real value — not just buy your audience. Set up your profile in 5 minutes and start receiving partnership proposals that fit your world.
          </p>
        </div>
        <div className="onboarding-body" style={{ textAlign: 'center' }}>
          <button className="btn btn-lime btn-lg" style={{ width: '100%', marginBottom: 14 }} onClick={() => setStep(2)}>Set Up My Community →</button>
          <div className="text-muted text-xs">Already have an account? <span style={{ color: 'var(--lime)', cursor: 'pointer' }}>Sign in</span></div>
        </div>
      </div>
    </div>
  );

  // Step 2 — Basic Info
  if (step === 2) return (
    <div className="onboarding-screen">
      <div className="onboarding-box">
        <div className="onboarding-header">
          <StepDots />
          <div className="onboarding-title">Tell us about your community</div>
          <div className="onboarding-subtitle">This is what brands see when they find you. Make it count.</div>
        </div>
        <div className="onboarding-body">
          <div className="form-group"><label className="label">Community Name</label><input className="input" placeholder="e.g. Southbound 400" value={name} onChange={e => setName(e.target.value)} /></div>
          <div className="form-group"><label className="label">One-line tagline</label><input className="input" placeholder="e.g. 400 miles. 3 stages. 5 teams." value={tagline} onChange={e => setTagline(e.target.value)} /></div>
          <div className="form-group"><label className="label">Location</label><input className="input" placeholder="e.g. New York, USA or Online / Global" value={location} onChange={e => setLocation(e.target.value)} /></div>
          <div className="form-group">
            <label className="label">Website <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional but recommended</span></label>
            <input className="input" placeholder="https://yourcommunity.com" value={website} onChange={e => setWebsite(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="label">What's your community about?</label>
            <textarea className="input" rows={4} placeholder="Describe your community in your own words — who you are, what you do, and what makes your members special." value={description} onChange={e => setDescription(e.target.value)} style={{ resize: 'none' }} />
            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4, textAlign: 'right' }}>{description.length}/300</div>
          </div>
          <div className="form-group" style={{ marginBottom: 0 }}>
            <label className="label">What does your community care about? <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>Pick all that apply</span></label>
            <div className="tag-select-grid mt-8">
              {INTEREST_TAGS.map(tag => (
                <button key={tag} className={`tag-select-item ${selectedTags.includes(tag) ? 'selected' : ''}`} onClick={() => toggleTag(tag)}>{tag}</button>

            </div>
          </div>
        </div>
        <div className="onboarding-footer">
          <button className="btn btn-ghost btn-sm" onClick={() => setStep(1)}>← Back</button>
          <button className="btn btn-lime" style={{ opacity: name && tagline && description ? 1 : 0.4, pointerEvents: name && tagline && description ? 'all' : 'none' }} onClick={() => setStep(3)}>Continue →</button>
        </div>
      </div>
    </div>
  );

  // Step 3 — Connect Channels
  if (step === 3) return (
    <div className="onboarding-screen">
      <div className="onboarding-box">
        <div className="onboarding-header">
          <StepDots />
          <div className="onboarding-title">Connect your channels</div>
          <div className="onboarding-subtitle">Connected channels power your match score and show brands the real data behind your community. The more you connect, the better your matches.</div>

        <div className="onboarding-body">

            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <TierBadge tier={tier} />
              <div style={{ display: 'flex', gap: 5 }}>
                {['starter','verified','fully-verified'].map((t, i) => (
                  <div key={t} style={{ width: 32, height: 4, borderRadius: 2, background: ['starter','verified','fully-verified'].indexOf(tier) >= i ? 'var(--lime)' : 'var(--surface3)' }} />
                ))}
              </div>
            </div>
            <div style={{ fontSize: 12, color: tierMsg.color }}>{tierMsg.text}</div>
          </div>

          {CHANNELS_LIST.map(ch => (
            <ChannelCard
              key={ch.id}
              ch={ch}
              state={channelStates[ch.id]}
              onConnect={() => connectChannel(ch.id)}
              onSelfReport={() => selfReportChannel(ch.id)}
            />

          <div style={{ marginTop: 12, padding: '10px 14px', background: 'rgba(177,236,240,0.06)', border: '1px solid rgba(177,236,240,0.15)', borderRadius: 8 }}>
            <div style={{ fontSize: 12, color: 'var(--cyan)', lineHeight: 1.6 }}>
              💡 <strong>Not ready to connect yet?</strong> You can skip this and connect your channels any time from your profile settings.

          </div>
        </div>
        <div className="onboarding-footer">
          <button className="btn btn-ghost btn-sm" onClick={() => setStep(2)}>← Back</button>
          <button className="btn btn-lime" onClick={() => setStep(4)}>Continue →</button>
        </div>
      </div>
    </div>

  const activeCover = COVER_OPTIONS.find(o => o.id === selectedCover) || COVER_OPTIONS[0];

  if (step === 4) return (
    <div className="onboarding-screen">
      <div className="onboarding-box" style={{ width: 600 }}>
        <div className="onboarding-header">
          <StepDots />
          <div className="onboarding-title">Make it yours</div>

function DualRangeSlider({ min, max, valueMin, valueMax, onChange }) {
  const rangeMin = 16, rangeMax = 65;
  const pctMin = ((valueMin - rangeMin) / (rangeMax - rangeMin)) * 100;
  const pctMax = ((valueMax - rangeMin) / (rangeMax - rangeMin)) * 100;
  return (
    <div>
      <div className="dual-range-wrap">
        <div className="dual-range-track">
          <div className="dual-range-fill" style={{ left: `${pctMin}%`, width: `${pctMax - pctMin}%` }} />
        </div>
        <input type="range" min={rangeMin} max={rangeMax} value={valueMin}
          onChange={e => { const v = Math.min(Number(e.target.value), valueMax - 1); onChange(v, valueMax); }} />
        <input type="range" min={rangeMin} max={rangeMax} value={valueMax}
          onChange={e => { const v = Math.max(Number(e.target.value), valueMin + 1); onChange(valueMin, v); }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
        <span style={{ fontSize: 11, color: 'var(--muted)' }}>{rangeMin}</span>
        <span style={{ fontSize: 11, color: 'var(--muted)' }}>{rangeMax}+</span>
      </div>
    </div>
  );
}

function DeliverableCounter({ label, icon, value, onChange }) {
  return (
    <div className="deliverable-row">
      <span style={{ fontSize: 18, width: 28, flexShrink: 0 }}>{icon}</span>
      <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{label}</span>
      <button className="counter-btn" onClick={() => onChange(Math.max(0, value - 1))}>−</button>
      <input
        type="number" min={0}
        value={value}
        onChange={e => onChange(Math.max(0, parseInt(e.target.value) || 0))}
        style={{
          width: 44, textAlign: 'center', background: 'transparent', border: 'none',
          color: 'var(--white)', fontFamily: 'Barlow Condensed', fontSize: 18,
          fontWeight: 700, outline: 'none', MozAppearance: 'textfield',
        }}
      />
      <button className="counter-btn" onClick={() => onChange(value + 1)}>+</button>
    </div>
  );
}

              <label className="label">Budget</label>
              <div style={{ display: 'flex', gap: 8 }}>
                <input className="input" placeholder="e.g. $15,000" value={budgetAmount} onChange={e => setBudgetAmount(e.target.value)} style={{ flex: 1 }} />
                <select className="input" style={{ width: 140 }} value={budgetPeriod} onChange={e => setBudgetPeriod(e.target.value)}>
                  <option>One-off</option>
                  <option>Monthly</option>
                  <option>Quarterly</option>
                  <option>Annual</option>
                </select>
              </div>
            </div>

            <div className="form-group">
              <label className="label">Product / Value Add <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional</span></label>
              <input className="input" placeholder="e.g. 100x Recovery Boots (~$120K value)" value={productOffer} onChange={e => setProductOffer(e.target.value)} />
            </div>

            <div className="form-group">
              <label className="label">Response Deadline</label>
              <input className="input" type="date" value={deadline} onChange={e => setDeadline(e.target.value)} style={{ colorScheme: 'dark' }} />
            </div>

            <div className="form-group">
              <label className="label">Activation Window</label>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <input className="input" type="date" value={activationStart} onChange={e => setActivationStart(e.target.value)} style={{ flex: 1, colorScheme: 'dark' }} />
                <span style={{ color: 'var(--muted)', fontSize: 12 }}>to</span>
                <input className="input" type="date" value={activationEnd} onChange={e => setActivationEnd(e.target.value)} style={{ flex: 1, colorScheme: 'dark' }} />
              </div>
            </div>

          </div>

          {/* Right column */}
          <div>
            <div className="form-group">
              <label className="label">Deliverables <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— be as specific as you need</span></label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 8 }}>
                {deliverables.map((d, i) => (
                  <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <div style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: 'var(--muted)', flexShrink: 0, fontFamily: 'Barlow Condensed', fontWeight: 700 }}>{i + 1}</div>
                    <input className="input" style={{ flex: 1 }}
                      placeholder={i === 0 ? 'e.g. 2x 60-second hero films shot during the event' : i === 1 ? 'e.g. 10x lifestyle stills featuring the product in use' : 'Add a deliverable...'}
                      value={d} onChange={e => updateDeliverable(i, e.target.value)} />
                    {deliverables.length > 1 && (
                      <button onClick={() => removeDeliverable(i)} style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid var(--border2)', background: 'transparent', color: 'var(--muted)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0 }}>×</button>
                    )}
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{ alignSelf: 'flex-start', marginTop: 4 }} onClick={addDeliverable}>+ Add deliverable</button>
              </div>
            </div>

            <div className="form-group" style={{ marginBottom: 0 }}>
              <label className="label">KPIs <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— select all that apply</span></label>
              <div className="tag-select-grid mt-8">
                {KPI_OPTIONS.map(k => (
                  <button key={k} className={`tag-select-item ${selectedKpis.includes(k) ? 'selected' : ''}`} onClick={() => toggleKpi(k)}>{k}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  // ── Step 4 — Community Requirements ──────────────────────────────────────
  if (step === 4) return (
    <div className="brief-creation-screen">
      <Topbar canContinue={true} onContinue={() => setStep(5)} />
      <div className="brief-creation-body">
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 42, letterSpacing: '0.03em', marginBottom: 8 }}>Who are you looking for?</div>
          <div style={{ fontSize: 14, color: 'var(--muted)', maxWidth: 520 }}>Set minimum requirements. These inform matching behind the scenes — communities won't see the specific numbers, only whether they've been matched.</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, marginBottom: 32 }}>
          {/* Left */}
          <div>
            <div className="form-group">
              <label className="label">Minimum Community Size</label>
              <select className="input" value={minMembers} onChange={e => setMinMembers(e.target.value)}>
                <option value="">No minimum</option>
                {[10, 50, 100, 250, 500, 1000].map(n => <option key={n} value={n}>{n.toLocaleString()}+ members</option>)}
              </select>
            </div>

            <div className="form-group">
              <label className="label">Age Range <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textTransform: 'none' }}>— not shown to communities</span></label>
              <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <label className="label" style={{ fontSize: 10, marginBottom: 4 }}>Min Age</label>
                  <input className="input" type="number" min={16} max={ageMax - 1} value={ageMin}
                    onChange={e => { const v = Math.min(Number(e.target.value), ageMax - 1); setAgeMin(v); }}
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <label className="label" style={{ fontSize: 10, marginBottom: 4 }}>Max Age</label>
                  <input className="input" type="number" min={ageMin + 1} max={65} value={ageMax}
                    onChange={e => { const v = Math.max(Number(e.target.value), ageMin + 1); setAgeMax(v); }}
                  />
                </div>
              </div>
              <DualRangeSlider valueMin={ageMin} valueMax={ageMax} onChange={(mn, mx) => { setAgeMin(mn); setAgeMax(mx); }} />
              <div style={{ textAlign: 'center', marginTop: 8, fontSize: 12, color: 'var(--lime)', fontFamily: 'Barlow Condensed', fontWeight: 700 }}>
                {ageMin} – {ageMax === 65 ? '65+' : ageMax}
              </div>
            </div>

            <div className="form-group" style={{ marginBottom: 0 }}>
              <label className="label">Minimum Engagement <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 400, textTransform: 'none' }}>— not shown to communities</span></label>
              <select className="input" value={minEngagement} onChange={e => setMinEngagement(e.target.value)}>
                <option value="">No minimum</option>
                <option value="1">1%+</option>
                <option value="2">2%+</option>
                <option value="3">3%+</option>
                <option value="5">5%+</option>
              </select>
            </div>
          </div>

          {/* Right */}
          <div>
            <div className="form-group">
              <label className="label">Location <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— select all that apply</span></label>
              <div className="tag-select-grid mt-8">
                {REGION_OPTIONS.map(r => (
                  <button key={r} className={`tag-select-item ${selectedRegions.includes(r) ? 'selected' : ''}`} onClick={() => toggleRegion(r)}>{r}</button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Interests — full width */}
        <div className="form-group" style={{ marginBottom: 0 }}>
          <label className="label">Community Interests <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— select all that apply</span></label>
          <div className="tag-select-grid mt-8" style={{ marginBottom: 12 }}>
            {[...INTEREST_TAGS, ...customInterests].map(t => (
              <button key={t} className={`tag-select-item ${selectedInterests.includes(t) ? 'selected' : ''}`} onClick={() => toggleInterest(t)}>{t}</button>
            ))}
          </div>
          {/* Custom interest input */}
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              className="input" style={{ flex: 1 }}
              placeholder="Add a custom interest category..."
              value={customInterest}
              onChange={e => setCustomInterest(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addCustomInterest()}
            />
            <button className="btn btn-ghost btn-sm" onClick={addCustomInterest} style={{ opacity: customInterest.trim() ? 1 : 0.4 }}>+ Add</button>
          </div>
        </div>
      </div>
    </div>
  );

  // ── Step 5 — Preview + Publish ────────────────────────────────────────────
  const activeDeliverables = deliverables.filter(d => d.trim().length > 0);

  const previewBrief = {
    brand: BRAND_PROFILE.name,
    brandColor: BRAND_PROFILE.color,
    brandGradient: BRAND_PROFILE.gradient,
    brandInitial: BRAND_PROFILE.initial,
    brandTagline: BRAND_PROFILE.tagline,
    brandDesc: BRAND_PROFILE.bio,
    partnershipType: partnershipType || 'Sponsorship',
    partnershipTypeColor: 'orange',
    title: `${goal?.label || 'Partnership'} — ${partnershipType || 'Open Brief'}`,
    goal: partnershipGoals || lookingFor || "We're looking for communities that align with our values.",
    budget: budgetAmount || '$—',
    budgetPeriod,
    products: productOffer ? [productOffer] : [],
    tags: selectedInterests.slice(0, 3),
    kpis: selectedKpis,
    deadline: deadline || 'TBC',
    window: activationStart && activationEnd ? `${activationStart} → ${activationEnd}` : 'TBC',
    lookingFor,
  };

  if (step === 5) return (
    <div className="brief-creation-screen">
      <Topbar canContinue={true} onContinue={() => onPublish(previewBrief)} continueLabel="Publish Brief →" />
      <div className="brief-creation-body">
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 42, letterSpacing: '0.03em', marginBottom: 8 }}>Review your brief</div>
          <div style={{ fontSize: 14, color: 'var(--muted)' }}>This is exactly what communities will see. Publish when you're happy with it.</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 24 }}>
          {/* Left */}
          <div>
            {/* Brief cover image */}
            <div style={{ height: 200, borderRadius: 10, overflow: 'hidden', position: 'relative', marginBottom: 20, background: BRAND_PROFILE.gradient }}>
              <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6))' }} />
              <div style={{ position: 'absolute', top: 14, left: 14 }}>
                <span className={`tag tag-orange`}>{partnershipType || 'Partnership'}</span>
              </div>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'flex-end', padding: '0 20px 20px' }}>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 14 }}>
                  <div style={{ width: 52, height: 52, borderRadius: 9, background: BRAND_PROFILE.color, color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Bebas Neue', fontSize: 24, flexShrink: 0 }}>{BRAND_PROFILE.initial}</div>
                  <div>
                    <div style={{ fontFamily: 'Bebas Neue', fontSize: 32, color: '#fff', lineHeight: 1 }}>{BRAND_PROFILE.name}</div>
                    <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)' }}>{goal?.label}</div>
                  </div>
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" style={{ position: 'absolute', top: 14, right: 14 }}>📁 Upload custom image</button>
            </div>

            {/* Brand bio */}
            <div className="card p-20 mb-16">
              <div className="section-title mb-10">About {BRAND_PROFILE.name}</div>
              <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.65 }}>{BRAND_PROFILE.bio}</p>
            </div>

            {/* Partnership Goals */}
            {partnershipGoals && (
              <div className="card p-20 mb-16" style={{ borderColor: 'rgba(210,255,1,0.15)', background: 'rgba(210,255,1,0.03)' }}>
                <div className="section-title mb-8">Partnership Goals</div>
                <p style={{ fontSize: 13, lineHeight: 1.7 }}>{partnershipGoals}</p>
              </div>
            )}

            {/* Looking for */}
            <div className="card p-20 mb-16" style={{ borderColor: 'rgba(255,234,18,0.2)', background: 'rgba(255,234,18,0.03)' }}>
              <div className="section-title mb-8">What we're looking for</div>
              <p style={{ fontSize: 13, lineHeight: 1.7 }}>{lookingFor || '—'}</p>
            </div>

            {/* Deliverables */}
            {activeDeliverables.length > 0 && (
              <div className="card p-16 mb-16">
                <div className="section-title mb-12">Deliverables</div>
                {activeDeliverables.map((d, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '10px 0', borderBottom: i < activeDeliverables.length - 1 ? '1px solid var(--border)' : 'none' }}>
                    <div style={{ width: 22, height: 22, borderRadius: '50%', background: 'var(--lime)', color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontFamily: 'Barlow Condensed', fontWeight: 800, flexShrink: 0, marginTop: 1 }}>{i + 1}</div>
                    <div style={{ fontSize: 13, lineHeight: 1.5 }}>{d}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Interest tags */}
            {selectedInterests.length > 0 && (
              <div className="card p-16">
                <div className="section-title mb-10">Looking for communities interested in</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {selectedInterests.map(t => <span key={t} className="tag tag-outline">{t}</span>)}
                </div>
              </div>
            )}
          </div>

          {/* Right sidebar */}
          <div>
            <div className="metric-card lime mb-14">
              <div className="metric-label">Budget</div>
              <div style={{ fontFamily: 'Bebas Neue', fontSize: 38, lineHeight: 1 }}>{budgetAmount || '$—'}</div>
              <div className="metric-sub">{budgetPeriod}</div>
            </div>

            {productOffer && (
              <div className="card p-16 mb-14">
                <div className="section-title mb-8">Also on offer</div>
                <div style={{ fontSize: 13 }}>{productOffer}</div>
              </div>
            )}

            <div className="card p-16 mb-14">
              <div className="section-title mb-10">Timeline</div>
              <div className="stat-row"><span className="text-muted text-xs">Response by</span><span style={{ fontSize: 13, color: 'var(--orange)' }}>{deadline || 'TBC'}</span></div>
              <div className="stat-row"><span className="text-muted text-xs">Activation</span><span style={{ fontSize: 13 }}>{previewBrief.window}</span></div>
            </div>

            {selectedKpis.length > 0 && (
              <div className="card p-16 mb-14">
                <div className="section-title mb-10">KPIs</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {selectedKpis.map(k => <span key={k} className="tag tag-cyan">{k}</span>)}
                </div>
              </div>
            )}

            {selectedRegions.length > 0 && (
              <div className="card p-16">
                <div className="section-title mb-10">Location</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {selectedRegions.map(r => <span key={r} className="tag tag-ghost">{r}</span>)}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );

  return null;
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSignIn = async () => {
    if (!email || !password) { setError('Please enter your email and password.'); return; }
    setLoading(true); setError('');
    try {
      const data = await apiFetch('/api/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      setAuth(data.token, data.user);
      onLogin(data.user.role, data.user);
    } catch(e) {
      setError(e.message || 'Login failed. Please check your credentials.');
    } finally { setLoading(false); }
  };

  return (
    <div className="login-screen">
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 0%, rgba(210,255,1,0.06) 0%, transparent 70%)' }} />
      <div className="login-box" style={{ position: 'relative', zIndex: 1 }}>
        <div className="login-header">
          <div className="login-logo" style={{ color: 'var(--white)' }}>mayo<span style={{ color: 'var(--lime)' }}>.</span></div>
          <div className="login-tagline">The community partnerships platform</div>
        </div>
        <div className="login-body">
          <div className="form-group">
            <label className="label">Email</label>
            <input className="input" placeholder="you@mayo.fyi" type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSignIn()} />
          </div>
          <div className="form-group" style={{ marginBottom: error ? 8 : 20 }}>
            <label className="label">Password</label>
            <input className="input" placeholder="••••••••" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSignIn()} />
          </div>
          {error && <div style={{ color: 'var(--red)', fontSize: 12, marginBottom: 12 }}>{error}</div>}
          <button className="btn btn-lime btn-lg" style={{ width: '100%', marginBottom: 8, opacity: loading ? 0.6 : 1 }} onClick={handleSignIn} disabled={loading}>
            {loading ? 'Signing in...' : 'Sign In →'}
          </button>
          <div style={{ textAlign: 'right', marginBottom: 20 }}>
            <span style={{ fontSize: 12, color: 'var(--muted)', cursor: 'pointer' }}>Forgot password?</span>
          </div>

          <div style={{ borderTop: '1px solid var(--border)', paddingTop: 20 }}>
            <div className="login-label" style={{ marginBottom: 12 }}>New to mayo?</div>
            <div className="role-cards">
              <div className="role-card brand" style={{ cursor: 'pointer', opacity: 0.5 }}>
                <div className="role-card-icon">🏷</div>
                <div className="role-card-title">Join as a Brand</div>
                <div className="role-card-desc">Coming soon — contact us at hello@mayo.fyi</div>
              </div>
              <div className="role-card community" onClick={() => window.location.href = '/onboard'} style={{ cursor: 'pointer', borderColor: 'rgba(210,255,1,0.2)' }}>
                <div className="role-card-icon">🤝</div>
                <div className="role-card-title">Join as a Community</div>
                <div className="role-card-desc">Discover briefs, pitch brands, grow your community</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


function DiscoverPage({ role, communities: COMMUNITIES = [], briefs: BRIEFS = [], onViewCommunity, onViewBrief, activeBriefFilter, onClearBriefFilter, onSetBriefFilter }) {
  const [filter, setFilter] = useState("All");
  const [search, setSearch] = useState("");
  const filters = ["All", "Running", "Fitness", "Wellness", "Culture", "Lifestyle"];
  const isBrand = role === 'brand';

  const filtered = COMMUNITIES.filter(c => {
    const matchSearch = c.name.toLowerCase().includes(search.toLowerCase()) || c.tagline.toLowerCase().includes(search.toLowerCase());
    const matchFilter = filter === "All" || c.tags.includes(filter);
    return matchSearch && matchFilter;
  });

  // Sort by match score descending when a brief is active
  const sorted = activeBriefFilter
    ? [...filtered].sort((a, b) => b.matchScore - a.matchScore)
    : filtered;

  return (
    <div>
      <div className="discover-header">
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 38 }}>
            {isBrand ? (activeBriefFilter ? 'Matched Communities' : 'Discover Communities') : 'Find Partnerships'}
          </div>
          <div className="text-muted" style={{ fontSize: 13 }}>
            {isBrand
              ? activeBriefFilter
                ? `Sorted by match score · ${activeBriefFilter.partnershipType || 'Brief'}`
                : (COMMUNITIES.length > 0 ? `${COMMUNITIES.length} communities on Mayo` : 'No communities yet')
              : (BRIEFS.length > 0 ? `${BRIEFS.length} open brief${BRIEFS.length === 1 ? '' : 's'} matching your profile` : 'No open briefs yet')}
          </div>
        </div>
      </div>

      <div className="search-bar">
        <input
          className="search-input"
          placeholder={isBrand ? "Search communities, interests, locations..." : "Search briefs, brands, categories..."}
          value={search}
          onChange={e => setSearch(e.target.value)}
        />

        {/* Brief filter — always visible for brand users */}
        {isBrand && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 0, background: 'var(--surface2)', border: `1px solid ${activeBriefFilter ? 'rgba(210,255,1,0.4)' : 'var(--border2)'}`, borderRadius: 7, overflow: 'hidden', flexShrink: 0 }}>
            <div style={{ padding: '0 10px', fontSize: 11, fontFamily: 'Barlow Condensed', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: activeBriefFilter ? 'var(--lime)' : 'var(--muted)', whiteSpace: 'nowrap', borderRight: '1px solid var(--border2)' }}>
              Match to brief
            </div>
            <select
              style={{ background: 'transparent', border: 'none', color: activeBriefFilter ? 'var(--white)' : 'var(--muted)', fontFamily: 'Barlow', fontSize: 13, padding: '9px 10px', outline: 'none', cursor: 'pointer', minWidth: 160 }}
              value={activeBriefFilter?.id || ''}
              onChange={e => {
                if (!e.target.value) { onClearBriefFilter(); return; }
                const brief = BRIEFS.find(b => String(b.id) === e.target.value);
                if (brief) onSetBriefFilter(brief);
              }}
            >
              <option value="">No brief selected</option>
              {BRIEFS.map(b => (
                <option key={b.id} value={b.id}>{b.brand} — {b.partnershipType}</option>
              ))}
            </select>
            {activeBriefFilter && (
              <button onClick={onClearBriefFilter} style={{ padding: '0 10px', background: 'transparent', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 14, borderLeft: '1px solid var(--border2)' }}>×</button>
            )}
          </div>
        )}

        <button className="btn btn-ghost">⚙ Filters</button>
      </div>

      <div className="filter-row">
        {filters.map(f => (
          <button key={f} className={`filter-chip ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>{f}</button>
        ))}
      </div>

      {isBrand ? (
        sorted.length > 0
          ? <div className="community-grid">{sorted.map(c => <CommunityCard key={c.id} c={c} onClick={onViewCommunity} />)}</div>
          : <div style={{ padding: '60px 0', textAlign: 'center', color: 'var(--muted)' }}>
              <div style={{ fontSize: 42, marginBottom: 12 }}>◎</div>
              <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No communities yet</div>
              <div style={{ fontSize: 13 }}>Communities are joining — check back soon.</div>
            </div>
      ) : (
        BRIEFS.length > 0
          ? <div className="community-grid">{BRIEFS.map(b => <BriefCard key={b.id} b={b} onClick={onViewBrief} showMatch={true} />)}</div>
          : <div style={{ padding: '60px 0', textAlign: 'center', color: 'var(--muted)' }}>
              <div style={{ fontSize: 42, marginBottom: 12 }}>◫</div>
              <div className="bc" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8 }}>No open briefs yet</div>
              <div style={{ fontSize: 13 }}>When brands post partnership opportunities, they'll appear here. We'll notify you when something matches your community.</div>
            </div>
      )}
    </div>
  );
}

function PartnershipCaseStudy({ partnership: p, community, onBack }) {
  const monthData = [18, 28, 40, 38, 55, 80, 120, 150, 140, 160, 190, 212];
  const isSelfReported = p.source === 'self-reported';

  return (
    <div>

      <div style={{ height: 160, borderRadius: 10, overflow: 'hidden', position: 'relative', marginBottom: 20 }}>

          <div style={{ marginLeft: 'auto', display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
            <span className="tag tag-green">Complete</span>

      </div>

      {/* Self-reported notice */}
      {isSelfReported && (

          <div className="metric-card lime"><div className="metric-label">Key Result</div><div style={{ fontFamily: 'Bebas Neue', fontSize: 26, lineHeight: 1.1 }}>{p.result}</div></div>
          <div className="metric-card cyan"><div className="metric-label">Post Rate</div><div className="metric-value">{p.postRate}</div></div>
          {p.attendees
            ? <div className="metric-card dark"><div className="metric-label">Attendees</div><div className="metric-value sm">{p.attendees}</div></div>
            : <div className="metric-card dark"><div className="metric-label">Year</div><div className="metric-value sm">{p.year}</div></div>
          }
          <div className="metric-card dark"><div className="metric-label">Total Impressions</div><div className="metric-value sm">{p.impressions}</div></div>
          <div className="metric-card dark"><div className="metric-label">Type</div><div style={{ fontFamily: 'Barlow Condensed', fontSize: 20, fontWeight: 800, textTransform: 'uppercase', marginTop: 4 }}>{p.type}</div></div>
        </div>
      )}

      {/* Self-reported: outcome description */}
      {isSelfReported && p.result && (
        <div className="card p-16" style={{ marginBottom: 20 }}>
          <div className="section-title mb-8">Outcome</div>
          <p style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 1.65 }}>{p.result}</p>
          <div style={{ display: 'flex', gap: 16, marginTop: 12, flexWrap: 'wrap' }}>
            {p.type && <div><span style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', fontFamily: 'Barlow Condensed', fontWeight: 700 }}>Type</span><div style={{ fontSize: 13, fontWeight: 600, marginTop: 2 }}>{p.type}</div></div>}
            {p.year && <div><span style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', fontFamily: 'Barlow Condensed', fontWeight: 700 }}>Year</span><div style={{ fontSize: 13, fontWeight: 600, marginTop: 2 }}>{p.year}</div></div>}
          </div>
        </div>
      )}

      {/* Mention volume + Notable members — Mayo Verified only */}
      {!isSelfReported && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
          <div className="card p-16">
            <div className="section-title mb-12">Mention Volume</div>
            <div className="mentions-bar">
              {monthData.map((v, i) => (
                <div key={i} className="mentions-col" style={{ height: `${v / 212 * 100}%`, background: i === monthData.length - 1 ? 'var(--lime)' : i > 8 ? 'var(--surface3)' : 'var(--surface2)', border: '1px solid var(--border)' }} />
              ))}
            </div>
            <div className="flex justify-between mt-8">
              <span className="text-muted text-xs">Week 1</span>
              <span className="text-muted text-xs">Week 12</span>
            </div>
          </div>
          <div className="card p-16">
            <div className="section-title mb-10">Notable Members Involved</div>
            {community.notableMembers.slice(0, 3).map(m => (
              <div key={m.handle} className="notable-member-row">
                <div className="member-avatar" style={{ background: m.color + '33', color: m.color }}>{m.name[0]}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{m.name}</div>
                  <div className="text-muted text-xs">{m.handle}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{m.followers}</div>
                  <div style={{ fontSize: 11, color: 'var(--lime)' }}>{m.err} ERR</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Content Gallery */}
      {p.content && p.content.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div className="section-header mb-12">
            <span className="section-title">Content Gallery</span>
            <span className="text-muted text-xs">{p.content.filter(c => c.type === 'still').length} stills · {p.content.filter(c => c.type === 'film').length} films</span>
          </div>
          <div className="content-grid">
            {p.content.map((item, i) => (
              <div key={i} className={`content-tile ${item.type === 'film' ? 'film' : ''}`}>
                <div className="content-tile-cover" style={{ background: item.gradient || 'var(--surface3)' }} />

                <div className="content-tile-label">
                  {item.type === 'film' ? '🎬 Film' : '📷 Still'}
                </div>
                <div className="content-tile-info">
                  <div className="content-tile-caption">{item.caption}</div>
                  <div className="content-tile-handle">{item.handle}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Quotes */}
      {p.quotes && p.quotes.length > 0 && (
        <div>
          <div className="section-header mb-12">
            <span className="section-title">Community Voices</span>
            <span className="text-muted text-xs">{p.quotes.length} quotes</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
            {p.quotes.map((q, i) => (
              <div key={i} className="quote-card">
                <div className="quote-mark">"</div>
                <div style={{ paddingTop: 20 }}>
                  <p className="quote-text">{q.text}</p>
                  <div className="flex items-center gap-10">
                    <div className="member-avatar" style={{ width: 28, height: 28, fontSize: 11, background: (q.color || '#888') + '22', color: q.color || '#888' }}>{q.name[0]}</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600 }}>{q.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--muted)' }}>{q.handle}</div>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function AddCaseStudyForm({ onSubmit, onCancel }) {
  const [brand, setBrand] = useState('');
  const [year, setYear] = useState(new Date().getFullYear().toString());
  const [type, setType] = useState('');
  const [outcome, setOutcome] = useState('');
  const [hashtag, setHashtag] = useState('');
  const [quotes, setQuotes] = useState([{ text: '', name: '', handle: '' }]);
  const [contentItems, setContentItems] = useState([{ caption: '', type: 'still' }]);

  const addQuote = () => setQuotes(q => [...q, { text: '', name: '', handle: '' }]);
  const updateQuote = (i, field, val) => setQuotes(q => q.map((item, idx) => idx === i ? { ...item, [field]: val } : item));
  const removeQuote = (i) => setQuotes(q => q.filter((_, idx) => idx !== i));

  const addContent = () => setContentItems(c => [...c, { caption: '', type: 'still' }]);
  const updateContent = (i, field, val) => setContentItems(c => c.map((item, idx) => idx === i ? { ...item, [field]: val } : item));
  const removeContent = (i) => setContentItems(c => c.filter((_, idx) => idx !== i));

  const canSubmit = brand.trim() && year && type && outcome.trim();

  const handleSubmit = () => {
    onSubmit({
      brand: brand.trim(),
      year,
      type,
      result: outcome.trim(),
      hashtag: hashtag.trim(),
      quotes: quotes.filter(q => q.text.trim()),
      content: contentItems.filter(c => c.caption.trim()).map(c => ({ ...c, gradient: 'linear-gradient(135deg, #1a1a2e, #2d1b69)', handle: '@community' })),
      brandInitial: brand.trim()[0].toUpperCase(),
      brandColor: '#888888',
      gradient: 'linear-gradient(135deg, #1a1a2e, #2d1b69)',
      postRate: null, attendees: null, impressions: null,
      source: 'self-reported',
    });
  };

  return (
    <div style={{ maxWidth: 680, margin: '0 auto' }}>
      <div className="flex items-center gap-12 mb-24">
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>← Cancel</button>
        <div>
          <div style={{ fontFamily: 'Bebas Neue', fontSize: 32, letterSpacing: '0.03em' }}>Add a Case Study</div>
          <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 2 }}>Partnerships not run through Mayo. Submitted for review before going live on your profile.</div>
        </div>
      </div>

      <div style={{ background: 'rgba(177,236,240,0.06)', border: '1px solid rgba(177,236,240,0.15)', borderRadius: 8, padding: '12px 16px', marginBottom: 24, fontSize: 13, color: 'var(--cyan)', lineHeight: 1.6 }}>
        All self-reported case studies go through a Mayo review before appearing on your profile. We may reach out to verify details. Once approved, they'll display with a "Self-reported" label so brands know the source.
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {/* Brand + Year */}
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 14 }}>
          <div className="form-group" style={{ marginBottom: 0 }}>
            <label className="label">Brand Name</label>
            <input className="input" placeholder="e.g. Tracksmith" value={brand} onChange={e => setBrand(e.target.value)} />
          </div>
          <div className="form-group" style={{ marginBottom: 0 }}>
            <label className="label">Year</label>
            <input className="input" placeholder="2024" value={year} onChange={e => setYear(e.target.value)} />
          </div>
        </div>

        {/* Partnership type */}
        <div className="form-group" style={{ marginBottom: 0 }}>
          <label className="label">Partnership Type</label>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {PARTNERSHIP_TYPES.map(t => (
              <button key={t} onClick={() => setType(t)} style={{
                padding: '6px 14px', borderRadius: 6, border: `1px solid ${type === t ? 'var(--lime)' : 'var(--border2)'}`,
                background: type === t ? 'rgba(210,255,1,0.1)' : 'transparent',
                color: type === t ? 'var(--lime)' : 'var(--muted)',
                fontFamily: 'Barlow Condensed', fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', cursor: 'pointer',
              }}>{t}</button>
            ))}
          </div>
        </div>

        {/* Outcome */}
        <div className="form-group" style={{ marginBottom: 0 }}>
          <label className="label">Outcome <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— what did the partnership achieve?</span></label>
          <input className="input" placeholder="e.g. $500K EMV · 83% post rate · 212 attendees" value={outcome} onChange={e => setOutcome(e.target.value)} />
          <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>This is the headline result shown on your profile card.</div>
        </div>

        {/* Campaign hashtag */}
        <div className="form-group" style={{ marginBottom: 0 }}>
          <label className="label">Campaign Hashtag <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional, helps us find organic posts</span></label>
          <input className="input" placeholder="e.g. #S400xTracksmith" value={hashtag} onChange={e => setHashtag(e.target.value)} />
        </div>

        {/* Quotes */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <label className="label" style={{ marginBottom: 0 }}>Member Quotes <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional, up to 3</span></label>
            {quotes.length < 3 && <button className="btn btn-ghost btn-sm" onClick={addQuote}>+ Add Quote</button>}
          </div>
          {quotes.map((q, i) => (
            <div key={i} style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 16px', marginBottom: 10, position: 'relative' }}>
              <textarea className="input" rows={2} placeholder="What did a member say about the partnership?" value={q.text} onChange={e => updateQuote(i, 'text', e.target.value)} style={{ resize: 'none', marginBottom: 8 }} />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                <input className="input" placeholder="Name (e.g. Jenny K.)" value={q.name} onChange={e => updateQuote(i, 'name', e.target.value)} />
                <input className="input" placeholder="Handle (e.g. @jennyk)" value={q.handle} onChange={e => updateQuote(i, 'handle', e.target.value)} />
              </div>
              {quotes.length > 1 && <button onClick={() => removeQuote(i)} style={{ position: 'absolute', top: 10, right: 12, background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 16 }}>×</button>}
            </div>
          ))}
        </div>

        {/* Content */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <label className="label" style={{ marginBottom: 0 }}>Content <span style={{ color: 'var(--muted)', fontWeight: 400, textTransform: 'none', fontSize: 11 }}>— optional, describe or name key pieces</span></label>
            <button className="btn btn-ghost btn-sm" onClick={addContent}>+ Add Content</button>
          </div>
          {contentItems.map((item, i) => (
            <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center' }}>
              <select className="input" style={{ width: 110, flexShrink: 0 }} value={item.type} onChange={e => updateContent(i, 'type', e.target.value)}>
                <option value="still">Still</option>
                <option value="film">Film / Video</option>
              </select>
              <input className="input" style={{ flex: 1 }} placeholder="Caption or description" value={item.caption} onChange={e => updateContent(i, 'caption', e.target.value)} />
              {contentItems.length > 1 && <button onClick={() => removeContent(i)} style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 18, flexShrink: 0 }}>×</button>}
            </div>
          ))}
          <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>Actual file uploads will be available in the full platform.</div>
        </div>

        <div style={{ paddingTop: 8, borderTop: '1px solid var(--border)', display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-lime" style={{ opacity: canSubmit ? 1 : 0.4, pointerEvents: canSubmit ? 'all' : 'none' }} onClick={handleSubmit}>Submit for Review →</button>
        </div>
      </div>
    </div>
  );
}


function CommunityProfilePage({ community: c, onBack, role, onRequestPartnership, isOwnProfile }) {
  const [activeCaseStudy, setActiveCaseStudy] = React.useState(null);
  const [showAddCaseStudy, setShowAddCaseStudy] = React.useState(false);
  const [pendingCaseStudies, setPendingCaseStudies] = React.useState([]);
  const [selfReportedCaseStudies, setSelfReportedCaseStudies] = React.useState([]);

  if (activeCaseStudy) {
    return <PartnershipCaseStudy partnership={activeCaseStudy} community={c} onBack={() => setActiveCaseStudy(null)} />;
  }

  if (showAddCaseStudy) {
    return <AddCaseStudyForm
      onSubmit={(cs) => {
        setPendingCaseStudies(prev => [...prev, { ...cs, id: 'pending-' + Date.now(), status: 'pending' }]);
        setShowAddCaseStudy(false);
      }}
      onCancel={() => setShowAddCaseStudy(false)}

  return (
    <div>
