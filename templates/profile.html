<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mayo — community profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --lime: #d2ff01;
  --yellow: #ffea12;
  --black: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --surface3: #222222;
  --white: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --cyan: #b1ecf0;
  --pink: #ff6ef2;
  --orange: #ffab40;
  --green: #b3ff9e;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { min-height:100%; background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; line-height: 1.5; }
.bb { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
.bc { font-family: 'Barlow Condensed', sans-serif; }
::-webkit-scrollbar { width: 4px; height: 6px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; } ::-webkit-scrollbar-track { background: transparent; }
.tier-badge { display:inline-flex; align-items:center; gap:5px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
a { color: inherit; }
</style>
</head>
<body>
<div id="cid" style="display:none">{{ community_id }}</div>
<div id="root"></div>
{% raw %}<script type="text/babel">

const COVER_OPTIONS = [
  { id:1, gradient:'linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 70%,#533483 100%)', label:'Night Run' },
  { id:2, gradient:'linear-gradient(135deg,#0d0d0d 0%,#1a0a00 40%,#3d1c00 70%,#c43a00 100%)', label:'Desert Heat' },
  { id:3, gradient:'linear-gradient(135deg,#0a1628 0%,#1b3a4b 50%,#2d6a4f 100%)', label:'Forest Trail' },
  { id:4, gradient:'linear-gradient(135deg,#1a0a00 0%,#3d2b1f 40%,#8a6a40 70%,#c4a060 100%)', label:'Desert Sand' },
  { id:5, gradient:'linear-gradient(135deg,#0d0d1a 0%,#1a1a3e 40%,#2d1b69 70%,#6b2d8b 100%)', label:'Deep Purple' },
  { id:6, gradient:'linear-gradient(135deg,#001a0a 0%,#003d1a 40%,#006b2d 70%,#00a844 100%)', label:'Pitch Green' },
  { id:7, gradient:'linear-gradient(135deg,#1a0010 0%,#3d0028 40%,#7a0050 70%,#c40080 100%)', label:'Electric Pink' },
  { id:8, gradient:'linear-gradient(135deg,#0a0a00 0%,#1a1a00 40%,#3d3d00 70%,#7a7a00 100%)', label:'Midnight Gold' },
];

const ARCHETYPES = [
  { id:'evangelists',    label:'Evangelists',    color:'#ff6ef2', best:'Brand Awareness',      kpi:'Reach & Share Rate',      desc:'Champions brands they believe in. High share rate, unsolicited advocacy, identity-linked.' },
  { id:'early_adopters', label:'Early Adopters',  color:'#d2ff01', best:'Product Launches',     kpi:'Trial Rate & Buzz',        desc:'Loves being first. Trend-forward, high try rate, first-to-know pride.' },
  { id:'loyalists',      label:'Loyalists',       color:'#b1ecf0', best:'Long-term Sponsorship', kpi:'Retention & Attendance',  desc:'Shows up every time. Repeat engagement, high attendance, low churn.' },
  { id:'buyers',         label:'Buyers',          color:'#ffab40', best:'Direct Response',      kpi:'Conversion Rate & Sales',  desc:'Converts. Purchase intent, conversion signals, practical focus.' },
];

const IgIcon = ({size=16, color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
  </svg>
);

const SubstackIcon = ({size=16, color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/>
  </svg>
);

const GlobeIcon = ({size=16, color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
  </svg>
);

const AVATAR_COLORS = [
  { bg:'#d2ff01', text:'#000' }, { bg:'#b1ecf0', text:'#000' },
  { bg:'#ff6ef2', text:'#000' }, { bg:'#ffab40', text:'#000' },
  { bg:'#b3ff9e', text:'#000' }, { bg:'#ffea12', text:'#000' },
  { bg:'#ff6b6b', text:'#000' },
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = ((h << 5) - h + (name||'').charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function Lightbox({ items, startIndex, onClose }) {
  const norm = (items||[]).map(i => typeof i === 'string' ? {url:i} : i);
  const [idx, setIdx] = React.useState(startIndex || 0);
  React.useEffect(() => {
    const h = e => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setIdx(i => Math.min(i+1, norm.length-1));
      if (e.key === 'ArrowLeft') setIdx(i => Math.max(i-1, 0));
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [norm.length]);
  const cur = norm[idx] || {};
  const hasMeta = cur.title || cur.caption || cur.subtitle;
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.93)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={e=>e.stopPropagation()} style={{ display:'flex', flexDirection:'column', alignItems:'center', maxWidth:'90vw', position:'relative' }}>
        <button onClick={onClose} style={{ position:'absolute', top:-14, right:-14, background:'rgba(255,255,255,0.15)', border:'none', borderRadius:'50%', width:30, height:30, color:'#fff', fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1 }}>✕</button>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          {norm.length > 1 && (
            <button onClick={() => setIdx(i=>Math.max(i-1,0))} disabled={idx===0}
              style={{ background:'rgba(255,255,255,0.12)', border:'none', borderRadius:'50%', width:40, height:40, color:'#fff', fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity:idx===0?0.3:1, flexShrink:0 }}>‹</button>
          )}
          <img src={cur.url} alt="" style={{ maxWidth:'75vw', maxHeight:'70vh', objectFit:'contain', borderRadius:8, display:'block' }} />
          {norm.length > 1 && (
            <button onClick={() => setIdx(i=>Math.min(i+1,norm.length-1))} disabled={idx===norm.length-1}
              style={{ background:'rgba(255,255,255,0.12)', border:'none', borderRadius:'50%', width:40, height:40, color:'#fff', fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity:idx===norm.length-1?0.3:1, flexShrink:0 }}>›</button>
          )}
        </div>
        {hasMeta && (
          <div style={{ textAlign:'center', marginTop:14, maxWidth:500, padding:'0 8px' }}>
            {cur.title && (
              <div style={{ fontFamily:'Barlow Condensed', fontSize:15, fontWeight:800, textTransform:'uppercase', color:'#fff', letterSpacing:'0.06em', marginBottom:4 }}>
                {cur.title}
                {cur.subtitle && <span style={{ fontWeight:400, color:'rgba(255,255,255,0.5)', marginLeft:10, fontSize:13, textTransform:'none', letterSpacing:'normal' }}>{cur.subtitle}</span>}
              </div>
            )}
            {cur.caption && <div style={{ fontSize:13, color:'rgba(255,255,255,0.65)', lineHeight:1.55 }}>{cur.caption}</div>}
          </div>
        )}
        {norm.length > 1 && (
          <div style={{ marginTop:hasMeta?8:16, color:'rgba(255,255,255,0.4)', fontSize:11, fontFamily:'Barlow Condensed', fontWeight:600 }}>{idx+1} / {norm.length}</div>
        )}
      </div>
    </div>
  );
}

function PostCarousel({ igPosts, substackPosts }) {
  const scrollRef = React.useRef(null);
  const drag = React.useRef({ down: false, startX: 0, scrollLeft: 0, moved: false });

  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const onDown = e => {
      drag.current = { down: true, startX: e.pageX - el.offsetLeft, scrollLeft: el.scrollLeft, moved: false };
      el.style.cursor = 'grabbing';
    };
    const onMove = e => {
      if (!drag.current.down) return;
      e.preventDefault();
      const dist = (e.pageX - el.offsetLeft) - drag.current.startX;
      if (Math.abs(dist) > 4) drag.current.moved = true;
      el.scrollLeft = drag.current.scrollLeft - dist;
    };
    const onUp = () => { drag.current.down = false; el.style.cursor = 'grab'; };
    el.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    return () => {
      el.removeEventListener('mousedown', onDown);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }, []);

  const onClickCapture = e => { if (drag.current.moved) { e.preventDefault(); e.stopPropagation(); drag.current.moved = false; } };

  const ig = (igPosts||[]).filter(p => p.media_url||p.thumbnail_url).map(p => ({ ...p, _type:'ig' }));
  const sub = (substackPosts||[]).map(p => ({ ...p, _type:'sub' }));
  const all = [...ig, ...sub].sort((a,b) => {
    const da = new Date(a.timestamp||a.date||0), db = new Date(b.timestamp||b.date||0);
    return db - da;
  });
  if (!all.length) return null;

  const cardStyle = { flexShrink:0, width:130, height:190, borderRadius:8, overflow:'hidden', display:'block', position:'relative', scrollSnapAlign:'start', textDecoration:'none', background:'var(--surface2)', userSelect:'none' };

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
        <div className="bb" style={{ fontSize:18, letterSpacing:'0.03em' }}>Latest</div>
        <div style={{ display:'flex', gap:5 }}>
          {ig.length>0 && <IgIcon size={12} color="var(--muted)" />}
          {sub.length>0 && <SubstackIcon size={12} color="var(--muted)" />}
        </div>
      </div>
      <div ref={scrollRef} onClickCapture={onClickCapture}
        style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:10, scrollSnapType:'x mandatory', WebkitOverflowScrolling:'touch', cursor:'grab' }}>
        {all.map((post, i) => {
          if (post._type === 'ig') {
            const inner = (
              <>
                <img src={post.media_url||post.thumbnail_url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} />
                <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'22px 8px 6px', background:'linear-gradient(to top,rgba(0,0,0,0.75),transparent)' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:3, color:'#fff' }}>
                    <IgIcon size={9} color="#fff" />
                    {post.like_count>0 && <span style={{ fontSize:10, fontFamily:'Barlow Condensed', fontWeight:700 }}>{post.like_count.toLocaleString()}</span>}
                  </div>
                </div>
              </>
            );
            return post.permalink
              ? <a key={i} href={post.permalink} target="_blank" rel="noopener noreferrer" style={cardStyle}>{inner}</a>
              : <div key={i} style={cardStyle}>{inner}</div>;
          } else {
            const inner = (
              <>
                {post.image_url ? <img src={post.image_url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} /> : null}
                <div style={{ position:'absolute', inset:0, padding:'10px 10px 8px', display:'flex', flexDirection:'column', justifyContent:post.image_url?'flex-end':'space-between', background:post.image_url?'linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.2) 50%,transparent 100%)':'none' }}>
                  {!post.image_url && <div style={{ fontSize:11, fontWeight:600, color:'var(--white)', lineHeight:1.4 }}>{post.title}</div>}
                  {post.image_url && <div style={{ fontSize:11, fontWeight:600, color:'#fff', lineHeight:1.35 }}>{(post.title||'').slice(0,50)}</div>}
                  <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                    <SubstackIcon size={9} color="#ff6719" />
                    <span style={{ fontSize:9, color:'#ff6719', fontFamily:'Barlow Condensed', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em' }}>Substack</span>
                  </div>
                </div>
              </>
            );
            return post.link
              ? <a key={i} href={post.link} target="_blank" rel="noopener noreferrer" style={{ ...cardStyle, border:'1px solid var(--border)' }}>{inner}</a>
              : <div key={i} style={{ ...cardStyle, border:'1px solid var(--border)' }}>{inner}</div>;
          }
        })}
      </div>
    </div>
  );
}

function TierBadge({ tier }) {
  const config = {
    'starter': { label:'Starter', color:'var(--muted)', dot:'#555' },
    'verified': { label:'Verified', color:'var(--cyan)', dot:'var(--cyan)' },
    'fully-verified': { label:'Fully Verified', color:'var(--lime)', dot:'var(--lime)' },
  }[tier] || { label:'Starter', color:'var(--muted)', dot:'#555' };
  return (
    <span className="tier-badge" style={{ color: config.color }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:config.dot, display:'inline-block' }} />
      {config.label}
    </span>
  );
}

function ProfilePage() {
  const communityId = document.getElementById('cid').textContent.trim();
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const [lightbox, setLightbox] = React.useState(null);

  React.useEffect(() => {
    if (!communityId) { setError(true); setLoading(false); return; }
    fetch(`/api/community/${communityId}`)
      .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(() => { setError(true); setLoading(false); });
  }, []);

  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  if (loading) {
    return (
      <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--muted)', fontFamily:'Barlow Condensed', fontSize:13, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase' }}>
        Loading…
      </div>
    );
  }

  if (error || !data) {
    return (
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12 }}>
        <div className="bb" style={{ fontSize:32, color:'var(--muted)' }}>Profile Not Found</div>
        <div style={{ fontSize:13, color:'var(--muted)' }}>This community profile doesn't exist or has been removed.</div>
        <a href="/" style={{ marginTop:8, fontFamily:'Barlow Condensed', fontSize:13, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--lime)', textDecoration:'none' }}>← Back to mayo</a>
      </div>
    );
  }

  const coverOption = data.cover_option || 1;
  const coverObj = COVER_OPTIONS.find(o => o.id === coverOption) || COVER_OPTIONS[0];
  const coverBg = data.cover_image_url ? `url(${data.cover_image_url}) center/cover no-repeat` : coverObj.gradient;

  const igData = data.instagram_data || {};
  const igProfile = igData.profile || {};
  const igPosts = (igData.media || []).filter(p => p.media_url || p.thumbnail_url);

  const igConnected = !!data.instagram_token || !!data.instagram_user_id;
  const substackConnected = !!data.substack_url;
  const connectedCount = [igConnected, substackConnected].filter(Boolean).length;
  const tier = connectedCount >= 2 ? 'fully-verified' : connectedCount >= 1 ? 'verified' : 'starter';

  const tags = data.tags || [];
  const capabilities = data.capabilities || [];
  const partnershipPrefs = data.partnership_preferences || '';
  const mediaItems = data.media_items || [];
  const caseStudies = (data.case_studies || []).filter(cs => cs.verified);
  const notableMembers = (data.notable_members || []).filter(m => m.verified);
  const archetype = ARCHETYPES.find(a => a.id === data.archetype) || null;

  const igFollowers = igProfile.followers_count || 0;
  const igEr = igData.engagement_rate ? Math.round(igData.engagement_rate * 10) / 10 : null;

  return (
    <div style={{ minHeight:'100vh', background:'var(--black)' }}>

      {/* Top bar */}
      <div style={{ padding:'18px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid var(--border)' }}>
        <a href="/" style={{ textDecoration:'none' }}>
          <div className="bb" style={{ fontSize:22, letterSpacing:'0.04em', color:'var(--white)' }}>mayo<span style={{ color:'var(--lime)' }}>.</span></div>
        </a>
        <button
          onClick={copyLink}
          style={{ background:copied?'var(--lime)':'var(--surface2)', color:copied?'#000':'var(--white)', border:'1px solid var(--border2)', borderRadius:6, padding:'6px 14px', fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer', transition:'all 0.2s' }}>
          {copied ? '✓ Copied' : 'Share Profile'}
        </button>
      </div>

      {/* Single-column layout */}
      <div style={{ width:'100%', maxWidth:660, margin:'0 auto', paddingBottom:80 }}>

        {/* Face card — full width, 16:9, image + info overlaid at bottom */}
        <div style={{ margin:'0 24px 0' }}>
          <div style={{ borderRadius:12, overflow:'hidden', position:'relative', background:coverBg, aspectRatio:'16/9' }}>
            {data.cover_image_url && <img src={data.cover_image_url} alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.5, mixBlendMode:'luminosity' }} onError={e => e.target.style.display='none'} />}
            <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(0,0,0,0.7) 65%, rgba(0,0,0,0.92) 100%)' }} />
            {data.email && (
              <a href={`mailto:${data.email}?subject=Partnership enquiry - ${encodeURIComponent(data.name||'')}`}
                style={{ position:'absolute', top:14, right:14, zIndex:2, background:'var(--lime)', color:'#000', borderRadius:6, padding:'7px 14px', fontFamily:'Barlow Condensed', fontSize:13, fontWeight:800, letterSpacing:'0.06em', textTransform:'uppercase', textDecoration:'none', display:'inline-block' }}>
                Reach Out →
              </a>
            )}
            <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'0 22px 20px' }}>
              <div style={{ display:'flex', alignItems:'flex-end', gap:14, marginBottom:10 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div className="bb" style={{ fontSize:36, color:'#fff', lineHeight:1, textShadow:'0 1px 6px rgba(0,0,0,0.5)', marginBottom:3 }}>{data.name}</div>
                  {data.tagline && <div style={{ fontSize:12, color:'rgba(255,255,255,0.65)' }}>{data.tagline}</div>}
                </div>
                <TierBadge tier={tier} />
              </div>
              {tags.length > 0 && (
                <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
                  {tags.slice(0,6).map(t => (
                    <span key={t} style={{ border:'1px solid rgba(255,255,255,0.25)', color:'rgba(255,255,255,0.8)', borderRadius:3, padding:'2px 7px', fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>{t}</span>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Key stats row — Active Members + Reach */}
        {(data.active_members || igFollowers > 0) && (() => {
          const reach = igFollowers || 0;
          const fmtReach = reach >= 1000000 ? (reach/1000000).toFixed(1)+'M' : reach >= 1000 ? (reach/1000).toFixed(1)+'K' : reach > 0 ? String(reach) : null;
          return (
            <div style={{ margin:'10px 24px 0', display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              {data.active_members ? (
                <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', textAlign:'center' }}>
                  <div style={{ fontFamily:'Barlow Condensed', fontSize:9, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:4 }}>Active Members</div>
                  <div style={{ fontFamily:'Bebas Neue', fontSize:22, color:'var(--cyan)', lineHeight:1 }}>{Number(data.active_members).toLocaleString()}</div>
                </div>
              ) : <div />}
              {fmtReach ? (
                <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', textAlign:'center' }}>
                  <div style={{ fontFamily:'Barlow Condensed', fontSize:9, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:4 }}>Reach</div>
                  <div style={{ fontFamily:'Bebas Neue', fontSize:22, color:'var(--lime)', lineHeight:1 }}>{fmtReach}</div>
                </div>
              ) : <div />}
            </div>
          );
        })()}

        {/* Content column */}
        <div style={{ padding:'0 24px' }}>

          {/* Profile info card */}
          <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'20px 24px', marginBottom:14, marginTop:14 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px 32px' }}>
              {data.location && (
                <div>
                  <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:4 }}>Location</div>
                  <div style={{ fontSize:13 }}>{data.location}</div>
                </div>
              )}
              {data.website && (
                <div>
                  <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:4 }}>Website</div>
                  <a href={data.website} target="_blank" rel="noopener noreferrer" style={{ fontSize:13, color:'var(--cyan)', display:'flex', alignItems:'center', gap:5, textDecoration:'none' }}>
                    <GlobeIcon size={12} color="var(--cyan)" />
                    {data.website.replace(/^https?:\/\//, '')}
                  </a>
                </div>
              )}
              {(igConnected || substackConnected) && (
                <div style={{ gridColumn: data.location && data.website ? '1 / -1' : undefined }}>
                  <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:6 }}>Channels</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:10 }}>
                    {igConnected && igProfile.username && (
                      <a href={`https://instagram.com/${igProfile.username}`} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:6, textDecoration:'none', color:'#e1306c', fontSize:13, fontWeight:600 }}>
                        <IgIcon size={15} color="#e1306c" />
                        @{igProfile.username}
                      </a>
                    )}
                    {igConnected && !igProfile.username && (
                      <span style={{ display:'flex', alignItems:'center', gap:6, color:'var(--muted)', fontSize:13 }}>
                        <IgIcon size={15} color="var(--muted)" />
                        Instagram
                      </span>
                    )}
                    {substackConnected && (
                      <a href={data.substack_url} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:6, textDecoration:'none', color:'#ff6719', fontSize:13, fontWeight:600 }}>
                        <SubstackIcon size={15} color="#ff6719" />
                        {data.substack_url.replace(/^https?:\/\//, '').replace(/\/$/, '')}
                      </a>
                    )}
                  </div>
                </div>
              )}
            </div>
            {data.description && (
              <div style={{ marginTop:18, paddingTop:18, borderTop:'1px solid var(--border)', fontSize:13, color:'rgba(240,240,240,0.7)', lineHeight:1.75 }}>{data.description}</div>
            )}
          </div>

          {/* Archetype */}
          {archetype && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'16px 24px', marginBottom:14 }}>
              <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:10 }}>Community Type</div>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom: data.archetype_reasoning ? 12 : 0 }}>
                <div style={{ width:8, height:8, borderRadius:'50%', background:archetype.color, flexShrink:0 }} />
                <div style={{ fontFamily:'Barlow Condensed', fontSize:17, fontWeight:800, textTransform:'uppercase', color:archetype.color }}>{archetype.label}</div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:600, textTransform:'uppercase', color:'var(--muted)', marginLeft:4 }}>Best for {archetype.best}</div>
              </div>
              {data.archetype_reasoning
                ? <div style={{ fontSize:12, color:'rgba(240,240,240,0.65)', lineHeight:1.6, borderLeft:'2px solid ' + archetype.color, paddingLeft:12 }}>{data.archetype_reasoning}</div>
                : <div style={{ fontSize:12, color:'var(--muted)', marginTop:6, lineHeight:1.55 }}>{archetype.desc}</div>
              }
            </div>
          )}

          {/* Capabilities */}
          {capabilities.length > 0 && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 24px', marginBottom:14 }}>
              <div className="bb" style={{ fontSize:17, letterSpacing:'0.03em', marginBottom:12 }}>What We Offer</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
                {capabilities.map(cap => (
                  <span key={cap} style={{ padding:'5px 12px', borderRadius:4, border:'1px solid var(--border2)', fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--white)' }}>{cap}</span>
                ))}
              </div>
            </div>
          )}

          {/* Partnership preferences */}
          {partnershipPrefs && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 24px', marginBottom:14 }}>
              <div className="bb" style={{ fontSize:17, letterSpacing:'0.03em', marginBottom:10 }}>What We Look For</div>
              <div style={{ fontSize:13, color:'rgba(240,240,240,0.65)', lineHeight:1.75, fontStyle:'italic', borderLeft:'2px solid var(--lime)', paddingLeft:14 }}>"{partnershipPrefs}"</div>
            </div>
          )}

          {/* Latest posts carousel */}
          {(igPosts.length > 0 || (data.substack_data?.posts||[]).length > 0) && (
            <div style={{ marginBottom:14 }}>
              <PostCarousel igPosts={igPosts} substackPosts={data.substack_data?.posts||[]} />
            </div>
          )}

          {/* Photos & Events */}
          {mediaItems.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div className="bb" style={{ fontSize:19, letterSpacing:'0.03em', marginBottom:12 }}>Photos &amp; Events</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
                {mediaItems.map((item, i) => (
                  <div key={i} onClick={() => setLightbox({ items: data.media_items.map(m=>({url:m.url, caption:m.caption||undefined})), index:i })} style={{ cursor:'pointer', aspectRatio:'1', borderRadius:8, overflow:'hidden', background:'var(--surface2)', border:'1px solid var(--border)' }}>
                    <img src={item.url} alt={item.caption||''} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Notable Members */}
          {notableMembers.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div className="bb" style={{ fontSize:19, letterSpacing:'0.03em', marginBottom:12 }}>Notable Members</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 }}>
                {notableMembers.map((m, i) => {
                  const ac = avatarColor(m.name);
                  return (
                    <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 16px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10 }}>
                      <div style={{ width:40, height:40, borderRadius:'50%', background:ac.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Barlow Condensed', fontSize:16, fontWeight:700, color:ac.text, flexShrink:0 }}>
                        {(m.name||'?')[0].toUpperCase()}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.name}</div>
                        {m.ig_handle && (
                          <a href={`https://instagram.com/${m.ig_handle}`} target="_blank" rel="noopener noreferrer" style={{ fontSize:11, color:'var(--muted)', textDecoration:'none', display:'flex', alignItems:'center', gap:3, marginTop:1 }}>
                            <IgIcon size={10} color="var(--muted)" />@{m.ig_handle}
                          </a>
                        )}
                        {m.role && <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'Barlow Condensed', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', marginTop:2 }}>{m.role}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Past Partnerships */}
          {caseStudies.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div className="bb" style={{ fontSize:19, letterSpacing:'0.03em', marginBottom:12 }}>Past Partnerships</div>
              {caseStudies.map((cs, i) => (
                <div key={i} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:10 }}>
                  {(() => {
                    const imgs = cs.images?.length ? cs.images : cs.image_url ? [cs.image_url] : [];
                    if (!imgs.length) return null;
                    const csItems = imgs.map(url => ({ url, title: cs.brand, subtitle: [cs.year, cs.description].filter(Boolean).join(' · ').slice(0,120) }));
                    return (
                      <div onClick={() => setLightbox({ items: csItems, index: 0 })} style={{ cursor:'pointer', position:'relative', height:200, overflow:'hidden' }}>
                        <img src={imgs[0]} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                        {imgs.length > 1 && (
                          <div style={{ position:'absolute', bottom:8, right:8, background:'rgba(0,0,0,0.65)', borderRadius:4, padding:'3px 8px', fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, color:'#fff' }}>+{imgs.length-1} more</div>
                        )}
                      </div>
                    );
                  })()}
                  <div style={{ padding:'14px 18px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5 }}>
                      <div style={{ fontFamily:'Barlow Condensed', fontSize:16, fontWeight:800, textTransform:'uppercase' }}>{cs.brand}</div>
                      {cs.year && <div style={{ fontFamily:'Barlow Condensed', fontSize:12, color:'var(--muted)', fontWeight:600 }}>{cs.year}</div>}
                    </div>
                    {cs.description && <div style={{ fontSize:13, color:'var(--muted)', lineHeight:1.6 }}>{cs.description}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Footer */}
          <div style={{ marginTop:32, paddingTop:24, borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--muted)' }}>
              Powered by <a href="/" style={{ color:'var(--lime)', textDecoration:'none' }}>mayo.</a>
            </div>
            <a href="/" style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--cyan)', textDecoration:'none' }}>Join the network →</a>
          </div>

        </div>{/* end content column */}
      </div>{/* end single-column container */}

      {lightbox && <Lightbox items={lightbox.items} startIndex={lightbox.index} onClose={() => setLightbox(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProfilePage />);
</script>{% endraw %}
</body>
</html>
