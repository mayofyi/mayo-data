<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mayo — join as a community</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --lime: #d2ff01;
  --yellow: #ffea12;
  --black: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --surface3: #222222;
  --white: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --cyan: #b1ecf0;
  --pink: #ff6ef2;
  --orange: #ffab40;
  --green: #b3ff9e;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; line-height: 1.5; }
.bb { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
.bc { font-family: 'Barlow Condensed', sans-serif; }
::-webkit-scrollbar { width: 4px; height: 6px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; } ::-webkit-scrollbar-track { background: transparent; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px; border-radius:6px; border:none; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.06em; text-transform:uppercase; transition:all 0.15s; white-space:nowrap; }
.btn-lime { background:var(--lime); color:var(--black); }
.btn-lime:hover { background:#bfee00; }
.btn-ghost { background:transparent; color:var(--white); border:1px solid var(--border2); }
.btn-ghost:hover { background:var(--surface2); }
.btn-sm { padding:6px 13px; font-size:12px; }
.btn-lg { padding:12px 28px; font-size:15px; }
.btn:disabled { opacity:0.35; cursor:not-allowed; }

.input { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:10px 12px; color:var(--white); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border 0.15s; }
.input:focus { border-color:rgba(255,255,255,0.3); }
textarea.input { resize:none; }
.label { display:block; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.form-group { margin-bottom:18px; }

.onboarding-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.onboarding-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:480px; overflow:hidden; }
.onboarding-header { padding:28px 36px 0; border-bottom:1px solid var(--border); padding-bottom:24px; }
.onboarding-body { padding:28px 36px; }
.onboarding-footer { padding:16px 36px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.step-dots { display:flex; gap:5px; margin-bottom:16px; }
.step-dot { height:4px; width:12px; border-radius:2px; background:var(--surface3); transition:all 0.2s; }
.step-dot.active { background:var(--lime); width:20px; }
.step-dot.done { background:var(--lime); opacity:0.4; }

.tag-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.tag-item { padding:5px 10px; border-radius:4px; border:1px solid var(--border2); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; background:transparent; transition:all 0.12s; }
.tag-item:hover { border-color:rgba(255,255,255,0.25); color:var(--white); }
.tag-item.selected { background:var(--lime); border-color:var(--lime); color:var(--black); }

.channel-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:8px; }
.channel-card.connected { border-color:rgba(210,255,1,0.3); }

.cover-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.cover-opt { height:48px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all 0.12s; }
.cover-opt.selected { border-color:var(--lime); box-shadow:0 0 0 1px var(--lime); }

.tier-badge { display:inline-flex; align-items:center; gap:5px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }

.char-count { font-size:11px; color:var(--muted); text-align:right; margin-top:4px; }
</style>
</head>
<body>
<div id="root"></div>

const IgIcon = ({size=16, color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>

const SubstackIcon = ({size=16, color='currentColor'}) => (

    <path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/>

const GlobeIcon = ({size=16, color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/>

);

const AVATAR_COLORS = [
  { bg:'#d2ff01', text:'#000' }, { bg:'#b1ecf0', text:'#000' },
  { bg:'#ff6ef2', text:'#000' }, { bg:'#ffab40', text:'#000' },
  { bg:'#b3ff9e', text:'#000' }, { bg:'#ffea12', text:'#000' },
  { bg:'#ff6b6b', text:'#000' },
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = ((h << 5) - h + (name||'').charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function Lightbox({ items, startIndex, onClose }) {
  const norm = (items||[]).map(i => typeof i === 'string' ? {url:i} : i);
  const [idx, setIdx] = React.useState(startIndex || 0);
  React.useEffect(() => {
    const h = e => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setIdx(i => Math.min(i+1, norm.length-1));
      if (e.key === 'ArrowLeft') setIdx(i => Math.max(i-1, 0));
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [norm.length]);
  const cur = norm[idx] || {};
  const hasMeta = cur.title || cur.caption || cur.subtitle;
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.93)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={e=>e.stopPropagation()} style={{ display:'flex', flexDirection:'column', alignItems:'center', maxWidth:'90vw', position:'relative' }}>
        <button onClick={onClose} style={{ position:'absolute', top:-14, right:-14, background:'rgba(255,255,255,0.15)', border:'none', borderRadius:'50%', width:30, height:30, color:'#fff', fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1 }}>✕</button>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          {norm.length > 1 && (
            <button onClick={() => setIdx(i=>Math.max(i-1,0))} disabled={idx===0}
              style={{ background:'rgba(255,255,255,0.12)', border:'none', borderRadius:'50%', width:40, height:40, color:'#fff', fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity:idx===0?0.3:1, flexShrink:0 }}>‹</button>
          )}
          <img src={cur.url} alt="" style={{ maxWidth:'75vw', maxHeight:'70vh', objectFit:'contain', borderRadius:8, display:'block' }} />
          {norm.length > 1 && (
            <button onClick={() => setIdx(i=>Math.min(i+1,norm.length-1))} disabled={idx===norm.length-1}
              style={{ background:'rgba(255,255,255,0.12)', border:'none', borderRadius:'50%', width:40, height:40, color:'#fff', fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity:idx===norm.length-1?0.3:1, flexShrink:0 }}>›</button>
          )}
        </div>
        {hasMeta && (
          <div style={{ textAlign:'center', marginTop:14, maxWidth:500, padding:'0 8px' }}>
            {cur.title && (
              <div style={{ fontFamily:'Barlow Condensed', fontSize:15, fontWeight:800, textTransform:'uppercase', color:'#fff', letterSpacing:'0.06em', marginBottom:4 }}>
                {cur.title}
                {cur.subtitle && <span style={{ fontWeight:400, color:'rgba(255,255,255,0.5)', marginLeft:10, fontSize:13, textTransform:'none', letterSpacing:'normal' }}>{cur.subtitle}</span>}
              </div>
            )}
            {cur.caption && <div style={{ fontSize:13, color:'rgba(255,255,255,0.65)', lineHeight:1.55 }}>{cur.caption}</div>}
          </div>
        )}
        {norm.length > 1 && (
          <div style={{ marginTop:hasMeta?8:16, color:'rgba(255,255,255,0.4)', fontSize:11, fontFamily:'Barlow Condensed', fontWeight:600 }}>{idx+1} / {norm.length}</div>
        )}
      </div>
    </div>
  );
}

function PostCarousel({ igPosts, substackPosts }) {
  const scrollRef = React.useRef(null);
  const drag = React.useRef({ down: false, startX: 0, scrollLeft: 0, moved: false });

  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const onDown = e => {
      drag.current = { down: true, startX: e.pageX - el.offsetLeft, scrollLeft: el.scrollLeft, moved: false };
      el.style.cursor = 'grabbing';
    };
    const onMove = e => {
      if (!drag.current.down) return;
      e.preventDefault();
      const dist = (e.pageX - el.offsetLeft) - drag.current.startX;
      if (Math.abs(dist) > 4) drag.current.moved = true;
      el.scrollLeft = drag.current.scrollLeft - dist;
    };
    const onUp = () => { drag.current.down = false; el.style.cursor = 'grab'; };
    el.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    return () => {
      el.removeEventListener('mousedown', onDown);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }, []);

  const onClickCapture = e => { if (drag.current.moved) { e.preventDefault(); e.stopPropagation(); drag.current.moved = false; } };

  const ig = (igPosts||[]).filter(p => p.media_url||p.thumbnail_url).map(p => ({ ...p, _type:'ig' }));
  const sub = (substackPosts||[]).map(p => ({ ...p, _type:'sub' }));
  const all = [...ig, ...sub].sort((a,b) => {
    const da = new Date(a.timestamp||a.date||0), db = new Date(b.timestamp||b.date||0);
    return db - da;
  });
  if (!all.length) return null;

  const cardStyle = { flexShrink:0, width:130, height:190, borderRadius:8, overflow:'hidden', display:'block', position:'relative', scrollSnapAlign:'start', textDecoration:'none', background:'var(--surface2)', userSelect:'none' };

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
        <div className="bb" style={{ fontSize:18, letterSpacing:'0.03em' }}>Latest</div>
        <div style={{ display:'flex', gap:5 }}>
          {ig.length>0 && <IgIcon size={12} color="var(--muted)" />}
          {sub.length>0 && <SubstackIcon size={12} color="var(--muted)" />}
        </div>
      </div>
      <div ref={scrollRef} onClickCapture={onClickCapture}
        style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:10, scrollSnapType:'x mandatory', WebkitOverflowScrolling:'touch', cursor:'grab' }}>
        {all.map((post, i) => {
          if (post._type === 'ig') {
            const inner = (
              <>
                <img src={post.media_url||post.thumbnail_url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} />
                <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'22px 8px 6px', background:'linear-gradient(to top,rgba(0,0,0,0.75),transparent)' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:3, color:'#fff' }}>
                    <IgIcon size={9} color="#fff" />
                    {post.like_count>0 && <span style={{ fontSize:10, fontFamily:'Barlow Condensed', fontWeight:700 }}>{post.like_count.toLocaleString()}</span>}
                  </div>
                </div>
              </>
            );
            return post.permalink
              ? <a key={i} href={post.permalink} target="_blank" rel="noopener noreferrer" style={cardStyle}>{inner}</a>
              : <div key={i} style={cardStyle}>{inner}</div>;
          } else {
            const inner = (
              <>
                {post.image_url ? <img src={post.image_url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} /> : null}
                <div style={{ position:'absolute', inset:0, padding:'10px 10px 8px', display:'flex', flexDirection:'column', justifyContent:post.image_url?'flex-end':'space-between', background:post.image_url?'linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.2) 50%,transparent 100%)':'none' }}>
                  {!post.image_url && <div style={{ fontSize:11, fontWeight:600, color:'var(--white)', lineHeight:1.4 }}>{post.title}</div>}
                  {post.image_url && <div style={{ fontSize:11, fontWeight:600, color:'#fff', lineHeight:1.35 }}>{(post.title||'').slice(0,50)}</div>}
                  <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                    <SubstackIcon size={9} color="#ff6719" />
                    <span style={{ fontSize:9, color:'#ff6719', fontFamily:'Barlow Condensed', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em' }}>Substack</span>
                  </div>
                </div>
              </>
            );
            return post.link
              ? <a key={i} href={post.link} target="_blank" rel="noopener noreferrer" style={{ ...cardStyle, border:'1px solid var(--border)' }}>{inner}</a>
              : <div key={i} style={{ ...cardStyle, border:'1px solid var(--border)' }}>{inner}</div>;
          }
        })}
      </div>
    </div>
  );
}

function StepDots({ current }) {
  return (
    <div className="step-dots">
      {Array.from({ length: TOTAL_STEPS }).map((_, i) => (
        <div key={i} className={`step-dot ${i+1 === current ? 'active' : i+1 < current ? 'done' : ''}`} />
      ))}
    </div>
  );
}

function TierBadge({ tier }) {
  const config = {
    'starter': { label:'Starter', color:'var(--muted)', dot:'#555' },
    'verified': { label:'Verified', color:'var(--cyan)', dot:'var(--cyan)' },
    'fully-verified': { label:'Fully Verified', color:'var(--lime)', dot:'var(--lime)' },
  }[tier] || { label:'Starter', color:'var(--muted)', dot:'#555' };
  return (
    <span className="tier-badge" style={{ color: config.color }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:config.dot, display:'inline-block' }} />
      {config.label}
    </span>
  );
}

// ── Step 1: Welcome ───────────────────────────────────────────────────────────
function Step1({ onNext }) {
  return (
    <div className="onboarding-screen">
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse at 50% 0%,rgba(210,255,1,0.05) 0%,transparent 65%)', pointerEvents:'none' }} />
      <div className="onboarding-box" style={{ position:'relative', zIndex:1 }}>
        <div style={{ padding:'44px 36px', textAlign:'center', borderBottom:'1px solid var(--border)' }}>
          <div className="bb" style={{ fontSize:52, letterSpacing:'0.05em', marginBottom:8 }}>mayo<span style={{ color:'var(--lime)' }}>.</span></div>
          <div style={{ fontSize:13, color:'var(--muted)', marginBottom:28 }}>The community partnerships platform</div>

// ── Step 2: Basic Info ────────────────────────────────────────────────────────
function Step2({ onNext, onBack, form, setForm }) {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const canContinue = form.leaderName.trim() && form.email.trim() && form.name.trim() && form.tagline.trim() && form.description.trim();

  async function handleSubmit() {
    setLoading(true);
    setError('');
    try {
      const res = await fetch('/api/community', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          leader_name: form.leaderName,
          email: form.email,
          name: form.name,
          tagline: form.tagline,
          location: form.location,
          description: form.description,
          tags: form.tags,
          website: form.website,
          cover_option: form.coverOption,
          capabilities: form.capabilities,
        }),
      });
      const data = await res.json();
      setForm(f => ({ ...f, communityId: data.id }));
      onNext();
    } catch (e) {
      setError('Something went wrong. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  const toggleTag = (tag) => setForm(f => ({
    ...f,

  return (
    <div className="onboarding-screen">

              <label className="label">Your Name *</label>
              <input className="input" placeholder="e.g. Jordan Lee" value={form.leaderName} onChange={e => setForm(f=>({...f,leaderName:e.target.value}))} />

            <div className="form-group">

          <div className="form-group">
            <label className="label">Website <span style={{ color:'var(--muted)', fontWeight:400, textTransform:'none', fontSize:11 }}>— optional</span></label>

          </div>
          <div className="form-group">
            <label className="label">What's your community about? *</label>
            <textarea className="input" rows={4} placeholder="Describe your community in your own words — who you are, what you do, and what makes your members special." value={form.description} onChange={e => setForm(f=>({...f,description:e.target.value.slice(0,300)}))} />
            <div className="char-count">{form.description.length}/300</div>
          </div>
          <div className="form-group" style={{ marginBottom:0 }}>
            <label className="label">What does your community care about? <span style={{ color:'var(--muted)', fontWeight:400, textTransform:'none', fontSize:11 }}>Pick all that apply</span></label>
            <div className="tag-grid">
              {INTEREST_TAGS.map(tag => (
                <button key={tag} className={`tag-item ${form.tags.includes(tag) ? 'selected' : ''}`} onClick={() => toggleTag(tag)}>{tag}</button>
              ))}

          </div>
          {error && <div style={{ color:'#ff6b6b', fontSize:12, marginTop:12 }}>{error}</div>}

        <div className="onboarding-footer">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
          <button className="btn btn-lime" disabled={!canContinue || loading} onClick={handleSubmit}>
            {loading ? 'Saving…' : 'Continue →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Step 3: Connect Channels ──────────────────────────────────────────────────
function Step3({ onNext, onBack, form, setForm }) {
  const [substackInput, setSubstackInput] = useState(form.substackUrl || '');
  const [savingSubstack, setSavingSubstack] = useState(false);

  const igConnected = form.instagramConnected;
  const substackConnected = !!form.substackUrl;
  const connectedCount = [igConnected, substackConnected].filter(Boolean).length;
  const tier = connectedCount >= 2 ? 'fully-verified' : connectedCount >= 1 ? 'verified' : 'starter';

  const tierMsg = {
    starter: { text: 'Connect at least one channel to unlock Verified status and get better matches.', color: 'var(--muted)' },
    verified: { text: 'Connect one more channel to unlock Fully Verified status.', color: 'var(--cyan)' },
    'fully-verified': { text: "You're Fully Verified — brands can see the full picture.", color: 'var(--lime)' },
  }[tier];

  function connectInstagram() {
    window.location.href = `/login?community_id=${form.communityId}`;
  }

  async function saveSubstack() {
    if (!substackInput.trim()) return;
    setSavingSubstack(true);
    await fetch(`/api/community/${form.communityId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ substack_url: substackInput.trim() }),
    });
    setForm(f => ({ ...f, substackUrl: substackInput.trim() }));
    setSavingSubstack(false);
  }

  const channels = [
    { id: 'instagram', name: 'Instagram', icon: '📸', color: '#e1306c', action: 'oauth' },
    { id: 'substack', name: 'Substack', icon: '📧', color: '#ff6719', action: 'url' },
    { id: 'tiktok', name: 'TikTok', icon: '🎵', color: '#69c9d0', action: 'soon' },
    { id: 'youtube', name: 'YouTube', icon: '▶', color: '#ff0000', action: 'soon' },
    { id: 'discord', name: 'Discord', icon: '💬', color: '#5865f2', action: 'soon' },
    { id: 'x', name: 'X / Twitter', icon: '✕', color: '#aaa', action: 'soon' },
  ];

  return (
    <div className="onboarding-screen">
      <div className="onboarding-box">
        <div className="onboarding-header">
          <StepDots current={3} />
          <div className="bb" style={{ fontSize:30, marginBottom:6 }}>Connect your channels</div>
          <div style={{ fontSize:13, color:'var(--muted)' }}>Connected channels power your match score and show brands the real data behind your community.</div>
        </div>
        <div className="onboarding-body" style={{ maxHeight:'60vh', overflowY:'auto' }}>

          {/* Tier bar */}
          <div style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:8, padding:'12px 14px', marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <TierBadge tier={tier} />
              <div style={{ display:'flex', gap:5 }}>
                {['starter','verified','fully-verified'].map((t,i) => (
                  <div key={t} style={{ width:32, height:4, borderRadius:2, background:['starter','verified','fully-verified'].indexOf(tier)>=i?'var(--lime)':'var(--surface3)' }} />
                ))}
              </div>
            </div>
            <div style={{ fontSize:12, color:tierMsg.color }}>{tierMsg.text}</div>
          </div>

          {channels.map(ch => {
            const isIg = ch.id === 'instagram';
            const isSub = ch.id === 'substack';
            const connected = (isIg && igConnected) || (isSub && substackConnected);

            return (
              <div key={ch.id} className={`channel-card ${connected ? 'connected' : ''}`}>
                <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <div style={{ width:36, height:36, borderRadius:8, background:ch.color+'22', color:ch.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>{ch.icon}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600 }}>{ch.name}</div>
                    {connected && <div style={{ fontSize:11, color:'var(--lime)', marginTop:2 }}>✓ Connected</div>}
                    {ch.action === 'soon' && <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>Coming soon</div>}
                  </div>
                  {!connected && ch.action === 'oauth' && (
                    <button className="btn btn-lime btn-sm" onClick={connectInstagram}>Connect</button>
                  )}
                  {connected && <span style={{ color:'var(--lime)', fontSize:16 }}>✓</span>}
                  {ch.action === 'soon' && (
                    <span style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', color:'var(--muted)', textTransform:'uppercase', border:'1px solid var(--border)', borderRadius:4, padding:'3px 8px' }}>Soon</span>
                  )}
                </div>

                {/* Substack URL input */}

                  <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid var(--border)', display:'flex', gap:8 }}>
                    <input className="input" placeholder="https://yourpublication.substack.com" value={substackInput} onChange={e=>setSubstackInput(e.target.value)} style={{ flex:1 }} />
                    <button className="btn btn-ghost btn-sm" onClick={saveSubstack} disabled={!substackInput.trim()||savingSubstack}>
                      {savingSubstack ? '…' : 'Save'}
                    </button>
                  </div>
                )}

          })}

          <div style={{ marginTop:12, padding:'10px 14px', background:'rgba(177,236,240,0.06)', border:'1px solid rgba(177,236,240,0.15)', borderRadius:8 }}>
            <div style={{ fontSize:12, color:'var(--cyan)', lineHeight:1.6 }}>
              💡 <strong>Not ready to connect yet?</strong> You can connect channels any time from your profile settings.

        <div className="onboarding-footer">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
          <button className="btn btn-lime" onClick={onNext}>Continue →</button>

      </div>

}

                  style={{ background: form.archetype===a.id ? a.color+'18' : 'var(--surface2)', border: form.archetype===a.id ? `1.5px solid ${a.color}` : '1px solid var(--border)', borderRadius:8, padding:'12px 14px', cursor:'pointer', textAlign:'left', transition:'all 0.15s' }}>
                  <div style={{ fontFamily:'Bebas Neue', fontSize:18, letterSpacing:'0.03em', color: form.archetype===a.id ? a.color : 'var(--white)', marginBottom:4 }}>{a.label}</div>
                  <div style={{ fontSize:11, color:'var(--muted)', lineHeight:1.5 }}>{a.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Capabilities */}

            <label className="label">What can your community offer? <span style={{ color:'var(--muted)', fontWeight:400, textTransform:'none', fontSize:11 }}>Pick all that apply</span></label>
            <div className="tag-grid">
              {CAPABILITIES.map(cap => (
                <button key={cap} className={`tag-item ${form.capabilities.includes(cap)?'selected':''}`} onClick={() => toggleCap(cap)}>{cap}</button>

              placeholder="e.g. Brands that align with our values, want a genuine presence in our community, and are open to long-term relationships."
              value={form.partnershipPrefs}
              onChange={e => setForm(f=>({...f, partnershipPrefs:e.target.value.slice(0,400)}))}
            />
            <div className="char-count">{(form.partnershipPrefs||'').length}/400</div>
          </div>

          {/* Notable Members */}
          <div>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>

                <div style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:2 }}>Notable Members</div>
                <div style={{ fontSize:12, color:'var(--muted)' }}>People your community is known for</div>

// ── Step 5: Cover ────────────────────────────────────────────────────────────
function Step5({ onNext, onBack, form, setForm }) {
  const cover = COVER_OPTIONS.find(o => o.id === form.coverOption) || COVER_OPTIONS[0];
  const coverBg = form.coverImageUrl ? `url(${form.coverImageUrl}) center/cover no-repeat` : cover.gradient;
  const igConnected = form.instagramConnected;
  const substackConnected = !!form.substackUrl;
  const connectedCount = [igConnected, substackConnected].filter(Boolean).length;
  const tier = connectedCount >= 2 ? 'fully-verified' : connectedCount >= 1 ? 'verified' : 'starter';
  const [uploading, setUploading] = React.useState(false);

  async function saveCover(id) {
    setForm(f => ({ ...f, coverOption: id, coverImageUrl: null }));
    await fetch(`/api/community/${form.communityId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cover_option: id }),
    });
  }

  async function uploadCoverPhoto(e) {
    const file = e.target.files[0];
    if (!file || !form.communityId) return;
    setUploading(true);
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`/api/community/${form.communityId}/cover`, { method:'POST', body:fd });
      const data = await res.json();
      if (data.url) setForm(f => ({ ...f, coverImageUrl: data.url }));
    } finally {
      setUploading(false);
    }
  }

  return (
    <div className="onboarding-screen">
      <div className="onboarding-box" style={{ maxWidth:560 }}>
        <div className="onboarding-header">
          <StepDots current={5} />
          <div className="bb" style={{ fontSize:30, marginBottom:6 }}>Make it yours</div>
          <div style={{ fontSize:13, color:'var(--muted)' }}>Choose a cover photo or gradient for your profile card.</div>
        </div>
        <div className="onboarding-body" style={{ maxHeight:'65vh', overflowY:'auto' }}>

          {/* Face card preview */}
          <div style={{ maxWidth:200, margin:'0 auto 20px', borderRadius:10, overflow:'hidden', border:'1px solid var(--border)' }}>
            <div style={{ aspectRatio:'3/4', position:'relative', background:coverBg }}>
              <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.78))' }} />
              <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'24px 10px 10px' }}>
                <div className="bb" style={{ fontSize:16, color:'#fff', lineHeight:1, marginBottom:2 }}>{form.name || 'Your Community'}</div>
                <div style={{ fontSize:9, color:'rgba(255,255,255,0.75)' }}>{form.tagline || 'Your tagline'}</div>
              </div>
            </div>
            <div style={{ padding:'8px 10px', display:'flex', alignItems:'center', justifyContent:'space-between', background:'var(--surface)' }}>
              <TierBadge tier={tier} />
            </div>
          </div>

          {/* Photo upload */}
          <label style={{ display:'block', marginBottom:14, cursor:'pointer' }}>
            <input type="file" accept="image/*" style={{ display:'none' }} onChange={uploadCoverPhoto} disabled={uploading} />
            <div style={{ border:'1px dashed var(--border2)', borderRadius:8, padding:'11px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ width:30, height:30, borderRadius:6, background:'var(--surface3)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>
                {uploading ? '…' : form.coverImageUrl ? '✓' : '+'}
              </div>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color: form.coverImageUrl ? 'var(--lime)' : 'var(--white)' }}>
                  {uploading ? 'Uploading…' : form.coverImageUrl ? 'Cover photo uploaded' : 'Upload a cover photo'}
                </div>
                <div style={{ fontSize:11, color:'var(--muted)' }}>JPG or PNG · replaces gradient</div>
              </div>
            </div>
          </label>

          {/* Cover gradient picker */}
          <div style={{ marginBottom:4, fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)' }}>
            {form.coverImageUrl ? 'Or choose a gradient instead' : 'Or choose a gradient'}
          </div>
          <div className="cover-grid" style={{ marginBottom:22 }}>
            {COVER_OPTIONS.map(opt => (
              <div key={opt.id} className={`cover-opt ${!form.coverImageUrl && form.coverOption === opt.id ? 'selected' : ''}`}
                style={{ background: opt.gradient }} onClick={() => saveCover(opt.id)} title={opt.label} />
            ))}
          </div>

        </div>
        <div className="onboarding-footer">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
          <button className="btn btn-lime" onClick={onNext}>See your profile →</button>
        </div>
      </div>
    </div>
  );
}

  React.useEffect(() => {
    if (!form.communityId) return;
    fetch(`/api/community/${form.communityId}`)
      .then(r => r.json())
      .then(data => {
        setCommunityData(data);
        setMediaItems(data.media_items || []);
        setCaseStudies(data.case_studies || []);
        setNotableMembers(data.notable_members || []);
      });
  }, [form.communityId]);

  async function uploadMedia(e) {
    const file = e.target.files[0];
    if (!file || !form.communityId) return;
    setUploadingMedia(true);
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`/api/community/${form.communityId}/media`, { method:'POST', body:fd });
      const data = await res.json();
      if (data.url) setMediaItems(items => [...items, { url: data.url, caption: '' }]);
    } finally {
      setUploadingMedia(false);
    }
  }

  async function saveCaseStudy() {
    if (!csForm.brand || !form.communityId) return;
    setSavingCs(true);
    const fd = new FormData();
    fd.append('brand', csForm.brand);
    fd.append('year', csForm.year);
    fd.append('description', csForm.description);
    csFiles.forEach(f => fd.append('files', f));
    const res = await fetch(`/api/community/${form.communityId}/case-study`, { method:'POST', body:fd });
    const data = await res.json();
    if (data.entry) setCaseStudies(cs => [...cs, data.entry]);
    setCsForm({ brand:'', year:'', description:'' });
    setCsFiles([]);
    setAddingCs(false);
    setSavingCs(false);
  }

  function copyProfileLink() {
    const url = `${window.location.origin}/profile/${form.communityId}`;
    navigator.clipboard.writeText(url).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  const igProfile = communityData?.instagram_data?.profile || {};
  const igPosts = (communityData?.instagram_data?.media || []).filter(p => p.media_url || p.thumbnail_url);
  const capabilities = communityData?.capabilities || form.capabilities || [];
  const partnershipPrefs = communityData?.partnership_preferences || form.partnershipPrefs || '';

  return (
    <div className="onboarding-screen" style={{ overflowY:'auto', alignItems:'flex-start', paddingTop:0 }}>
      <div style={{ width:'100%', maxWidth:640, margin:'0 auto', paddingBottom:60 }}>

        {/* Header */}
        <div style={{ padding:'20px 24px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div className="bb" style={{ fontSize:20, letterSpacing:'0.04em' }}>mayo<span style={{ color:'var(--lime)' }}>.</span></div>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--lime)' }}>Profile Live</div>
            <button onClick={copyProfileLink} style={{ background:copied?'var(--lime)':'var(--surface2)', color:copied?'#000':'var(--white)', border:'1px solid var(--border2)', borderRadius:6, padding:'5px 12px', fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer', transition:'all 0.2s' }}>
              {copied ? '✓ Copied' : 'Share Profile'}
            </button>
          </div>
        </div>

        {/* Face card */}
        <div style={{ margin:'16px 24px 0' }}>
          <div style={{ borderRadius:12, overflow:'hidden', border:'1px solid var(--border)' }}>
            <div style={{ aspectRatio:'3/4', position:'relative', background:coverBg }}>
              <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.82))' }} />
              <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'40px 20px 16px' }}>
                <div className="bb" style={{ fontSize:28, color:'#fff', lineHeight:1, marginBottom:4 }}>{form.name}</div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,0.75)', marginBottom:8 }}>{form.tagline}</div>
                <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginBottom:10 }}>
                  {form.tags.slice(0,4).map(t => (
                    <span key={t} style={{ border:'1px solid rgba(255,255,255,0.3)', color:'rgba(255,255,255,0.85)', borderRadius:3, padding:'2px 6px', fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>{t}</span>
                  ))}
                </div>
                <TierBadge tier={tier} />
              </div>
            </div>
          </div>
        </div>

        {/* Profile header */}
        <div style={{ margin:'12px 24px 0', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'16px 20px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px 24px' }}>
            {form.location && (
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:2 }}>Location</div>
                <div style={{ fontSize:13 }}>{form.location}</div>
              </div>
            )}
            {form.activeMembers && (
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:2 }}>Active Members</div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:16, fontWeight:700 }}>{parseInt(form.activeMembers).toLocaleString()}</div>
              </div>
            )}
            {form.website && (
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:2 }}>Website</div>
                <a href={form.website} target="_blank" rel="noopener noreferrer" style={{ fontSize:13, color:'var(--cyan)', display:'flex', alignItems:'center', gap:5, textDecoration:'none' }}>
                  <GlobeIcon size={12} color="var(--cyan)" />{form.website.replace(/^https?:\/\//, '')}
                </a>
              </div>
            )}
            {(igConnected || substackConnected) && (
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:6 }}>Channels</div>
                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                  {igConnected && (
                    <a href={igProfile.username ? `https://instagram.com/${igProfile.username}` : '#'} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:6, textDecoration:'none', color:'#e1306c', fontSize:12, fontWeight:600 }}>
                      <IgIcon size={14} color="#e1306c" />
                      {igProfile.username ? `@${igProfile.username}` : 'Instagram'}
                    </a>
                  )}
                  {substackConnected && (
                    <a href={form.substackUrl} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:6, textDecoration:'none', color:'#ff6719', fontSize:12, fontWeight:600 }}>
                      <SubstackIcon size={14} color="#ff6719" />
                      {form.substackUrl.replace(/^https?:\/\//, '').replace(/\/$/, '')}
                    </a>
                  )}
                </div>
              </div>
            )}
          </div>
          {form.description && (
            <div style={{ marginTop:14, paddingTop:14, borderTop:'1px solid var(--border)', fontSize:13, color:'var(--muted)', lineHeight:1.6 }}>{form.description}</div>
          )}
        </div>

        {/* Capabilities */}
        {capabilities.length > 0 && (
          <div style={{ margin:'12px 24px 0', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'16px 20px' }}>
            <div className="bb" style={{ fontSize:16, letterSpacing:'0.03em', marginBottom:10 }}>What We Offer</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {capabilities.map(cap => (
                <span key={cap} style={{ padding:'4px 10px', borderRadius:4, border:'1px solid var(--border2)', fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--white)' }}>{cap}</span>
              ))}
            </div>
          </div>
        )}

        {/* Partnership preferences */}
        {partnershipPrefs && (
          <div style={{ margin:'12px 24px 0', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'16px 20px' }}>
            <div className="bb" style={{ fontSize:16, letterSpacing:'0.03em', marginBottom:8 }}>What We Look For</div>
            <div style={{ fontSize:13, color:'var(--muted)', lineHeight:1.7, fontStyle:'italic', borderLeft:'2px solid var(--lime)', paddingLeft:12 }}>"{partnershipPrefs}"</div>
          </div>
        )}

        {/* Archetype card */}
        {form.archetype && (() => {
          const a = ARCHETYPES.find(x => x.id === form.archetype);
          if (!a) return null;
          return (
            <div style={{ margin:'12px 24px 0', background:a.color+'12', border:`1px solid ${a.color}33`, borderRadius:12, padding:'18px 20px' }}>
              <div style={{ fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:a.color+'aa', marginBottom:6 }}>Community Type</div>
              <div style={{ fontFamily:'Bebas Neue', fontSize:32, letterSpacing:'0.03em', color:a.color, marginBottom:6 }}>{a.label}</div>
              <div style={{ fontSize:12, color:'rgba(240,240,240,0.6)', lineHeight:1.6, marginBottom:10 }}>{a.desc}</div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:11, color:a.color+'99', fontFamily:'Barlow Condensed', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em' }}>Best for</span>
                <span style={{ background:a.color+'20', border:`1px solid ${a.color}44`, color:a.color, fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', padding:'3px 10px', borderRadius:4 }}>{a.best}</span>
              </div>
              <div style={{ marginTop:6, fontSize:10, color:'#555', fontFamily:'Barlow Condensed', textTransform:'uppercase', letterSpacing:'0.05em' }}>Self-identified · Subject to Mayo review</div>
            </div>
          );
        })()}

        {/* Latest posts carousel */}
        {(igPosts.length > 0 || (communityData?.substack_data?.posts||[]).length > 0) && (
          <div style={{ margin:'16px 24px 0' }}>
            <PostCarousel igPosts={igPosts} substackPosts={communityData?.substack_data?.posts||[]} />
          </div>
        )}

        {/* Photos & Events (uploaded media) */}
        <div style={{ margin:'16px 24px 0' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <div className="bb" style={{ fontSize:18, letterSpacing:'0.03em' }}>Photos &amp; Events</div>
            <label style={{ cursor:'pointer' }}>
              <input type="file" accept="image/*" style={{ display:'none' }} onChange={uploadMedia} disabled={uploadingMedia} />
              <span style={{ fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--lime)', cursor:'pointer' }}>
                {uploadingMedia ? 'Uploading…' : '+ Add photo'}
              </span>
            </label>
          </div>
          {mediaItems.length === 0 ? (
            <label style={{ cursor:'pointer', display:'block' }}>
              <input type="file" accept="image/*" style={{ display:'none' }} onChange={uploadMedia} disabled={uploadingMedia} />
              <div style={{ border:'1px dashed var(--border2)', borderRadius:10, padding:'28px 20px', textAlign:'center', color:'var(--muted)' }}>
                <div style={{ fontSize:24, marginBottom:6 }}>+</div>
                <div style={{ fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>Add photos — events, people, moments</div>
              </div>
            </label>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
              {mediaItems.map((item, i) => (
                <div key={i} onClick={() => setLightbox({ items: mediaItems.map(m=>({url:m.url, caption:m.caption||undefined})), index:i })} style={{ cursor:'pointer', aspectRatio:'1', borderRadius:8, overflow:'hidden', background:'var(--surface)', border:'1px solid var(--border)' }}>
                  <img src={item.url} alt={item.caption||''} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                </div>
              ))}
              <label style={{ aspectRatio:'1', borderRadius:8, border:'1px dashed var(--border2)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'var(--muted)', fontSize:22 }}>
                <input type="file" accept="image/*" style={{ display:'none' }} onChange={uploadMedia} disabled={uploadingMedia} />
                {uploadingMedia ? '…' : '+'}
              </label>
            </div>
          )}
        </div>

        {/* Notable members */}
        {notableMembers.length > 0 && (
          <div style={{ margin:'16px 24px 0' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
              <div className="bb" style={{ fontSize:18, letterSpacing:'0.03em' }}>Notable Members</div>
              <div style={{ fontSize:11, color:'var(--muted)', fontFamily:'Barlow Condensed' }}>Approved by Mayo before shown publicly</div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 }}>
              {notableMembers.map((m, i) => {
                const ac = avatarColor(m.name);
                return (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'var(--surface)', border:`1px solid ${m.verified ? 'var(--lime)33' : 'var(--border)'}`, borderRadius:10, position:'relative' }}>
                    <div style={{ width:36, height:36, borderRadius:'50%', background:ac.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Barlow Condensed', fontSize:15, fontWeight:700, color:ac.text, flexShrink:0 }}>
                      {(m.name||'?')[0].toUpperCase()}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.name}</div>
                      {m.ig_handle && (
                        <div style={{ fontSize:11, color:'var(--muted)', display:'flex', alignItems:'center', gap:3 }}>
                          <IgIcon size={10} color="var(--muted)" />@{m.ig_handle}
                        </div>
                      )}
                      <div style={{ fontSize:10, fontFamily:'Barlow Condensed', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em', marginTop:2, color: m.verified ? 'var(--lime)' : '#555' }}>
                        {m.verified ? '✓ Verified' : 'Pending approval'}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Case studies */}
        <div style={{ margin:'16px 24px 0' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <div className="bb" style={{ fontSize:18, letterSpacing:'0.03em' }}>Past Partnerships</div>
            {!addingCs && (
              <button onClick={() => setAddingCs(true)} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--lime)', padding:0 }}>+ Add</button>
            )}
          </div>

          {caseStudies.map((cs, i) => (
            <div key={i} style={{ background:'var(--surface)', border:`1px solid ${cs.verified ? 'var(--lime)33' : 'var(--border)'}`, borderRadius:10, overflow:'hidden', marginBottom:8 }}>
              {(() => {
                const imgs = cs.images?.length ? cs.images : cs.image_url ? [cs.image_url] : [];
                if (!imgs.length) return null;
                const csItems = imgs.map(url => ({ url, title: cs.brand, subtitle: [cs.year, cs.description].filter(Boolean).join(' · ').slice(0,120) }));
                return (
                  <div onClick={() => setLightbox({ items: csItems, index: 0 })} style={{ cursor:'pointer', position:'relative', height:200, overflow:'hidden' }}>
                    <img src={imgs[0]} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                    {imgs.length > 1 && (
                      <div style={{ position:'absolute', bottom:8, right:8, background:'rgba(0,0,0,0.65)', borderRadius:4, padding:'3px 8px', fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, color:'#fff' }}>+{imgs.length-1} more</div>
                    )}
                  </div>
                );
              })()}
              <div style={{ padding:'12px 16px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                  <div style={{ fontFamily:'Barlow Condensed', fontSize:15, fontWeight:800, textTransform:'uppercase' }}>{cs.brand}</div>
                  {cs.year && <div style={{ fontFamily:'Barlow Condensed', fontSize:12, color:'var(--muted)', fontWeight:600 }}>{cs.year}</div>}
                  <div style={{ marginLeft:'auto', fontSize:10, fontFamily:'Barlow Condensed', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em', color: cs.verified ? 'var(--lime)' : '#555' }}>
                    {cs.verified ? '✓ Verified' : 'Pending approval'}
                  </div>
                </div>
                {cs.description && <div style={{ fontSize:12, color:'var(--muted)', lineHeight:1.5 }}>{cs.description}</div>}
              </div>
            </div>
          ))}

          {caseStudies.length === 0 && !addingCs && (
            <div style={{ border:'1px dashed var(--border2)', borderRadius:10, padding:'22px 20px', textAlign:'center', color:'var(--muted)' }}>
              <div style={{ fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:3 }}>No partnerships yet</div>
              <div style={{ fontSize:11 }}>Add brands you've worked with to build credibility</div>
            </div>
          )}

          {addingCs && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:10, padding:'14px' }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 80px', gap:8, marginBottom:8 }}>
                <input placeholder="Brand name" value={csForm.brand} onChange={e => setCsForm(f=>({...f,brand:e.target.value}))}
                  style={{ background:'var(--surface2)', border:'1px solid var(--border2)', borderRadius:6, padding:'8px 10px', color:'var(--white)', fontFamily:'Barlow', fontSize:13, outline:'none' }} />
                <input placeholder="Year" value={csForm.year} onChange={e => setCsForm(f=>({...f,year:e.target.value}))}
                  style={{ background:'var(--surface2)', border:'1px solid var(--border2)', borderRadius:6, padding:'8px 10px', color:'var(--white)', fontFamily:'Barlow', fontSize:13, outline:'none' }} />
              </div>
              <textarea placeholder="What did you do together? (optional)" value={csForm.description} onChange={e => setCsForm(f=>({...f,description:e.target.value}))} rows={2}
                style={{ width:'100%', background:'var(--surface2)', border:'1px solid var(--border2)', borderRadius:6, padding:'8px 10px', color:'var(--white)', fontFamily:'Barlow', fontSize:13, outline:'none', resize:'vertical', marginBottom:8, boxSizing:'border-box' }} />
              <label style={{ display:'block', marginBottom:8, cursor:'pointer' }}>
                <input type="file" accept="image/*" multiple style={{ display:'none' }} onChange={e => setCsFiles(Array.from(e.target.files))} />
                <div style={{ border:'1px dashed var(--border2)', borderRadius:6, padding:'8px 12px', fontSize:12, color: csFiles.length ? 'var(--lime)' : 'var(--muted)', display:'flex', alignItems:'center', gap:6 }}>
                  <span>{csFiles.length ? `✓ ${csFiles.length} photo${csFiles.length>1?'s':''} selected` : '+ Attach photos (optional)'}</span>
                </div>
              </label>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={saveCaseStudy} disabled={!csForm.brand||savingCs}
                  style={{ flex:1, background:'var(--lime)', color:'#000', border:'none', borderRadius:6, padding:'9px', fontFamily:'Barlow Condensed', fontSize:13, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer' }}>
                  {savingCs ? 'Saving…' : 'Save'}
                </button>
                <button onClick={() => { setAddingCs(false); setCsForm({brand:'',year:'',description:''}); setCsFiles([]); }}
                  style={{ background:'var(--surface2)', color:'var(--muted)', border:'1px solid var(--border)', borderRadius:6, padding:'9px 14px', fontFamily:'Barlow Condensed', fontSize:13, fontWeight:700, cursor:'pointer' }}>
                  Cancel
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Live notice */}
        <div style={{ margin:'20px 24px 0', padding:'14px 18px', background:'rgba(210,255,1,0.06)', border:'1px solid rgba(210,255,1,0.2)', borderRadius:10 }}>
          <div style={{ fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--lime)', marginBottom:3 }}>You're live</div>
          <div style={{ fontSize:12, color:'var(--muted)', lineHeight:1.6 }}>
            Your profile is in the mayo network. Share it with brands directly, or wait for proposals to come in.{' '}
            <span onClick={copyProfileLink} style={{ color:'var(--cyan)', cursor:'pointer', textDecoration:'underline' }}>Copy your profile link</span>
          </div>
        </div>

        {lightbox && <Lightbox items={lightbox.items} startIndex={lightbox.index} onClose={() => setLightbox(null)} />}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    communityId: null,
    leaderName: '',
    email: '',
    name: '',
    tagline: '',
    location: '',
    description: '',
    tags: [],
    website: '',
    activeMembers: '',
    substackUrl: '',
    coverOption: 1,
    coverImageUrl: null,
    instagramConnected: false,
    capabilities: [],
    partnershipPrefs: '',
    notableMembers: [],
    archetype: '',
  });

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('community_id');
    const igConnected = params.get('instagram_connected') === 'true';
    const s = parseInt(params.get('step') || '0');

    if (cid) {
      // Restore community data from DB
      fetch(`/api/community/${cid}`)
        .then(r => r.json())
        .then(data => {
          setForm(f => ({
            ...f,
            communityId: cid,
            leaderName: data.leader_name || '',
            email: data.email || '',
            name: data.name || '',
            tagline: data.tagline || '',
            location: data.location || '',
            description: data.description || '',
            tags: data.tags || [],
            website: data.website || '',
            activeMembers: data.active_members || '',
            substackUrl: data.substack_url || '',
            coverOption: data.cover_option || 1,
            coverImageUrl: data.cover_image_url || null,
            instagramConnected: igConnected || !!data.instagram_token,
            capabilities: data.capabilities || [],
            partnershipPrefs: data.partnership_preferences || '',
            notableMembers: data.notable_members || [],
            archetype: data.archetype || '',
          }));
          if (s) setStep(s);
        });
      window.history.replaceState({}, '', '/');
    }
  }, []);

  return (
    <>
      {step === 1 && <Step1 onNext={() => setStep(2)} />}
      {step === 2 && <Step2 onNext={() => setStep(3)} onBack={() => setStep(1)} form={form} setForm={setForm} />}
      {step === 3 && <Step3 onNext={() => setStep(4)} onBack={() => setStep(2)} form={form} setForm={setForm} />}
      {step === 4 && <Step4 onNext={() => setStep(5)} onBack={() => setStep(3)} form={form} setForm={setForm} />}
      {step === 5 && <Step5 onNext={() => setStep(6)} onBack={() => setStep(4)} form={form} setForm={setForm} />}
      {step === 6 && <Step6 form={form} setForm={setForm} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>{% endraw %}
</body>
</html>
